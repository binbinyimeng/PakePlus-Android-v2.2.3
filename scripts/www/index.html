        // 种植植物或使用铲子移除植物
        function plantOnGrid(cell) {
            // 获取格子的行和列
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            
            // 铲子模式：移除植物
            if (config.selectedShovel) {
                const plantsInCell = getPlantsInCell(row, col);
                if (plantsInCell.length === 0) {
                    return showToast("此格子没有植物！");
                }
                
                // 对格子中的所有植物造成9999999点伤害（立即移除）
                plantsInCell.forEach(plant => {
                    plant.takeDamage(9999999);
                });
                
                // 移除后取消铲子选择
                cancelPlantSelection();
                return;
            }
            
            // 植物种植模式
            if (!config.selectedPlant) return showToast("请先选择下方植物！");
            
            // 获取植物当前的属性增强
            const enhancements = window.rogueCards ? window.rogueCards.plantEnhancementSystem.getPlantEnhancements(config.selectedPlant.name) : {
                attackSpeedPercent: 0,
                attackDamagePercent: 0,
                healthPercent: 0,
                costPercent: 0,
                rangePercent: 0
            };
            
            // 计算实际价格（考虑卡片增强效果）
            const actualCost = Math.max(1, Math.round(config.selectedPlant.cost * (1 + enhancements.costPercent / 100)));
            
            if (config.sun < actualCost) return showToast("阳光不足！");
            
            // 检查冷却时间
            if (config.selectedPlant.cooldown && config.selectedPlant.cooldown > 0) {
                return showToast("植物正在冷却中！");
            }
            
            // 检查是否可以重叠
            if (!config.selectedPlant.canOverlap && hasPlantInCell(row, col)) {
                return showToast("此格子已有植物！");
            }

            // 扣钱（使用实际价格）
            config.sun -= actualCost;
            sunCountEl.textContent = config.sun;
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();

            // 计算植物位置
            const rect = cell.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const plantSize = config.selectedPlant.containerSize || 15; // vmin
            const x = rect.left - lawnRect.left + rect.width/2 - (plantSize * window.innerHeight / 200);
            const y = rect.top - lawnRect.top + rect.height/2 - (plantSize * window.innerHeight / 200);

            // 创建植物实例
            const plant = new Plant(config.selectedPlant, x, y);
            plant.col = col;
            plant.row = row;
            const plantElement = plant.createElement(lawnEl);
            // 设置z-index，下面的行层级更高
            plantElement.style.zIndex = row + 1;
            plant.startAttack();
            
            // 添加到植物列表
            config.plantsOnLawn.push(plant);

            // 触发植物冷却
            if (config.selectedPlant.plantCooldown) {
                startPlantCooldown(config.selectedPlant);
            }

            // 种植后立刻取消选择
            cancelPlantSelection();
        }
        
        // 开始植物冷却
        function startPlantCooldown(plantType) {
            // 记录冷却开始时间
            plantType.cooldownStartTime = Date.now();
            plantType.cooldown = plantType.plantCooldown * 1000; // 转换为毫秒
            
            // 找到对应的植物卡片
            const plantCards = document.querySelectorAll('.plant-card');
            plantCards.forEach(card => {
                const index = parseInt(card.dataset.index);
                if (config.plants[index] === plantType) {
                    // 添加冷却动画
                    card.style.opacity = '0.5';
                    card.style.pointerEvents = 'none';
                    
                    // 显示冷却倒计时
                    const cooldownText = document.createElement('div');
                    cooldownText.className = 'cooldown-text';
                    cooldownText.style.position = 'absolute';
                    cooldownText.style.top = '50%';
                    cooldownText.style.left = '50%';
                    cooldownText.style.transform = 'translate(-50%, -50%)';
                    cooldownText.style.color = 'white';
                    cooldownText.style.fontWeight = 'bold';
                    cooldownText.style.textShadow = '1px 1px 2px black';
                    cooldownText.style.zIndex = '10';
                    card.appendChild(cooldownText);
                    
                    // 更新倒计时
                    const updateCooldown = () => {
                        const elapsed = Date.now() - plantType.cooldownStartTime;
                        const remaining = Math.max(0, plantType.plantCooldown - Math.floor(elapsed / 1000));
                        
                        if (remaining > 0) {
                            cooldownText.textContent = remaining;
                            requestAnimationFrame(updateCooldown);
                        } else {
                            // 冷却结束
                            plantType.cooldown = 0;
                            card.style.opacity = '1';
                            card.style.pointerEvents = 'auto';
                            cooldownText.remove();
                        }
                    };
                    
                    updateCooldown();
                }
            });
        }

        // 判断效果是否为正面效果
        function isEffectPositive(effectType, effectValue) {
            // 定义正面效果类型（数值增加为正面）
            const positiveEffectTypes = [
                rogueCards.cardEffectTypes.ATTACK_SPEED_PERCENT,
                rogueCards.cardEffectTypes.ATTACK_DAMAGE_PERCENT,
                rogueCards.cardEffectTypes.HEALTH_PERCENT,
                rogueCards.cardEffectTypes.RANGE_PERCENT,
                rogueCards.cardEffectTypes.HEALTH_REGEN
            ];
            
            // 定义负面效果类型（数值增加为负面）
            const negativeEffectTypes = [
                rogueCards.cardEffectTypes.COST_PERCENT
            ];
            
            // 正面效果类型：数值增加为正面，数值减少为负面
            if (positiveEffectTypes.includes(effectType)) {
                return effectValue > 0;
            }
            
            // 负面效果类型：数值增加为负面，数值减少为正面
            if (negativeEffectTypes.includes(effectType)) {
                return effectValue < 0;
            }
            
            // 默认根据数值正负判断
            return effectValue > 0;
        }
        
        // 获取效果颜色类名（支持温度属性的特殊颜色）
        function getEffectColorClass(effectType, effectValue) {
            // 温度附加属性特殊处理
            if (effectType === rogueCards.cardEffectTypes.TEMPERATURE_BONUS) {
                if (effectValue > 0) {
                    return 'effect-temperature-positive'; // 橙色（正温度）
                } else if (effectValue < 0) {
                    return 'effect-temperature-negative'; // 深蓝色（负温度）
                } else {
                    return 'effect-neutral'; // 中性（零温度）
                }
            }
            
            // 其他效果使用原有的正面/负面判断
            const isPositive = isEffectPositive(effectType, effectValue);
            return isPositive ? 'effect-positive' : 'effect-negative';
        }

                return { bg: '#f3e5f5', border: '#9c27b0', color: '#7b1fa2' };
            }
            if (rarity.name === '传说') {
                return { bg: '#fff8e1', border: '#ff9800', color: '#f57c00' };
            }
            return { bg: '#f5f5f5', border: '#9e9e9e', color: '#616161' };
        }
        
        // 渲染分类标签
        function renderCatalogTabs() {
            const tabsContainer = document.getElementById('catalogTabs');
            tabsContainer.innerHTML = '';
            
            Object.entries(cardCategories).forEach(([key, category]) => {
                const tab = document.createElement('button');
                tab.className = 'catalog-tab' + (currentCatalogCategory === key ? ' active' : '');
                tab.innerHTML = `${category.icon} ${category.name}`;
                tab.onclick = () => switchCatalogCategory(key);
                tabsContainer.appendChild(tab);
            });
        }
        
        // 切换分类
        function switchCatalogCategory(category) {
            currentCatalogCategory = category;
            renderCatalogTabs();
            renderCatalogCards();
        }
        
        // 渲染卡牌列表
        function renderCatalogCards() {
            const container = document.getElementById('catalogCardsContainer');
            container.innerHTML = '';
            
            let filteredCards = rogueCards.cardPool;
            
            // 筛选卡牌
            if (currentCatalogCategory !== 'all') {
                filteredCards = rogueCards.cardPool.filter(card => 
                    getCardCategory(card) === currentCatalogCategory
                );
            }
            
            // 按类别分组
            const cardsByCategory = {};
            filteredCards.forEach(card => {
                const category = getCardCategory(card);
                if (!cardsByCategory[category]) {
                    cardsByCategory[category] = [];
                }
                cardsByCategory[category].push(card);
            });
            
            // 对每个类别进行处理
            Object.keys(cardsByCategory).forEach(categoryKey => {
                const categoryCards = cardsByCategory[categoryKey];
                const category = cardCategories[categoryKey];
                
                // 创建类别分组
                const categoryGroup = document.createElement('div');
                categoryGroup.className = 'catalog-category-group';
                
                // 添加类别标题（如果不是"全部"分类）
                if (currentCatalogCategory === 'all' && category) {
                    const categoryTitle = document.createElement('div');
                    categoryTitle.className = 'catalog-category-title';
                    categoryTitle.innerHTML = `${category.icon} ${category.name}`;
                    categoryGroup.appendChild(categoryTitle);
                }
                
                // 按稀有度分组
                const rarityOrder = ['传说', '史诗', '稀有', '普通'];
                const cardsByRarity = {};
                rarityOrder.forEach(rarity => {
                    cardsByRarity[rarity] = categoryCards.filter(card => card.rarity.name === rarity);
                });
                
                // 对每个稀有度进行处理
                rarityOrder.forEach(rarityName => {
                    const rarityCards = cardsByRarity[rarityName];
                    if (rarityCards.length === 0) return;
                    
                    // 创建稀有度分组
                    const rarityGroup = document.createElement('div');
                    rarityGroup.className = 'catalog-rarity-group';
                    
                    // 添加稀有度标题
                    const rarityTitle = document.createElement('div');
                    rarityTitle.className = 'catalog-rarity-title';
                    const rarityStyle = getRarityStyle({ name: rarityName });
                    rarityTitle.style.color = rarityStyle.color;
                    rarityTitle.innerHTML = `◆ ${rarityName}`;
                    rarityGroup.appendChild(rarityTitle);
                    
                    // 按每行8张卡牌分组
                    const cardsPerRow = 8;
                    for (let i = 0; i < rarityCards.length; i += cardsPerRow) {
                        const rowCards = rarityCards.slice(i, i + cardsPerRow);
                        
                        const row = document.createElement('div');
                        row.className = 'catalog-cards-row';
                        
                        // 渲染这一行的卡牌
                        rowCards.forEach(card => {
                            const cardEl = createCatalogCardElement(card);
                            row.appendChild(cardEl);
                        });
                        
                        rarityGroup.appendChild(row);
                    }
                    
                    categoryGroup.appendChild(rarityGroup);
                });
                
                container.appendChild(categoryGroup);
            });
        }
        
        // 创建单个卡牌元素
        function createCatalogCardElement(card) {
            const cardEl = document.createElement('div');
            cardEl.className = 'catalog-card';
            
            const rarityStyle = getRarityStyle(card.rarity);
            
            cardEl.style.borderColor = rarityStyle.border;
            cardEl.style.borderWidth = '0.2vmin';
            
            cardEl.innerHTML = `
                <div class="catalog-card-header">
                    <span class="catalog-card-icon">${card.icon}</span>
                    <span class="catalog-card-rarity" style="background: ${rarityStyle.bg}; color: ${rarityStyle.color}; border: 0.1vmin solid ${rarityStyle.border};">${card.rarity.name}</span>
                </div>
                <div class="catalog-card-name">${card.name}</div>
                <div class="catalog-card-cost">💎 ${card.cost} 梦境点数</div>
                <div class="catalog-card-description">${card.description}</div>
            `;
            
            return cardEl;
        }
        
        // 打开卡组图鉴
        function openCardCatalog() {
            document.getElementById('cardCatalogModal').style.display = 'flex';
            currentCatalogCategory = 'all';
            renderCatalogTabs();
            renderCatalogCards();
        }
        
        // 关闭卡组图鉴
        function closeCardCatalog() {
            document.getElementById('cardCatalogModal').style.display = 'none';
        }
        
        // 刷新卡片
        function refreshCards() {
            if (currentDreamPoints < 10) {
                showToast("刷新需要10梦境点数！");
                return;
            }
            
            currentDreamPoints -= 10;
            rogueCards.cardShopSystem.currentDreamPoints = currentDreamPoints;
            rogueCards.cardShopSystem.refreshCards();
            
            document.getElementById("dreamPointsCount").textContent = currentDreamPoints;
            renderCards();
            
            showToast("已刷新卡片，消耗10梦境点数");
        }
        
        // 进入下一关
        function skipCardShop() {
            document.getElementById("cardShopModal").style.display = "none";
            
            // 清除场上所有植物和僵尸
            clearField();
            
            // 清除所有阳光
            const suns = document.querySelectorAll('.sun');
            suns.forEach(sun => sun.remove());
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重置游戏配置
            config.sun = 20;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 更新阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();
            
            // 继续下一关
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式
                const nextLevel = config.currentLevel + 1;
                if (nextLevel <= 110) {
                    startLevel(nextLevel);
                } else {
                    showToast("肉鸽模式所有关卡已完成！");
                    // 可以添加其他逻辑，如重新开始肉鸽模式等
                }
            }
        }
        

        
        // 修改nextLevel函数，在肉鸽模式下正确处理
        function nextLevel() {
            // 隐藏关卡完成弹窗
            const modal = document.getElementById("levelCompleteModal");
            if (modal) {
                modal.style.display = "none";
            }
            
            // 清除场上所有植物和僵尸
            clearField();
            
            // 清除所有阳光
            const suns = document.querySelectorAll('.sun');
            suns.forEach(sun => sun.remove());
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重置游戏配置
            config.sun = 20;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 更新阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();
            
            // 进入下一关
            const nextLevelId = config.currentLevel + 1;
            
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式
                if (nextLevelId <= 199) {
                    startLevel(nextLevelId);
                } else {
                    console.log("肉鸽模式所有关卡已完成！");
                    showToast("恭喜完成所有肉鸽关卡！");
                }
            } else {
                // 普通模式
                const hasNextLevel = levels.some(l => l.id === nextLevelId);
                if (hasNextLevel) {
                    startLevel(nextLevelId);
                } else {
                    console.log("所有关卡已完成！进入肉鸽模式！");
                    startRogueMode();
                }
            }
        }
        
        // 初始化键盘快捷键
        function initKeyboardShortcuts() {
            // 添加键盘事件监听器
            document.addEventListener('keydown', function(event) {
                // 检查是否按下了F1键
                if (event.key === 'F1' || event.code === 'F1') {
                    event.preventDefault(); // 阻止浏览器默认行为
                    spawnThugZombie(); // 生成暴徒僵尸
                }
                // 检查是否按下了F2键
                else if (event.key === 'F2' || event.code === 'F2') {
                    event.preventDefault(); // 阻止浏览器默认行为
                    spawnDogZombie(); // 生成狗僵尸
                }
            });
            
            console.log("键盘快捷键已初始化 - 按F1键可快速生成暴徒僵尸，按F2键可快速生成狗僵尸");
        }
        
        // 快速生成暴徒僵尸
        function spawnThugZombie() {
            // 检查游戏是否正在进行中
            if (!window.game || config.levelComplete) {
                console.log("游戏未开始或已结束，无法生成暴徒僵尸");
                return;
            }
            
            // 获取暴徒僵尸配置
            const thugConfig = zombieTypes.thug;
            if (!thugConfig) {
                console.error("暴徒僵尸配置不存在");
                return;
            }
            
            // 随机选择一行生成僵尸
            const row = Math.floor(Math.random() * config.gridRows);
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const rowHeight = lawnGridRect.height / config.gridRows;
            
            const zombieSize = 15; // vmin
            // 让僵尸从地图最右边刷新出来，稍微超出地图边界
            const x = lawnGridRect.right - lawnRect.left + (zombieSize * window.innerHeight / 200);
            const y = lawnGridRect.top - lawnRect.top + row * rowHeight + rowHeight/2 - (zombieSize * window.innerHeight / 200);
            
            // 获取当前关卡的属性变化指数
            const { levelHealthPercent, levelAttackPercent, levelSpeedPercent } = getCurrentLevelZombieModifiers();

            // 创建暴徒僵尸实例
            const zombie = new Zombie(thugConfig, x, y, levelHealthPercent, levelAttackPercent, levelSpeedPercent);
            const zombieElement = zombie.createElement(lawnEl);
            // 设置z-index，下面的行层级更高
            zombieElement.style.zIndex = row + 1;
            zombie.startMoving();
            
            // 添加到僵尸列表
            config.zombies.push(zombie);
            config.zombiesRemaining++;
            
            // 更新全局僵尸数量统计
            if (window.zombieCountSystem) {
                window.zombieCountSystem.addZombie();
            }
            
            console.log(`通过F1快捷键生成了暴徒僵尸，位置: 行${row+1}`);
        }
        
        // 快速生成狗僵尸
        function spawnDogZombie() {
            // 检查游戏是否正在进行中
            if (!window.game || config.levelComplete) {
                console.log("游戏未开始或已结束，无法生成狗僵尸");
                return;
            }
            
            // 获取狗僵尸配置
            const dogConfig = zombieTypes.dog;
            if (!dogConfig) {
                console.error("狗僵尸配置不存在");
                return;
            }
            
            // 随机选择一行生成僵尸
            const row = Math.floor(Math.random() * config.gridRows);
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const rowHeight = lawnGridRect.height / config.gridRows;
            
            const zombieSize = 15; // vmin
            // 让僵尸从地图最右边刷新出来，稍微超出地图边界
            const x = lawnGridRect.right - lawnRect.left + (zombieSize * window.innerHeight / 200);
            const y = lawnGridRect.top - lawnRect.top + row * rowHeight + rowHeight/2 - (zombieSize * window.innerHeight / 200);
            
            // 获取当前关卡的属性变化指数
            const { levelHealthPercent, levelAttackPercent, levelSpeedPercent } = getCurrentLevelZombieModifiers();

            // 创建狗僵尸实例
            const zombie = new Zombie(dogConfig, x, y, levelHealthPercent, levelAttackPercent, levelSpeedPercent);
            const zombieElement = zombie.createElement(lawnEl);
            // 设置z-index，下面的行层级更高
            zombieElement.style.zIndex = row + 1;
            zombie.startMoving();
            
            // 添加到僵尸列表
            config.zombies.push(zombie);
            config.zombiesRemaining++;
            
            // 更新全局僵尸数量统计
            if (window.zombieCountSystem) {
                window.zombieCountSystem.addZombie();
            }
            
            console.log(`通过F2快捷键生成了狗僵尸，位置: 行${row+1}`);
        }
        
        // 游戏启动
        window.onload = function() {
            initGame();
        };
    </script>
</body>
