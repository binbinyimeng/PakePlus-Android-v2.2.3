                const bullet = document.createElement("div");
                
                // 获取子弹大小（默认为1）
                const bulletSize = this.type.bulletSize || 1;
                const baseSize = 10 * bulletSize;
                
                // 设置子弹样式
                bullet.className = "bullet";
                bullet.innerHTML = `<img src='${this.type.bulletImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
                bullet.style.width = `${baseSize}vmin`;
                bullet.style.height = `${baseSize}vmin`;
                bullet.style.position = "absolute";
                bullet.style.pointerEvents = "none";
                bullet.style.zIndex = "1000";
                
                // 计算起始位置（植物中心）
                const plantRect = this.element.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                
                // 应用子弹偏移（可配置属性）
                const bulletOffset = this.type.bulletOffset || { x: 0, y: 0 };
                const startX = plantRect.left - lawnRect.left + plantRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.x;
                const startY = plantRect.top - lawnRect.top + plantRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.y;
                
                // 计算目标位置（僵尸中心）
                const zombieRect = this.targetZombie.element.getBoundingClientRect();
                const endX = zombieRect.left - lawnRect.left + zombieRect.width / 2 - (baseSize / 2) * window.innerHeight / 100;
                const endY = zombieRect.top - lawnRect.top + zombieRect.height / 2 - (baseSize / 2) * window.innerHeight / 100;
                
                // 设置起始位置
                bullet.style.left = startX + "px";
                bullet.style.top = startY + "px";
                
                // 添加到草坪
                lawnEl.appendChild(bullet);
                
                // 保存this引用，以便在动画结束时使用
                const targetZombie = this.targetZombie;
                const attackDamage = this.getActualAttack ? this.getActualAttack() : this.attack;
                const bulletExplosionImage = this.type.bulletExplosionImage;
                const temperatureBonus = this.temperatureBonus;
                const knockbackForce = this.knockbackForce;
                const attackingPlant = this;
                const plantType = this.type.name; // 保存植物类型名称，用于后续扩展性
                
                // 获取动画参数（从植物配置读取，支持随机值）
                let duration = this.type.bulletDuration || 800;
                let maxHeight = this.type.bulletMaxHeight || 100;
                
                // 如果 bulletMaxHeight 是函数，调用它获取随机值
                if (typeof maxHeight === 'function') {
                    maxHeight = maxHeight();
                }
                
                // 创建子弹爆炸动画
                function createExplosionAnimation(explosionImage, x, y, baseSize, lawnEl) {
                    const explosion = document.createElement("div");
                    
                    // 设置爆炸图片
                    explosion.className = "bullet-explosion";
                    explosion.innerHTML = `<img src='${explosionImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
                    explosion.style.width = `${baseSize}vmin`;
                    explosion.style.height = `${baseSize}vmin`;
                    explosion.style.position = "absolute";
                    explosion.style.left = x + "px";
                    explosion.style.top = y + "px";
                    explosion.style.pointerEvents = "none";
                    explosion.style.zIndex = "1001";
                    explosion.style.opacity = 1;
                    explosion.style.transformOrigin = "center";
                    
                    // 添加到草坪
                    lawnEl.appendChild(explosion);
                    
                    // 爆炸动画持续时间
                    const explosionDuration = 300;
                    let explosionStartTime = null;
                    
                    function animateExplosion(timestamp) {
                        if (!explosionStartTime) explosionStartTime = timestamp;
                        const progress = Math.min((timestamp - explosionStartTime) / explosionDuration, 1);
                        
                        // 从小变大（从0.5倍到2倍）
                        const scale = 0.5 + progress * 1.5;
                        
                        // 从不透明到透明
                        const opacity = 1 - progress;
                        
                        // 更新爆炸状态
                        explosion.style.transform = `scale(${scale})`;
                        explosion.style.opacity = opacity;
                        
                        // 继续动画
                        if (progress < 1) {
                            requestAnimationFrame(animateExplosion);
                        } else {
                            // 动画结束，移除爆炸
                            if (explosion.parentNode) {
                                explosion.parentNode.removeChild(explosion);
                            }
                        }
                    }
                    
                    // 开始爆炸动画
                    requestAnimationFrame(animateExplosion);
                }
                
                // 执行抛物线动画
                let startTime = null;
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1); // 动画进度 0~1
                    
                    // 计算当前位置（线性插值）- X轴匀速移动
                    const currentX = startX + (endX - startX) * progress;
                    
                    // 计算抛物线高度 - Y轴使用抛物线公式
                    // 使用抛物线公式: y = -4 * h * (t - 0.5)^2 + h
                    // 其中 h 是最高点高度，t 是进度（0到1）
                    // 当 t=0 或 t=1 时，高度为 0；当 t=0.5 时，高度为最大值 maxHeight
                    const parabolaHeight = -4 * maxHeight * Math.pow(progress - 0.5, 2) + maxHeight;
                    const currentY = startY + (endY - startY) * progress - parabolaHeight;
                    
                    // 计算当前缩放 - 使用二次函数营造远近感
                    // 投出时偏小(0.6)，中间最大(1.3)，落到僵尸时最小(0.3)
                    // 二次函数: scale = a*t² + b*t + c
                    const scale = -2.6 * progress * progress + 2.6 * progress + 0.6;
                    
                    // 更新子弹状态（不改变透明度）
                    bullet.style.left = currentX + "px";
                    bullet.style.top = currentY + "px";
                    bullet.style.transform = `scale(${scale})`;
                    bullet.style.opacity = 1;
                    
                    // 继续动画
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 动画结束，对僵尸造成伤害
                        if (targetZombie && targetZombie.health > 0) {
                            targetZombie.takeDamage(attackDamage, attackingPlant);
                            
                            // 播放投手爆炸音效
                            if (plantType === "投手") {
                                window.soundManager.playSound('Sound effects/thrower_bullet_explosion.mp3', 0.8);
                            }
                            
                            // 播放法师爆炸音效
                            if (plantType === "法师") {
                                window.soundManager.playSound('Sound effects/mage_bullet_explosion.mp3', 0.8);
                            }
                            
                            // 调用投掷物伤害回调函数（用于扩展性）
                            if (window.game && typeof window.game.onProjectileHit === 'function') {
                                window.game.onProjectileHit(targetZombie, attackDamage, plantType, attackingPlant);
                            }
                            
                            // 应用温度附加效果
                            if (temperatureBonus !== 0) {
                                // 确保温度在 -100 到 200 之间
                                if (targetZombie.temperature + temperatureBonus >= 0) {
                                    targetZombie.temperature = Math.min(200, targetZombie.temperature + temperatureBonus);
                                } else {
                                    targetZombie.temperature = Math.max(-100, targetZombie.temperature + temperatureBonus);
                                }
                                targetZombie.applyTemperatureEffect();
                                targetZombie.initTemperatureRegression();
                            }
                            
                            // 应用击退效果
                            if (knockbackForce !== 0 && targetZombie.element) {
                                // 计算击退抗性影响
                                const resistanceMultiplier = Math.max(0, 1 - (targetZombie.knockbackResistance / 100));
                                const actualKnockback = Math.round(knockbackForce * resistanceMultiplier);
                                
                                if (actualKnockback !== 0) {
                                    targetZombie.x += actualKnockback;
                                    targetZombie.element.style.left = targetZombie.x + "px";
                                }
                            }
                        }
                        
                        // 如果有爆炸图片，播放爆炸动画
                        if (bulletExplosionImage) {
                            createExplosionAnimation(bulletExplosionImage, endX, endY, baseSize, lawnEl);
                        }
                        
                        // 移除子弹
                        if (bullet.parentNode) {
                            bullet.parentNode.removeChild(bullet);
                        }
                    }
                }
                
                // 开始动画
                requestAnimationFrame(animate);
            }
            
            // 击退僵尸
            knockbackZombie(zombie, force) {
                if (!zombie || !zombie.element) return;
                if (force === undefined) {
                    force = this.knockbackForce; // 如果没有传递force参数，使用植物的击退力
                }
                if (force === 0) return;
                
                // 计算击退抗性影响
                const resistanceMultiplier = Math.max(0, 1 - (zombie.knockbackResistance / 100));
                const actualKnockback = Math.round(force * resistanceMultiplier);
                
                console.log(`[击退系统] 植物: ${this.name}, 击退力: ${force}, 僵尸: ${zombie.name}, 抗性: ${zombie.knockbackResistance}%`);
                console.log(`[击退系统] 抗性倍率: ${resistanceMultiplier}, 实际击退: ${actualKnockback}`);
                console.log(`[击退系统] 僵尸位置: ${zombie.x} -> ${zombie.x + actualKnockback}`);
                
                if (actualKnockback === 0) return;
                
                // 根据击退力的正负值，向不同方向击退僵尸
                // 正数：向右击退（远离植物）
                // 负数：向左击退（靠近植物）
                zombie.x += actualKnockback;
                zombie.element.style.left = zombie.x + "px";
            }
            
            // 法师特殊方法：当附近植物攻击时触发攻击
            triggerAttackOnNearbyPlantAttack() {
                if (this.name !== "法师" || this.health <= 0) return;
                
                // 检查是否有僵尸在攻击范围内
                const zombies = window.game.zombies;
                const lawnEl = document.getElementById("lawn");
                const lawnGridEl = document.getElementById("lawnGrid");
                
                if (!lawnEl || !lawnGridEl) return;
                
                const lawnRect = lawnEl.getBoundingClientRect();
                const gridRect = lawnGridEl.getBoundingClientRect();
                const cellWidth = gridRect.width / config.gridCols;
                const cellHeight = gridRect.height / config.gridRows;
                
                const plantCol = this.col;
                const plantRow = this.row;
                
                // 查找范围内的僵尸
                let hasTarget = false;
                for (const zombie of zombies) {
                    const zombieCol = Math.floor((zombie.x + 7.5 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const zombieRow = Math.floor((zombie.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    const distanceX = Math.abs(zombieCol - plantCol);
                    const distanceY = Math.abs(zombieRow - plantRow);
                    
                    let inRange = false;
                    if (this.yRange === 0) {
                        inRange = (distanceY === 0 && distanceX <= this.xRange);
                    } else {
                        inRange = (distanceX <= this.xRange && distanceY <= this.yRange && distanceX + distanceY <= this.xRange + this.yRange);
                    }
                    
                    if (inRange && zombie.health > 0) {
                        hasTarget = true;
                        this.targetZombie = zombie;
                        break;
                    }
                }
                
                // 如果有目标，立即攻击
                if (hasTarget && this.targetZombie) {
                    this.attackZombies();
                }
            }

            // 受到伤害
            takeDamage(damage, source = null) {
                let finalDamage = damage;
                let isIceBreak = false;
                let isQuench = false;
                
                // 判断是否触发破冰伤害：攻击者有正温度附加，被攻击者有负温度
                if (source && source.temperatureBonus > 0 && this.temperature < 0) {
                    finalDamage *= 3;
                    isIceBreak = true;
                }
                // 判断是否触发淬火伤害：攻击者有负温度附加，被攻击者有正温度
                else if (source && source.temperatureBonus < 0 && this.temperature > 0) {
                    finalDamage *= 2;
                    isQuench = true;
                }
                
                // 应用隐秘伤害减免
                if (this.stealth > 0) {
                    finalDamage *= (1 - this.stealth / 100);
                }
                
                // 伤害四舍五入取整数
                const roundedDamage = Math.round(finalDamage);
                this.health -= roundedDamage;
                this.showDamage(roundedDamage, false, false, isIceBreak, isQuench);
                this.updateHealthBar();
                

                
                // 通知同一行的刀兵，有植物受到了伤害
                if (window.game && window.game.plantsOnLawn) {
                    for (const plant of window.game.plantsOnLawn) {
                        if (plant.name === "刀兵" && plant.row === this.row && plant.health > 0) {
                            plant.increaseCounter();
                        }
                    }
                }
                
                if (this.health <= 0) {
                    this.die();
                }
            }

            // 死亡
            die() {
                if (this.attackInterval) {
                    clearInterval(this.attackInterval);
                }
                if (this.shieldTimer) {
                    clearTimeout(this.shieldTimer);
                }
                if (this.deathTimer) {
                    clearTimeout(this.deathTimer);
                }
                if (this.existTimer) {
                    clearInterval(this.existTimer);
                }
                if (this.healthRegenTimer) {
                    clearInterval(this.healthRegenTimer);
                }
                // 停止炸弹的膨胀动画
                if (this.stopExpandAnimation && typeof this.stopExpandAnimation === 'function') {
                    this.stopExpandAnimation();
                }
                // 停止炸弹的bow音效
                window.soundManager.stopAllSounds('Sound effects/bow.mp3');
                
                if (this.element) {
                    this.element.remove();
                }
                // 从植物列表中移除
                const index = window.game.plantsOnLawn.indexOf(this);
                if (index > -1) {
                    window.game.plantsOnLawn.splice(index, 1);
                }
                // 如果是盾牌，通知盾兵
                if (this.name === "盾牌" && this.shielder) {
                    this.shielder.onShieldDestroyed();
                }
                // 如果是盾墙，摧毁所有蓝盾牌
                if (this.name === "盾墙") {
                    this.destroyBlueShields();
                }
                // 如果是蓝盾牌，通知盾墙
                if (this.name === "蓝盾牌" && this.shieldWall) {
                    this.shieldWall.onBlueShieldDestroyed(this);
                }
            }
            
            // 刀兵特殊方法：增加计数器
            increaseCounter() {
                if (this.name !== "刀兵") return;
                this.counter++;
                this.updateCounterDisplay();
            }
            
            // 刀兵特殊方法：更新计数器显示
            updateCounterDisplay() {
                if (this.name !== "刀兵" || !this.counterElement) return;
                if (this.counter > 0) {
                    this.counterElement.style.display = "block";
                    this.counterElement.textContent = this.counter.toString();
                } else {
                    this.counterElement.style.display = "none";
                }
            }
            
            // 刀兵特殊方法：计算实际攻击力
            getActualAttack() {
                if (this.name !== "刀兵") return this.attack;
                
                // 计算基础攻击力 × (1 + 卡片攻击力%/100)
                const baseWithCard = this.attack;
                
                // 再乘以 (1 + 计数器层数 × 100%)
                const counterMultiplier = 1 + this.counter;
                
                return Math.round(baseWithCard * counterMultiplier);
            }
            
            // 转换植物
            transformPlant() {
                if (!this.element) return;
                
                const lawnEl = document.getElementById("lawn");
                if (!lawnEl) return;
                
                // 确定要转换的目标植物类型
                let targetPlantType;
                if (this.name === "剑客") {
                    targetPlantType = plantTypes.swordsman2;
                } else if (this.name === "剑客2") {
                    targetPlantType = plantTypes.swordsman;
                } else {
                    return; // 只有剑客和剑客2可以转换
                }
                
                // 保存当前位置和健康值
                const currentX = this.x;
                const currentY = this.y;
                const currentHealth = this.health;
                
                // 从植物列表中移除当前植物
                const index = window.game.plantsOnLawn.indexOf(this);
                if (index > -1) {
                    window.game.plantsOnLawn.splice(index, 1);
                }
                
                // 清除当前植物的元素和计时器
                if (this.attackInterval) {
                    clearInterval(this.attackInterval);
                }
                if (this.shieldTimer) {
                    clearTimeout(this.shieldTimer);
                }
                if (this.deathTimer) {
                    clearTimeout(this.deathTimer);
                }
                if (this.element) {
                    this.element.remove();
                }
                
                // 创建新植物
                const newPlant = new Plant(targetPlantType, currentX, currentY);
                newPlant.health = currentHealth; // 保持健康值
                newPlant.col = this.col;
                newPlant.row = this.row;
                const newPlantElement = newPlant.createElement(lawnEl);
                
                // 设置z-index
                const lawnGridEl = document.getElementById("lawnGrid");
                if (lawnGridEl) {
                    const lawnRect = lawnEl.getBoundingClientRect();
                    const gridRect = lawnGridEl.getBoundingClientRect();
                    const cellHeight = gridRect.height / 5;
                    const plantCenterOffset = (newPlant.containerSize / 2) * window.innerHeight / 100;
                    const plantRow = Math.floor((currentY + plantCenterOffset - (gridRect.top - lawnRect.top)) / cellHeight);
                    newPlantElement.style.zIndex = plantRow + 1;
                }
                
                // 添加到植物列表并开始攻击
                window.game.plantsOnLawn.push(newPlant);
                newPlant.startAttack();
            }
            
            // 创建贯穿型子弹动画
            createPierceBullet() {
                if (!this.element || !this.targetZombie || !this.targetZombie.element) return;
                
                const lawnEl = document.getElementById("lawn");
                const bullet = document.createElement("div");
                
                // 获取子弹大小（默认为1）
                const bulletSize = this.type.bulletSize || 1;
                const baseSize = 10 * bulletSize;
                
                // 设置子弹样式
                bullet.className = "bullet";
                bullet.innerHTML = `<img src='${this.type.bulletImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
                bullet.style.width = `${baseSize}vmin`;
                bullet.style.height = `${baseSize}vmin`;
                bullet.style.position = "absolute";
                bullet.style.pointerEvents = "none";
                bullet.style.zIndex = "1000"; // 提高显示层级
                
                // 计算起始位置（植物中心）
                const plantRect = this.element.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                
                // 应用子弹偏移
                const bulletOffset = this.type.bulletOffset || { x: 0, y: 0 };
                const startX = plantRect.left - lawnRect.left + plantRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.x;
                const startY = plantRect.top - lawnRect.top + plantRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.y;
                
                // 计算目标位置（僵尸中心），应用子弹落点偏移
                const zombieRect = this.targetZombie.element.getBoundingClientRect();
                const bulletTargetOffset = this.bulletTargetOffset || { x: 0, y: 0 };
                const endX = zombieRect.left - lawnRect.left + zombieRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.x;
                const endY = zombieRect.top - lawnRect.top + zombieRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.y;
                
                // 计算子弹飞行方向和距离
                const dx = endX - startX;
                const dy = endY - startY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const directionX = dx / distance;
                const directionY = dy / distance;
                
                // 计算子弹飞行的最大距离（基于攻击范围）
                const lawnGridEl = document.getElementById("lawnGrid");
                const gridRect = lawnGridEl.getBoundingClientRect();
                const cellWidth = gridRect.width / config.gridCols;
                const maxDistance = (this.xRange + 1) * cellWidth; // 攻击范围外一格
                
                // 计算最终目标位置
                const finalX = startX + directionX * maxDistance;
                const finalY = startY + directionY * maxDistance;
                
                // 设置起始位置
                bullet.style.left = startX + "px";
                bullet.style.top = startY + "px";
                
                // 计算方向并设置旋转角度
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                bullet.style.transform = `rotate(${angle + 180}deg)`; // 朝向攻击发起者的反方向
                
                // 添加到草坪
                lawnEl.appendChild(bullet);
                
                // 记录已击中的僵尸
                const hitZombies = new Set();
                
                // 保存this引用和实际攻击力
                const plantInstance = this;
                const actualAttack = this.getActualAttack ? this.getActualAttack() : this.attack;
                const plantType = this.type.name; // 保存植物类型名称，用于后续扩展性
                const knockbackForce = this.knockbackForce;
                
                // 执行动画
                let startTime = null;
                const duration = 500 * (this.type.pierceBulletSpeedMultiplier || 1); // 动画持续时间，受飞行速度影响
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    
                    // 计算当前位置（线性插值）
                    const currentX = startX + (finalX - startX) * progress;
                    const currentY = startY + (finalY - startY) * progress;
                    
                    // 计算当前缩放
                    const scale = 1 + progress * 0.5; // 稍微放大
                    
                    // 计算当前透明度
                    let opacity;
                    if (progress < 0.8) {
                        // 前80%的时间，透明度从0.3增加到1
                        opacity = 0.3 + (progress / 0.8) * 0.7;
                    } else {
                        // 后20%的时间，透明度从1快速降低到0
                        opacity = 1 - ((progress - 0.8) / 0.2) * 1;
                    }
                    
                    // 更新子弹状态
                    bullet.style.left = currentX + "px";
                    bullet.style.top = currentY + "px";
                    bullet.style.transform = `rotate(${angle + 180}deg) scale(${scale})`;
                    bullet.style.opacity = opacity;
                    
                    // 检测子弹是否击中僵尸
                    if (window.game && window.game.zombies) {
                        for (const zombie of window.game.zombies) {
                            if (zombie.health > 0 && !hitZombies.has(zombie)) {
                                const zombieRect = zombie.element.getBoundingClientRect();
                                const zombieCenterX = zombieRect.left - lawnRect.left + zombieRect.width / 2;
                                const zombieCenterY = zombieRect.top - lawnRect.top + zombieRect.height / 2;
                                
                                // 计算子弹与僵尸的距离
                                const distanceToZombie = Math.sqrt(
                                    Math.pow(currentX + (baseSize / 2) * window.innerHeight / 100 - zombieCenterX, 2) +
                                    Math.pow(currentY + (baseSize / 2) * window.innerHeight / 100 - zombieCenterY, 2)
                                );
                                
                                // 如果距离小于僵尸半径，判定为击中
                                if (distanceToZombie < zombieRect.width / 2) {
                                    zombie.takeDamage(actualAttack, plantInstance);
                                    hitZombies.add(zombie);

                    } else {
                        this.temperature = Math.max(-100, this.temperature);
                    }
                    
                    // 应用温度效果
                    this.applyTemperatureEffect();
                    
                    // 递归调用，继续下一格回归
                    this.initTemperatureRegression();
                }, interval);
            }

            // 创建僵尸元素
            createElement(lawnEl) {
                const zombie = document.createElement("div");
                zombie.className = "zombie";
                zombie.style.fontSize = "3.5vmin";
                // 使用配置的盒子大小，默认为 15vmin
                zombie.style.width = this.type.boxWidth || "15vmin";
                zombie.style.height = this.type.boxHeight || "15vmin";
                zombie.style.display = "flex";
                zombie.style.alignItems = "center";
                zombie.style.justifyContent = "center";
                zombie.style.left = this.x + "px";
                zombie.style.top = this.y + "px";
                
                // 应用隐秘透明度
                if (this.stealth > 0) {
                    zombie.style.opacity = 1 - (this.stealth / 100);
                }
                
                // 创建图标容器
                const iconContainer = document.createElement("div");
                iconContainer.className = "zombie-icon";
                iconContainer.innerHTML = this.icon;
                iconContainer.style.width = "100%";
                iconContainer.style.height = "100%";
                iconContainer.style.display = "flex";
                iconContainer.style.alignItems = "center";
                iconContainer.style.justifyContent = "center";
                zombie.appendChild(iconContainer);
                this.iconContainer = iconContainer;
                
                lawnEl.appendChild(zombie);
                this.element = zombie;

                // 创建血条
                this.createHealthBar();
                
                // 开始存在时间计时
                this.startExistTimer();
                
                return zombie;
            }

            // 创建血条
            createHealthBar() {
                if (!this.element) return;

                const healthBar = document.createElement("div");
                healthBar.className = "health-bar";
                
                // 应用血条偏移（如果有配置）
                if (this.type.healthBarOffset) {
                    healthBar.style.bottom = this.type.healthBarOffset;
                }
                
                const healthBarFill = document.createElement("div");
                healthBarFill.className = "health-bar-fill";
                healthBarFill.style.width = "100%";
                
                // 检查是否有自定义血条颜色
                if (this.type.healthBarColor) {
                    healthBarFill.style.backgroundColor = this.type.healthBarColor;
                }
                
                // 添加生命值数值显示
                const healthText = document.createElement("div");
                healthText.className = "health-text";
                healthText.textContent = `${Math.round(this.health)}/${this.maxHealth}`;
                
                healthBar.appendChild(healthBarFill);
                healthBar.appendChild(healthText);
                this.element.appendChild(healthBar);
                this.healthBar = healthBar;
                this.healthText = healthText;
                
                // 初始更新血条状态
                this.updateHealthBar();
            }

            // 更新血条
            updateHealthBar() {
                if (!this.healthBar) return;

                // 血条百分比四舍五入取整数
                const healthPercentage = Math.round((this.health / this.maxHealth) * 100);
                const healthBarFill = this.healthBar.querySelector(".health-bar-fill");
                
                healthBarFill.style.width = healthPercentage + "%";
                
                // 更新生命值数值显示
                if (this.healthText) {
                    this.healthText.textContent = `${Math.round(this.health)}/${this.maxHealth}`;
                }
                
                // 检查是否有自定义血条颜色
                if (this.type.healthBarColor) {
                    // 使用自定义颜色
                    healthBarFill.className = "health-bar-fill";
                    healthBarFill.style.backgroundColor = this.type.healthBarColor;
                } else {
                    // 更新血条颜色
                    healthBarFill.className = "health-bar-fill";
                    if (healthPercentage < 30) {
                        healthBarFill.classList.add("critical");
                    } else if (healthPercentage < 60) {
                        healthBarFill.classList.add("low");
                    }
                }
                
                // 显示或隐藏血条
                if (healthPercentage < 100) {
                    this.healthBar.classList.add("show");
                } else {
                    this.healthBar.classList.remove("show");
                }
            }

            // 显示伤害或治疗
            showDamage(damage, isHeal = false, isTemperatureDamage = false, isIceBreak = false, isQuench = false) {
                if (!this.element) return;

                const damageText = document.createElement("div");
                damageText.className = "damage-text";
                
                // 设置文本内容和样式
                if (isIceBreak) {
                    damageText.classList.add("ice-break");
                    damageText.innerHTML = damage + " <span style='font-size: 50%;'>破冰</span>";
                } else if (isQuench) {
                    damageText.classList.add("quench");
                    damageText.innerHTML = damage + " <span style='font-size: 50%;'>淬火</span>";
                } else if (isHeal) {
                    damageText.textContent = "+" + damage;
                    damageText.style.color = "#4CAF50"; // 绿色
                } else if (isTemperatureDamage) {
                    damageText.textContent = damage;
                    damageText.style.color = "#FFA500"; // 橙色
                } else {
                    damageText.textContent = damage;
                    damageText.style.color = "#FF4444"; // 红色
                }
                
                // 随机位置计算（范围缩小30%）
                const randomX = (Math.random() * 4.2 - 2.1); // -2.1vmin 到 +2.1vmin（缩小30%）
                const randomY = (Math.random() * 2.8 - 7.1); // -7.1vmin 到 -4.3vmin（缩小30%）
                
                damageText.style.left = `calc(50% + ${randomX}vmin)`;
                damageText.style.top = `calc(50% + ${randomY}vmin)`;
                damageText.style.transform = "translate(-50%, -50%)";
                
                this.element.appendChild(damageText);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (damageText.parentNode) {
                        damageText.parentNode.removeChild(damageText);
                    }
                }, 1200);
            }

            // 开始移动
            startMoving() {
                this.moveInterval = setInterval(() => {
                    this.move();
                }, 50);
            }

            // 移动
            move() {
                // 检查僵尸是否到达左侧边界（靠近主人公）
                const leftBoundary = 2.5 * window.innerHeight / 200; // 左侧边界，距离屏幕左侧一定距离（向左移动半格）
                if (this.x <= leftBoundary) {
                    // 僵尸到达左侧边界，攻击主人公
                    this.attackProtagonist();
                    return;
                }
                
                // 检查是否有植物可以攻击
                const plants = window.game ? window.game.plantsOnLawn : [];
                
                // 刺客僵尸的隐秘检测机制
                if (this.name === "刺客僵尸") {
                    this.updateAssassinStealth(plants);
                }
                
                // 如果是独立移动的僵尸，直接朝向最近的植物移动
                if (this.type.independentMovement) {
                    this.moveTowardsNearestPlant(plants);
                    return;
                }
                
                // 普通僵尸的格子限制移动逻辑
                const lawnGridEl = document.getElementById("lawnGrid");
                const lawnRect = document.getElementById("lawn").getBoundingClientRect();
                const gridRect = lawnGridEl.getBoundingClientRect();
                
                // 计算格子大小
                const cellWidth = gridRect.width / config.gridCols;
                const cellHeight = gridRect.height / config.gridRows;
                
                // 计算僵尸所在的格子（使用元素中心点）
                const zombieCol = Math.floor((this.x + 7.5 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                const zombieRow = Math.floor((this.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                
                // 更新僵尸位置跟踪系统！
                if (window.zombiePositionTracker && zombieCol >= 0 && zombieCol < config.gridCols) {
                    window.zombiePositionTracker.updateReachedCol(zombieCol);
                }
                
                // 检查当前格子是否有植物
                let hasPlant = false;
                for (const plant of plants) {
                    // 计算植物所在的格子（使用元素中心点）
                    const plantSize = plant.containerSize || 15;
                    const plantCol = Math.floor((plant.x + (plantSize / 2) * window.innerHeight / 100 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const plantRow = Math.floor((plant.y + (plantSize / 2) * window.innerHeight / 100 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 如果植物和僵尸在同一个格子，并且植物还活着
                    if (plantCol === zombieCol && plantRow === zombieRow && plant.health > 0) {
                        // 检查攻击间隔（使用实际攻击间隔）
                        const currentTime = Date.now();
                        const actualAttackInterval = this.getActualAttackInterval();
                        if (currentTime - this.lastAttackTime >= actualAttackInterval) {
                            this.attackPlant(plant);
                            this.lastAttackTime = currentTime;
                        }
                        hasPlant = true;
                        break;
                    }
                }
                
                // 如果没有植物，继续移动（使用实际移动速度）
                if (!hasPlant) {
                    const actualMoveSpeed = this.getActualMoveSpeed();
                    this.x -= actualMoveSpeed;
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                    }
                }
            }
            
            // 更新刺客僵尸的隐秘状态
            updateAssassinStealth(plants) {
                // 如果没有植物，直接设置隐秘为70
                if (plants.length === 0) {
                    this.setStealth(70);
                    return;
                }
                
                // 计算僵尸所在的格子
                const lawnGridEl = document.getElementById("lawnGrid");
                const lawnRect = document.getElementById("lawn").getBoundingClientRect();
                const gridRect = lawnGridEl.getBoundingClientRect();
                const cellWidth = gridRect.width / config.gridCols;
                const cellHeight = gridRect.height / config.gridRows;
                
                const zombieCol = Math.floor((this.x + 7.5 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                const zombieRow = Math.floor((this.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                
                // 检查3x3范围内是否有植物
                let hasPlantInRange = false;
                for (const plant of plants) {
                    if (plant.health <= 0) continue;
                    
                    // 计算植物所在的格子
                    const plantSize = plant.containerSize || 15;
                    const plantCol = Math.floor((plant.x + (plantSize / 2) * window.innerHeight / 100 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const plantRow = Math.floor((plant.y + (plantSize / 2) * window.innerHeight / 100 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 检查是否在3x3范围内
                    const distanceX = Math.abs(plantCol - zombieCol);
                    const distanceY = Math.abs(plantRow - zombieRow);
                    if (distanceX <= 1 && distanceY <= 1) {
                        hasPlantInRange = true;
                        break;
                    }
                }
                
                // 设置隐秘数值
                const newStealth = hasPlantInRange ? 0 : 70;
                this.setStealth(newStealth);
            }
            
            // 设置隐秘数值
            setStealth(stealthValue) {
                if (this.stealth === stealthValue) return;
                
                this.stealth = stealthValue;
                
                // 更新透明度
                if (this.element) {
                    this.element.style.opacity = 1 - (this.stealth / 100);
                }
                
                // 更新速度
                this.speed = stealthValue > 0 ? this.baseSpeed : Math.max(0, this.baseSpeed - 1);
            }
            
            // 独立移动：朝向最近的植物移动
            moveTowardsNearestPlant(plants) {
                const actualMoveSpeed = this.getActualMoveSpeed();
                
                // 找到最近的植物
                let nearestPlant = null;
                let minDistance = Infinity;
                
                for (const plant of plants) {
                    if (plant.health > 0) {
                        // 计算距离（使用欧几里得距离）
                        const dx = plant.x - this.x;
                        const dy = plant.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < minDistance) {
                            minDistance = distance;
                            nearestPlant = plant;
                        }
                    }
                }
                
                if (nearestPlant && minDistance > 0) {
                    // 先检查是否在攻击范围内
                    const attackRange = this.type.attackRange || actualMoveSpeed * 2;
                    
                    // 如果在攻击范围内，直接攻击，不移动
                    if (minDistance <= attackRange) {
                        const currentTime = Date.now();
                        const actualAttackInterval = this.getActualAttackInterval();
                        if (currentTime - this.lastAttackTime >= actualAttackInterval) {
                            this.attackPlant(nearestPlant);
                            this.lastAttackTime = currentTime;
                        }
                        // 不进行移动，直接返回
                        return;
                    }
                    
                    // 如果不在攻击范围内，才移动
                    // 计算移动方向向量
                    const dx = nearestPlant.x - this.x;
                    const dy = nearestPlant.y - this.y;
                    
                    // 归一化向量
                    const length = Math.sqrt(dx * dx + dy * dy);
                    const dirX = dx / length;
                    const dirY = dy / length;
                    
                    // 移动僵尸
                    this.x += dirX * actualMoveSpeed;
                    this.y += dirY * actualMoveSpeed;
                    
                    // 更新元素位置
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                        this.element.style.top = this.y + "px";
                    }
                } else {
                    // 如果没有找到植物，继续向左移动
                    this.x -= actualMoveSpeed;
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                    }
                }
            }
            
            // 攻击主人公
            attackProtagonist() {
                // 触发攻击动画
                if (this.element) {
                    this.element.classList.add('attacking');
                    setTimeout(() => {
                        this.element.classList.remove('attacking');
                    }, 300);
                }
                
                // 立即结束当前波次，停止继续生成僵尸
                if (window.game && window.config) {
                    // 1. 清除僵尸生成计时器
                    if (window.config.zombieSpawnTimer) {
                        clearInterval(window.config.zombieSpawnTimer);
                        window.config.zombieSpawnTimer = null;
                    }
                    
                    // 2. 清除下一波计时器
                    if (window.config.waveTimer) {
                        clearTimeout(window.config.waveTimer);
                        window.config.waveTimer = null;
                    }
                    
                    // 3. 清空待生成的僵尸列表，防止快速刷新机制继续生成
                    window.config.zombiesToSpawn = [];
                    window.config.zombieSpawnIndex = 0;
                    
                    console.log("[波次] 僵尸攻击到主人公，立即结束当前波次！");
                }
                
                // 游戏失败
                gameOver();
            }

            // 攻击植物
            attackPlant(plant) {
                // 播放近战攻击音效
                window.soundManager.playSound('Sound effects/atk.mp3', 0.8);
                
                // 记录正在攻击的植物
                this.attackingPlant = plant;
                this.lastAttackPlantTime = Date.now();
                
                // 如果僵尸有温度附加，给植物施加温度
                if (this.temperatureBonus !== undefined && this.temperatureBonus !== 0) {
                    plant.temperature = Math.max(-100, Math.min(100, plant.temperature + this.temperatureBonus));
                    plant.applyTemperatureEffect();
                }
                
                plant.takeDamage(this.attack, this);
                
                // 触发攻击动画
                if (this.element) {
                    this.element.classList.add('attacking');
                    setTimeout(() => {
                        this.element.classList.remove('attacking');
                    }, 300);
                }
            }
            
            // 开始存在时间计时
            startExistTimer() {
                this.existTimer = setInterval(() => {
                    this.counter++;
                    
                    // 弓箭僵尸特殊逻辑
                    // 检查是否是弓箭僵尸类型（包括强壮弓箭僵尸）
                    if (this.type.name === "弓箭僵尸" || this.type.name === "强壮弓箭僵尸") {
                        this.checkArcherLogic();
                    }
                }, 1000);
            }
            
            // 检查弓箭僵尸逻辑
            checkArcherLogic() {
                // 获取计数器阈值，支持自定义
                const threshold1 = this.type.counterThreshold1 || 5;
                const threshold2 = this.type.counterThreshold2 || 8;
                const defaultSpeed = this.type.speed || 1;
                
                // 当计数器大于等于阈值1时，改变图片为攻击状态，移动速度变为0
                if (this.counter >= threshold1 && this.speed > 0) {
                    this.speed = 0;
                    if (this.attackIcon && this.iconContainer) {
                        this.iconContainer.innerHTML = this.attackIcon;
                    }
                    // 第二段计时开头，播放拉弓音效
                    this.playDrawSound();
                }
                
                // 当计数器大于阈值2时，发射弓箭并重置状态
                if (this.counter > threshold2) {
                    // 第二段计时结尾，播放发射音效
                    this.playFireSound();
                    this.fireArrow();
                    // 重置状态
                    this.counter = 0;
                    this.speed = defaultSpeed;
                    if (this.iconContainer) {
                        this.iconContainer.innerHTML = this.icon;
                    }
                }
            }
            
            // 播放拉弓音效
            playDrawSound() {
                if (this.type.drawSound) {
                    window.soundManager.playSound(this.type.drawSound, 0.8);
                }
            }
            
            // 播放发射音效
            playFireSound() {
                if (this.type.fireSound) {
                    window.soundManager.playSound(this.type.fireSound, 0.8);
                }
            }
            
            // 播放弓箭命中音效
            playArrowHitSound() {
                window.soundManager.playSound('Sound effects/arrow_bullet.mp3', 0.8);
            }
            
            // 发射弓箭
            fireArrow() {
                if (!this.element) return;
                
                // 创建弓箭子弹
                const arrow = document.createElement("div");
                arrow.className = "arrow";
                arrow.style.position = "absolute";
                arrow.style.width = "7.5vmin";
                arrow.style.height = "7.5vmin";
                arrow.style.display = "flex";
                arrow.style.alignItems = "center";
                arrow.style.justifyContent = "center";
                arrow.innerHTML = "<img src='tupian/arrow_bullet.png' style='width: 100%; height: 100%; object-fit: contain;'>";
                arrow.style.left = this.x + "px";
                arrow.style.top = this.y + 2.5 * window.innerHeight / 200 + "px";
                arrow.style.zIndex = "100";
                
                const lawn = document.getElementById("lawn");
                lawn.appendChild(arrow);
                
                // 弓箭飞行动画
                const arrowSpeed = 10;
                const arrowInterval = setInterval(() => {
                    const arrowLeft = parseInt(arrow.style.left) || 0;
                    if (arrowLeft <= 0) {
                        clearInterval(arrowInterval);
                        if (arrow.parentNode) {
                            arrow.parentNode.removeChild(arrow);
                        }
                        return;
                    }
                    
                    // 移动弓箭
                    arrow.style.left = (arrowLeft - arrowSpeed) + "px";
                    
                    // 检查是否击中植物
                    const plants = window.game ? window.game.plantsOnLawn : [];
                    const lawnGridEl = document.getElementById("lawnGrid");
                    const lawnRect = document.getElementById("lawn").getBoundingClientRect();
                    const gridRect = lawnGridEl.getBoundingClientRect();
                    
                    // 计算格子大小
                    const cellWidth = gridRect.width / 9;
                    const cellHeight = gridRect.height / 5;
                    
                    // 计算弓箭所在的格子
                    const arrowCol = Math.floor((arrowLeft + 3.75 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const arrowRow = Math.floor((parseInt(arrow.style.top) + 3.75 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 检查是否击中植物
                    for (const plant of plants) {
                        // 计算植物所在的格子
                        const plantSize = plant.containerSize || 15;
                        const plantCol = Math.floor((plant.x + (plantSize / 2) * window.innerHeight / 100 - (gridRect.left - lawnRect.left)) / cellWidth);
                        const plantRow = Math.floor((plant.y + (plantSize / 2) * window.innerHeight / 100 - (gridRect.top - lawnRect.top)) / cellHeight);
                        
                        // 如果弓箭和植物在同一个格子，并且植物还活着
                        if (plantCol === arrowCol && plantRow === arrowRow && plant.health > 0) {
                            // 播放弓箭命中音效
                            this.playArrowHitSound();
                            // 对植物造成伤害
                            plant.takeDamage(this.attack, this);
                            // 清除弓箭
                            clearInterval(arrowInterval);
                            if (arrow.parentNode) {
                                arrow.parentNode.removeChild(arrow);
                            }
                            return;
                        }
                    }
                }, 20);
            }

            // 受到伤害
            takeDamage(damage, source = null) {
                let finalDamage = damage;
                let isIceBreak = false;
                let isQuench = false;
                
                // 判断是否触发破冰伤害：攻击者有正温度附加，被攻击者有负温度
                if (source && source.temperatureBonus > 0 && this.temperature < 0) {
                    finalDamage *= 3;
                    isIceBreak = true;
                }
                // 判断是否触发淬火伤害：攻击者有负温度附加，被攻击者有正温度
                else if (source && source.temperatureBonus < 0 && this.temperature > 0) {
                    finalDamage *= 2;
                    isQuench = true;
                }
                
                // 应用隐秘减伤
                if (this.stealth > 0) {
                    finalDamage *= (1 - this.stealth / 100);
                }
                
                // 应用护甲减伤：最终伤害 = 伤害 - 护甲，最低为1
                const damageAfterArmor = Math.max(1, finalDamage - this.armor);
                
                // 伤害四舍五入取整数
                const roundedDamage = Math.round(damageAfterArmor);
                this.health -= roundedDamage;
                this.showDamage(roundedDamage, false, false, isIceBreak, isQuench);
                this.updateHealthBar();
                
                // 触发受攻击动画
                if (this.element) {
                    this.element.classList.add('hurt');
                    setTimeout(() => {
                        this.element.classList.remove('hurt');
                    }, 300);
                }
                
                if (this.health <= 0) {
                    this.die(source);
                }
            }

            // 死亡
            die(source = null) {
                if (this.moveInterval) {
                    clearInterval(this.moveInterval);
                }
                if (this.existTimer) {
                    clearInterval(this.existTimer);
                }
                
                // 检查是否需要播放死亡动画（默认播放）
                const shouldPlayDeathAnimation = this.type.shouldPlayDeathAnimation !== false;
                if (shouldPlayDeathAnimation) {
                    // 创建死亡爆裂动画
                    this.createDeathEffect();
                }
                
                // 检查是否需要在死亡时转化为其他僵尸
                // 检查伤害来源是否阻断死亡产生单位（湮灭伤害）
                const shouldTransform = !source || !source.blockDeathSpawn;
                
                if (shouldTransform && this.type.transformOnDeath && window.game) {
                    const { type: transformType, count, inheritIndex } = this.type.transformOnDeath;
                    const transformZombieType = window.game.zombieTypes[transformType];

                // 偏移范围（转换为vmin）
                const offsetRange = 3.75 * vminToPx;
                for (let i = 0; i < effectCount; i++) {

                    const deathEffect = document.createElement("div");
                    deathEffect.className = "zombie-death-effect";
                    // 随机位置偏移（围绕僵尸中心）
                    const offsetX = (Math.random() - 0.5) * offsetRange;
                    const offsetY = (Math.random() - 0.5) * offsetRange;
                    // 随机角度
                    const randomRotation = Math.random() * 360;
                    // 随机大小变化（原来的80%基础上变化）
                    const scaleVariation = 0.7 + Math.random() * 0.6; // 0.7-1.3倍
                    const effectSize = 6.4 * scaleVariation; // 8vmin * 80% = 6.4vmin
                    // 初始化样式
                    deathEffect.style.left = (centerX + offsetX) + "px";
                    deathEffect.style.top = (centerY + offsetY) + "px";
                    deathEffect.style.width = effectSize + "vmin";
                    deathEffect.style.height = effectSize + "vmin";
                    deathEffect.style.opacity = "0.8";
                    deathEffect.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg) scale(0.15)`;
                    // 添加到草坪
                    lawnEl.appendChild(deathEffect);
                    // 使用requestAnimationFrame实现快速动画
                    const startTime = performance.now();
                    const duration = 250; // 250ms更快的动画
                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        // easeOut动画曲线
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        // 更新缩放和透明度
                        const scale = 0.15 + easeOut * 3.35; // 0.15 → 3.5
                        const opacity = 0.8 - (0.8 * progress);
                        deathEffect.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg) scale(${scale})`;
                        deathEffect.style.opacity = opacity;
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            // 动画结束立即移除
                            if (deathEffect.parentNode) {
                                deathEffect.remove();
                            }
                        }

        // 初始化游戏
        function initGame() {
            console.log("[游戏] 初始化游戏，当前关卡:", config.currentLevel);
            
            // 获取DOM元素
            sunCountEl = document.getElementById("sunCount");
            lawnEl = document.getElementById("lawn");
            lawnGridEl = document.getElementById("lawnGrid");
            plantBarEl = document.getElementById("plantBar");
            
            // 更新初始阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }

            if (config.currentLevel >= 101 && config.currentLevel <= 198) {
                console.log("[游戏] 检测到肉鸽模式，初始化彬彬升级系统");
                if (typeof binbinUpgradeSystem !== 'undefined') {
                    binbinUpgradeSystem.init(config.plants);
                }

            initLawn();

            initKeyboardShortcuts();

            startLevel(config.currentLevel);

        // 启动关卡时长计时器
        function startLevelTimeTimer() {
            if (config.levelTimeTimer) {
                clearInterval(config.levelTimeTimer);
            }
            config.levelTimeTimer = setInterval(() => {
                if (!config.levelComplete) {
                    config.levelTime++;
                }
            }, 1000);
        }
        
        // 停止关卡时长计时器
        function stopLevelTimeTimer() {
            if (config.levelTimeTimer) {
                clearInterval(config.levelTimeTimer);
                config.levelTimeTimer = null;
            }
        }
        
        // 重置关卡时长
        function resetLevelTime() {
            stopLevelTimeTimer();
            config.levelTime = 0;
        }
        
        // 开始关卡
        function startLevel(levelId) {
            // 检查是否是肉鸽模式关卡
            let level;
            if (levelId >= 101 && levelId <= 120) {
                // 肉鸽模式关卡
                level = rogueLevels.find(l => l.id === levelId);
            } else {
                // 普通关卡
                level = levels.find(l => l.id === levelId);
            }
            
            if (!level) return;
            
            config.currentLevel = levelId;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            config.zombieSpawnIndex = 0; // 重置僵尸生成索引
            
            // 清除波次超时计时器
            if (config.waveTimeoutTimer) {
                clearTimeout(config.waveTimeoutTimer);
                config.waveTimeoutTimer = null;
            }
            
            // 进入新关卡时通知难度调节系统！
            if (window.difficultyAdjustmentSystem) {
                window.difficultyAdjustmentSystem.onEnterLevel();
            }
            
            // 重置僵尸位置跟踪系统！
            if (window.zombiePositionTracker) {
                window.zombiePositionTracker.reset();
            }
            
            // 重置关卡时长并启动计时器
            resetLevelTime();
            startLevelTimeTimer();
            
            console.log(`[游戏] 开始第 ${levelId} 关: ${level.name}`);
            
            // 更新关卡显示
            const levelDisplayEl = document.getElementById("levelDisplay");
            if (levelDisplayEl) {
                levelDisplayEl.textContent = level.name;
            }
            
            // 更新僵尸属性增幅/削减显示（仅肉鸽模式）
            const zombieEffectsDisplay = document.getElementById("zombieEffectsDisplay");
            if (zombieEffectsDisplay) {
                if (levelId >= 101 && levelId <= 120 && typeof nightmareGlobalData !== 'undefined') {
                    let levelHealthPercent = 0;
                    let levelAttackPercent = 0;
                    let levelSpeedPercent = 0;
                    
                    if (typeof rogueLevels !== 'undefined') {
                        const currentLevel = rogueLevels.find(l => l.id === levelId);
                        if (currentLevel) {
                            levelHealthPercent = currentLevel.zombieHealthPercent || 0;
                            levelAttackPercent = currentLevel.zombieAttackPercent || 0;
                            levelSpeedPercent = currentLevel.zombieSpeedPercent || 0;
                        }
                    }
                    
                    const effectsText = nightmareGlobalData.getZombieEffectsDisplay(levelHealthPercent, levelAttackPercent, levelSpeedPercent);
                    zombieEffectsDisplay.textContent = effectsText;
                    zombieEffectsDisplay.style.display = effectsText ? "block" : "none";
                } else {
                    zombieEffectsDisplay.style.display = "none";
                }
            }
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重新初始化植物栏，根据当前关卡解锁相应等级的植物
            initPlantBar();
            
            // 开始第一波
            startNextWave();
        }
        
        // 开始下一波
        function startNextWave() {
            // 清除上一个波次的超时计时器
            if (config.waveTimeoutTimer) {
                clearTimeout(config.waveTimeoutTimer);
                config.waveTimeoutTimer = null;
            }
            
            // 标记退出波次间隔
            if (window.waveIntervalSystem) {
                // 下一波的波次编号是当前波次+1
                const nextWaveNumber = config.currentWave ? config.currentWave + 1 : 1;
                window.waveIntervalSystem.exitWaveInterval(nextWaveNumber);
            }
            
            // 检查是否是肉鸽模式关卡
            let level;
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式关卡
                level = rogueLevels.find(l => l.id === config.currentLevel);
            } else {
                // 普通关卡
                level = levels.find(l => l.id === config.currentLevel);
            }
            
            if (!level) return;
            
            if (config.currentWave >= level.waves.length) {
                // 所有波次都已完成
                return;
            }
            
            const wave = level.waves[config.currentWave];
            config.currentWave++;
            config.wavesSpawned++;
            
            // 如果是肉鸽模式，每次都重新生成僵尸配置（确保噩梦因子效果正确应用）
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                wave.zombies = generateZombiesFromThreat(wave, config.currentLevel, config.levelTime);
            }
            
            console.log(`[波次] 开始第 ${wave.waveNumber} 波`);
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                if (wave.calculatedThreat !== undefined && wave.finalThreat !== undefined) {
                    console.log(`[波次] 原始威胁值: ${wave.calculatedThreat.toFixed(2)}, 最终威胁值: ${wave.finalThreat.toFixed(2)}`);
                }
            }
            
            // 计算本波僵尸总数
            let totalZombies = 0;
            for (const zombieInfo of wave.zombies) {
                totalZombies += zombieInfo.count;
            }
            config.zombiesRemaining = totalZombies;
            
            // 记录波次开始时间
            config.waveStartTime = Date.now();
            
            // 只在肉鸽模式添加波次超时检查
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 设置波次超时计时器（60秒）
                config.waveTimeoutTimer = setTimeout(() => {
                    endCurrentWaveDueToTimeout(wave);
                }, 60000);
                console.log(`[波次] 第 ${wave.waveNumber} 波超时计时器已设置（60秒后超时）`);
            }
            
            // 开始生成僵尸
            spawnWaveZombies(wave);
        }
        
        // 波次超时，立即结束当前波次
        function endCurrentWaveDueToTimeout(wave) {
            console.log(`[波次] 第 ${wave.waveNumber} 波持续时间已超过 60 秒，立即结束波次！`);
            
            // 清除僵尸生成计时器
            if (config.zombieSpawnTimer) {
                clearTimeout(config.zombieSpawnTimer);
                config.zombieSpawnTimer = null;
            }
            
            // 清除波次超时计时器
            config.waveTimeoutTimer = null;
            
            // 检查是否是最后一波
            let currentLevel;
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式关卡
                currentLevel = rogueLevels.find(l => l.id === config.currentLevel);
            } else {
                // 普通关卡
                currentLevel = levels.find(l => l.id === config.currentLevel);
            }
            
            if (currentLevel && wave.isLast) {
                // 最后一波，开始检查关卡完成
                checkLevelComplete();
            } else {
                // 不是最后一波，先进入缓冲间隔
                if (config.waveTimer) {
                    clearTimeout(config.waveTimer);
                }
                
                // 使用波次间隔属性，如果没有则使用spawnInterval作为默认值
                const waveInterval = wave.waveInterval || wave.spawnInterval;
                
                // 定义进入波次间隔的回调函数
                const enterWaveIntervalCallback = () => {
                    config.waveTimer = setTimeout(startNextWave, waveInterval);
                    if (window.waveIntervalSystem) {
                        window.waveIntervalSystem.enterWaveInterval(wave.waveNumber);
                    }
                };
                
                // 进入缓冲间隔（肉鸽模式使用）
                if (config.currentLevel >= 101 && config.currentLevel <= 199 && window.waveIntervalSystem) {
                    window.waveIntervalSystem.enterBufferInterval(wave.waveNumber, enterWaveIntervalCallback);

        // 生成波次僵尸
        function spawnWaveZombies(wave) {
            let zombiesToSpawn = [];
            
            // 收集所有要生成的僵尸
            for (const zombieInfo of wave.zombies) {
                for (let i = 0; i < zombieInfo.count; i++) {
                    zombiesToSpawn.push(zombieInfo.type);
                }
            }
            
            // 随机打乱僵尸顺序
            zombiesToSpawn = zombiesToSpawn.sort(() => Math.random() - 0.5);
            
            // 初始化间隔系统状态
            config.nextSpawnIntervalModifier = 1.0;
            config.nextSpawnIntervalBonus = 0;
            config.hasPendingIntervalChange = false;
            
            // 逐个生成僵尸（使用递归setTimeout，支持动态间隔调整）
            let spawnIndex = 0;
            
            function spawnNext() {
                if (spawnIndex >= zombiesToSpawn.length) {
                    // 波次正常结束，清除波次超时计时器
                    if (config.waveTimeoutTimer) {
                        clearTimeout(config.waveTimeoutTimer);
                        config.waveTimeoutTimer = null;
                    }
                    
                    // 检查是否是最后一波
                    let currentLevel;
                    if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                        // 肉鸽模式关卡
                        currentLevel = rogueLevels.find(l => l.id === config.currentLevel);
                    } else {
                        // 普通关卡
                        currentLevel = levels.find(l => l.id === config.currentLevel);
                    }
                    
                    if (currentLevel && wave.isLast) {
                        // 最后一波，开始检查关卡完成
                        checkLevelComplete();
                    } else {
                        // 不是最后一波，先进入缓冲间隔
                        if (config.waveTimer) {
                            clearTimeout(config.waveTimer);
                        }
                        
                        // 使用波次间隔属性，如果没有则使用spawnInterval作为默认值
                        const waveInterval = wave.waveInterval || wave.spawnInterval;
                        
                        // 定义进入波次间隔的回调函数
                        const enterWaveIntervalCallback = () => {
                            config.waveTimer = setTimeout(startNextWave, waveInterval);
                            if (window.waveIntervalSystem) {
                                window.waveIntervalSystem.enterWaveInterval(wave.waveNumber);
                            }
                        };
                        
                        // 进入缓冲间隔（肉鸽模式使用）
                        if (config.currentLevel >= 101 && config.currentLevel <= 199 && window.waveIntervalSystem) {
                            window.waveIntervalSystem.enterBufferInterval(wave.waveNumber, enterWaveIntervalCallback);
                        } else {
                            // 普通模式直接进入波次间隔
                            enterWaveIntervalCallback();
                        }
                    }
                    return;
                }
                
                const zombieType = zombiesToSpawn[spawnIndex];
                spawnZombieByType(zombieType);
                spawnIndex++;
                config.zombieSpawnIndex = spawnIndex; // 同步更新到 config！
                config.zombiesSpawned++;
                
                // 计算下一次的间隔
                let nextInterval = config.currentWaveSpawnInterval;
                
                // 如果有待应用的间隔变化
                if (config.hasPendingIntervalChange) {
                    nextInterval = nextInterval * config.nextSpawnIntervalModifier;
                    nextInterval = nextInterval + config.nextSpawnIntervalBonus;
                    
                    // 重置状态
                    config.hasPendingIntervalChange = false;
                    config.nextSpawnIntervalModifier = 1.0;
                    config.nextSpawnIntervalBonus = 0;
                }
                
                // 确保间隔不会太小或太大
                nextInterval = Math.max(50, Math.min(10000, nextInterval));
                
                // 设置下一个定时器
                config.zombieSpawnTimer = setTimeout(spawnNext, nextInterval);
            }
            
            // 保存配置，用于快速刷新机制
            config.zombieSpawnIndex = spawnIndex;
            config.zombiesToSpawn = zombiesToSpawn;
            config.currentWaveSpawnInterval = wave.spawnInterval;
            
            // 定义快速刷新下一个僵尸的函数
            config.spawnNextZombie = function() {
                if (config.zombieSpawnIndex >= config.zombiesToSpawn.length) {
                    return;
                }
                
                // 清除当前定时器
                if (config.zombieSpawnTimer) {
                    clearTimeout(config.zombieSpawnTimer);
                    config.zombieSpawnTimer = null;
                }
                
                // 快速生成下一个僵尸
                const zombieType = config.zombiesToSpawn[config.zombieSpawnIndex];
                spawnZombieByType(zombieType);
                config.zombieSpawnIndex++;
                config.zombiesSpawned++;
                
                // 继续生成剩余僵尸
                if (config.zombieSpawnIndex < config.zombiesToSpawn.length) {
                    // 计算下一次的间隔
                    let nextInterval = config.currentWaveSpawnInterval;
                    
                    // 如果有待应用的间隔变化
                    if (config.hasPendingIntervalChange) {
                        nextInterval = nextInterval * config.nextSpawnIntervalModifier;
                        nextInterval = nextInterval + config.nextSpawnIntervalBonus;
                        
                        // 重置状态
                        config.hasPendingIntervalChange = false;
                        config.nextSpawnIntervalModifier = 1.0;
                        config.nextSpawnIntervalBonus = 0;
                    }
                    
                    // 确保间隔不会太小或太大
                    nextInterval = Math.max(50, Math.min(10000, nextInterval));
                    
                    // 设置下一个定时器
                    config.zombieSpawnTimer = setTimeout(spawnNext, nextInterval);
                } else {
                    // 已经是最后一个僵尸，检查完成
                    spawnNext();
                }
            };
            
            // 开始生成
            config.zombieSpawnTimer = setTimeout(spawnNext, config.currentWaveSpawnInterval);
        }
