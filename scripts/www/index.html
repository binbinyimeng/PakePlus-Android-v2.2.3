<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸</title>
    <!-- 引入Tailwind CSS快速样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 禁止选中，优化游戏体验 */
        }

        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 模式选择界面样式 */
        .mode-select-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('tupian/background.png') no-repeat center center;
            background-size: cover;
            z-index: 9999;
        }

        .mode-select-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4vmin;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 2vmin;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 3vmin rgba(0, 0, 0, 0.5);
        }

        .game-title {
            font-size: 6vmin;
            color: #FFD700;
            text-shadow: 0 0.3vmin 0.6vmin rgba(0, 0, 0, 0.8),
                         0 0 2vmin rgba(255, 215, 0, 0.5);
            margin-bottom: 1vmin;
            font-weight: bold;
        }

        .game-subtitle {
            font-size: 2.5vmin;
            color: #FFFFFF;
            margin-bottom: 5vmin;
            text-shadow: 0 0.2vmin 0.4vmin rgba(0, 0, 0, 0.8);
        }

        .mode-buttons {
            display: flex;
            gap: 4vmin;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4vmin 3vmin;
            border: none;
            border-radius: 1.5vmin;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 25vmin;
            min-height: 30vmin;
            box-shadow: 0 0.5vmin 1.5vmin rgba(0, 0, 0, 0.4);
        }

        .mode-button:hover {
            transform: translateY(-1vmin) scale(1.05);
            box-shadow: 0 1vmin 2.5vmin rgba(0, 0, 0, 0.6);
        }

        .mode-button:active {
            transform: translateY(0) scale(0.98);
        }

        .classic-mode {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: 0.3vmin solid #81C784;
        }

        .classic-mode:hover {
            background: linear-gradient(135deg, #66BB6A, #43A047);
        }

        .rogue-mode {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            border: 0.3vmin solid #CE93D8;
        }

        .rogue-mode:hover {
            background: linear-gradient(135deg, #BA68C8, #8E24AA);
        }

        .mode-icon {
            font-size: 6vmin;
            margin-bottom: 1.5vmin;
        }

        .mode-name {
            font-size: 2.5vmin;
            color: white;
            font-weight: bold;
            margin-bottom: 1vmin;
            text-shadow: 0 0.2vmin 0.4vmin rgba(0, 0, 0, 0.5);
        }

        .mode-desc {
            font-size: 1.6vmin;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        /* 核心：16:9比例锁定游戏容器，永不形变 */
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: url('tupian/background.png') no-repeat center center;
            background-size: cover;
        }
        
        @media screen and (min-aspect-ratio: 16/9) {
            .game-container {
                width: calc(100vh * 16 / 9);
                height: 100vh;
            }
        }
        
        @media screen and (max-aspect-ratio: 16/9) {
            .game-container {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }
        
        .game-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: hidden;
        }
        
        @media screen and (min-aspect-ratio: 16/9) {
            .game-content {
                height: 100vh;
                width: calc(100vh * 16 / 9);
                left: 50%;
                transform: translateX(-50%);
            }
        }
        
        @media screen and (max-aspect-ratio: 16/9) {
            .game-content {
                width: 100vw;
                height: calc(100vw * 9 / 16);
                top: 50%;
                transform: translateY(-50%);
            }
        }

        /* 游戏顶部：阳光+标题 */
        .game-header {
            height: 12%;
            background: transparent;
            display: flex;
            align-items: center;
            padding: 0 2vmin;
            color: white;
            font-weight: bold;
            font-size: 1.8vmin;
        }

        /* 阳光数值样式 */
        .sun-count {
            background: #ffd700;
            color: #000;
            padding: 0.8vmin 1.6vmin;
            border-radius: 0.4vmin;
            margin-right: 3vmin;
            font-size: 2vmin;
        }
        
        /* 关卡显示样式 */
        .level-display {
            background: #4CAF50;
            color: white;
            padding: 0.8vmin 1.6vmin;
            border-radius: 0.4vmin;
            margin-right: 3vmin;
            font-size: 2vmin;
            font-weight: bold;
            text-align: center;
            min-width: 10vmin;
            box-shadow: 0 0.2vmin 0.4vmin rgba(0, 0, 0, 0.2);
        }

        /* 僵尸属性增幅/削减显示样式 */
        .zombie-effects-display {
            background: rgba(255, 87, 51, 0.9);
            color: white;
            padding: 0.6vmin 1.2vmin;
            border-radius: 0.4vmin;
            margin-left: auto;
            font-size: 1.6vmin;
            font-weight: bold;
            text-align: right;
            box-shadow: 0 0.2vmin 0.4vmin rgba(0, 0, 0, 0.2);
        }

        /* 游戏主区域：草坪+植物栏 */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 9×5正方形草坪地图 */
        .lawn {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            padding: 1vmin;
            position: relative;
        }

        .lawn-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* 10列 */
            grid-template-rows: repeat(5, 1fr);    /* 5行 */
            gap: 0.2vmin;
            width: 90%; /* 左右留出空间 */
            aspect-ratio: 10/5; /* 10列5行的比例 */
        }

        /* 草坪方格：纯正方形种植区域 */
        .grid-cell {
            background: rgba(255, 255, 255, 0.1);
            border: 0.1vmin dashed rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background 0.2s;
            aspect-ratio: 1; /* 确保每个格子是正方形 */
            position: relative;
            z-index: 1; /* 确保格子在最上层，可以点击 */
        }
        .grid-cell:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* 植物选择栏容器 */
        .plant-bar-container {
            display: flex;
            align-items: center;
            gap: 2vmin;
            padding: 0 2vmin;
            margin-top: -5vmin; /* 上移一大段距离 */
        }

        /* 植物选择栏 */
        .plant-bar {
            height: 12vmin;
            min-height: 17vmin;
            background: transparent; /* 透明背景 */
            display: flex;
            align-items: center;
            gap: 0.2vmin; /* 间隔减少到原来的10% */
            padding: 0 2vmin;
            overflow: visible; /* 允许内容溢出 */
        }

        /* 钱显示样式调整 */
        .sun-count {
            background: #ffd700;
            color: #000;
            padding: 0.8vmin 1.6vmin;
            border-radius: 0.4vmin;
            font-size: 2vmin;
            font-weight: bold;
            min-width: 8vmin;
            text-align: center;
            box-shadow: 0 0.2vmin 0.4vmin rgba(0, 0, 0, 0.2);
        }

        /* 植物卡槽样式 */
        .plant-card {
            width: 8vmin;
            height: 8vmin;
            background: rgba(160, 82, 45, 0.7); /* 棕色背景 */
            border: 0.2vmin solid rgba(205, 133, 63, 0.7); /* 棕褐色边框 */
            border-radius: 0.4vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-size: 1.4vmin;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
        .plant-card:hover {
            transform: scale(1.2);
            border-color: #ffd700;
            border-width: 0.4vmin;
            box-shadow: 0 0 1.5vmin rgba(255, 215, 0, 0.6);
            z-index: 100;
        }
        .plant-card.selected {
            border-color: #ff4444;
            border-width: 0.5vmin;
            background: rgba(139, 69, 19, 0.9); /* 深棕色背景 */
            transform: scale(1.25);
            box-shadow: 0 0 2vmin rgba(255, 68, 68, 0.7);
            z-index: 100;
            animation: pulse-border 1s infinite;
        }
        
        @keyframes pulse-border {
            0%, 100% {
                box-shadow: 0 0 2vmin rgba(255, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 3vmin rgba(255, 68, 68, 1);
            }
        }

        /* 钱不足时的植物卡槽样式 */
        .plant-card.not-enough-sun {
            opacity: 0.5;
            filter: brightness(0.7);
            cursor: not-allowed;
            transition: all 0.3s;
        }

        .plant-card.not-enough-sun:hover {
            transform: none;
            border-color: rgba(205, 133, 63, 0.7);
        }

        /* 钱不足时的价格显示样式 */
        .plant-card.not-enough-sun .plant-price {
            color: #ff0000 !important;
            font-weight: bold;
            text-shadow: 0 0 0.3vmin rgba(255, 0, 0, 0.5);
        }
        
        /* 铲子工具样式 */
        .shovel-tool {
            width: 8vmin;
            height: 8vmin;
            background: rgba(160, 82, 45, 0.7); /* 棕色背景 */
            border: 0.2vmin solid rgba(205, 133, 63, 0.7); /* 棕褐色边框 */
            border-radius: 0.4vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-size: 1.4vmin;
            flex-direction: column;
            position: relative;
            margin-left: 2vmin;
            z-index: 1;
        }
        .shovel-tool:hover {
            transform: scale(1.2);
            border-color: #ffd700;
            border-width: 0.4vmin;
            box-shadow: 0 0 1.5vmin rgba(255, 215, 0, 0.6);
            z-index: 100;
        }
        .shovel-tool.selected {
            border-color: #ff4444;
            border-width: 0.5vmin;
            background: rgba(139, 69, 19, 0.9); /* 深棕色背景 */
            transform: scale(1.25);
            box-shadow: 0 0 2vmin rgba(255, 68, 68, 0.7);
            z-index: 100;
            animation: pulse-border 1s infinite;
        }
        .shovel-tool .shovel-icon {
            font-size: 3vmin;
            font-weight: bold;
        }
        
        /* 植物价格样式 */
        .plant-card .price {
            position: absolute;
            bottom: 0.5vmin;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.2vmin 0;
            border-radius: 0 0 0.2vmin 0.2vmin;
            z-index: 10;
            font-size: 1.2vmin;
        }
        
        /* 攻击速度加成显示样式 */
        .attack-speed-bonus {
            font-size: 0.8vmin;
            color: #90e0ef;
            position: absolute;
            top: 0.2vmin;
            right: 0.2vmin;
            background: rgba(0, 180, 216, 0.3);
            padding: 0.2vmin 0.4vmin;
            border-radius: 0.3vmin;
            font-weight: bold;
            z-index: 10;
        }

        /* 游戏元素通用样式 */
        .plant, .zombie, .pea {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none; /* 不阻挡点击事件 */
        }

        /* 血条样式 - 棱角分明的长方形 */
        .health-bar {
            position: absolute;
            bottom: -1.2vmin;
            left: 50%;
            transform: translateX(-50%);
            width: 8vmin;
            height: 0.8vmin;
            background: rgba(0, 0, 0, 0.8);
            border: 0.2vmin solid #222;
            border-radius: 0;
            overflow: hidden; /* 修复竖线问题 */
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .health-bar.show {
            opacity: 1;
        }

        .health-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #66BB6A);
            border-radius: 0;
            transition: width 0.3s, background 0.3s;
            z-index: 1;
        }

        .health-bar-fill.low {
            background: linear-gradient(90deg, #FF9800, #FFB74D);
        }

        .health-bar-fill.critical {
            background: linear-gradient(90deg, #F44336, #EF5350);
        }

        /* 血条数值显示 */
        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.6vmin;
            font-weight: bold;
            text-shadow: 0.08vmin 0.08vmin 0.15vmin rgba(0, 0, 0, 0.9);
            z-index: 101;
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: -0.05vmin;
        }

        /* 伤害显示样式 */
        .damage-text {
            position: absolute;
            color: #FF4444;
            font-weight: bold;
            font-size: 0.5vmin;
            text-shadow: 0.1vmin 0.1vmin 0.2vmin rgba(0, 0, 0, 0.8);
            pointer-events: none;
            animation: damageScale 1.2s ease-out forwards;
            z-index: 9999; /* 最高层级显示 */
            transform-origin: center center;
        }
        
        /* 破冰伤害样式 */
        .damage-text.ice-break {
            background: linear-gradient(to bottom, #ff4646 0%, #ff4646 30%, #b9ddff 90%, #b9ddff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            -webkit-text-stroke: 0.2px rgb(255, 0, 0);
            -webkit-text-stroke: 0.2px rgb(255, 0, 0);
            z-index: 10000;
        }
        
        /* 淬火伤害样式 */
        .damage-text.quench {
            background: linear-gradient(to bottom, #0f2fff 0%, #0f2fff 30%,#eb7070 90%, #eb7070 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            -webkit-text-stroke: 0.2px rgb(38, 0, 255);
            -webkit-text-stroke: 0.2px rgb(38, 0, 255);
            z-index: 10000;
        }

        @keyframes damageScale {
            0% {
                opacity: 0;
                transform: scale(0.1) translate(0, 0);
                font-size: 0.2vmin;
            }
            30% {
                opacity: 1;
                transform: scale(3.0) translate(0, 0);
                font-size: 1.2vmin;
            }
            40% {
                opacity: 1;
                transform: scale(3.24) translate(0, -0.25vmin);
                font-size: 1.28vmin;
            }
            50% {
                opacity: 1;
                transform: scale(3.08) translate(0, -0.5vmin);
                font-size: 1.2vmin;
            }
            80% {
                opacity: 0.7;
                transform: scale(2.76) translate(0, -0.75vmin);
                font-size: 1.04vmin;
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(0, -1vmin);
                font-size: 0.8vmin;
            }
        }

        /* 植物摆动动画 */
        .plant {
            transform-origin: center bottom;
        }

        .plant.swing {
            animation: plantSwing 3s ease-in-out infinite;
        }

        @keyframes plantSwing {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(5deg);
            }
            75% {
                transform: rotate(-5deg);
            }
        }

        /* 植物上下浮动动画 */
        .plant.float {
            animation: plantFloat 3s ease-in-out infinite;
        }

        @keyframes plantFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-1vmin);
            }
        }

        /* 植物膨胀动画 */
        .plant.expand {
            animation: plantExpand 0.2s ease-in-out infinite;
        }

        @keyframes plantExpand {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* 僵尸摆动动画 */
        .zombie {
            animation: zombieSwing 2s ease-in-out infinite;
            transform-origin: center bottom;
        }

        @keyframes zombieSwing {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(3deg);
            }
            75% {
                transform: rotate(-3deg);
            }
        }
        
        /* 过关庆祝动画 - 植物高速旋转 */
        @keyframes victorySpin {
            0% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(90deg);
            }
            50% {
                transform: rotate(180deg);
            }
            75% {
                transform: rotate(270deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* 植物庆祝动画样式 */
        .plant.victory-celebration {
            animation: victorySpin var(--victory-spin-duration, 0.5s) linear infinite !important;
            transform-origin: center center !important;
        }
        
        /* 过关庆祝动画 - 植物高速旋转 */
        @keyframes victorySpin {
            0% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(90deg);
            }
            50% {
                transform: rotate(180deg);
            }
            75% {
                transform: rotate(270deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 僵尸受攻击动画 */
        .zombie.hurt {
            animation: zombieHurt 0.3s ease-out;
        }

        @keyframes zombieHurt {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(0deg);
            }
        }

        /* 僵尸攻击动画 */
        .zombie.attacking {
            animation: zombieAttack 0.3s ease-out;
        }

        @keyframes zombieAttack {
            0%, 100% {
                transform: rotate(0deg) translateX(0);
            }
            50% {
                transform: rotate(0deg) translateX(-2vmin);
            }
        }

        /* 僵尸死亡爆裂动画 */
        .zombie-death-effect {
            position: absolute;
            width: 8vmin;
            height: 8vmin;
            background-image: url('tupian/death.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes zombieDeathBurst {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        /* 主人公图片样式 */
        .protagonist {
            position: absolute;
            left: -3vmin;
            top: 50%;
            transform: translateY(-50%);
            width: 15vmin;
            height: 15vmin;
            z-index: 50;
        }

        /* 游戏失败弹窗样式 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .game-over-content {
            background: white;
            padding: 4vmin;
            border-radius: 1vmin;
            text-align: center;
        }

        .game-over-content h2 {
            margin: 0 0 2vmin 0;
            color: #F44336;
            font-size: 3.2vmin;
        }

        .game-over-content p {
            margin: 0 0 3vmin 0;
            color: #333;
            font-size: 1.8vmin;
        }

        .restart-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 1.5vmin 3vmin;
            font-size: 1.8vmin;
            border-radius: 0.5vmin;
            cursor: pointer;
            transition: background 0.3s;
        }

        .restart-button:hover {
            background: #45a049;
        }

        /* 阳光样式 */
        .sun {
            position: absolute;
            width: 8vmin;
            height: 8vmin;
            cursor: pointer;
            z-index: 100;
            transition: all 0.1s;
            pointer-events: auto;
        }

        .sun:hover {
            transform: scale(1.1);
        }

        .sun img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 阳光收集动画 */
        @keyframes sunCollect {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: scale(0.3);
            }
        }

    <script>
        // 全局僵尸数量统计系统
        window.zombieCountSystem = {
            totalZombies: 0,
            
            // 增加僵尸数量
            addZombie: function() {
                this.totalZombies++;
                this.onZombieCountChanged();
            },
            
            // 减少僵尸数量
            removeZombie: function() {
                this.totalZombies = Math.max(0, this.totalZombies - 1);
                this.onZombieCountChanged();
            },
            
            // 获取当前僵尸数量
            getZombieCount: function() {
                return this.totalZombies;
            },
            
            // 重置僵尸数量
            resetZombieCount: function() {
                this.totalZombies = 0;
                this.onZombieCountChanged();
            },
            
            // 僵尸数量变化时的回调
            onZombieCountChanged: function() {
                // 可以在这里添加额外的逻辑，比如触发事件
            },
            
            // 检查僵尸数量是否达到阈值
            isZombieCountAboveThreshold: function(threshold) {
                return this.totalZombies >= threshold;
            },
            
            // 检查僵尸数量是否为0
            isNoZombiesLeft: function() {
                return this.totalZombies === 0;
            }
        };

        // ========== 全局音效管理系统 ==========
        window.soundManager = {
            // 每个音效路径对应的播放实例数组
            soundInstances: {},
            
            // 每种音效同时播放的最大数量
            maxInstancesPerSound: 10,
            
            // 播放音效
            playSound: function(soundPath, volume = 0.8) {
                // 确保该音效的实例数组存在
                if (!this.soundInstances[soundPath]) {
                    this.soundInstances[soundPath] = [];
                }
                
                const instances = this.soundInstances[soundPath];
                
                // 如果超过最大数量，停止并删除最早的实例
                if (instances.length >= this.maxInstancesPerSound) {
                    const oldestInstance = instances.shift();
                    try {
                        oldestInstance.pause();
                        oldestInstance.currentTime = 0;
                    } catch (err) {}
                }
                
                // 创建新的音效实例
                try {
                    const audio = new Audio(soundPath);
                    audio.volume = volume;
                    
                    // 添加到实例数组
                    instances.push(audio);
                    
                    // 播放音效
                    audio.play().catch(err => {
                        // 播放失败时从数组中移除
                        const index = instances.indexOf(audio);
                        if (index > -1) {
                            instances.splice(index, 1);
                        }
                    });
                    
                    // 音效播放结束后从数组中移除
                    audio.addEventListener('ended', () => {
                        const index = instances.indexOf(audio);
                        if (index > -1) {
                            instances.splice(index, 1);
                        }
                    });
                    
                    return audio;
                } catch (err) {
                    return null;
                }
            },
            
            // 停止指定路径的所有音效
            stopAllSounds: function(soundPath) {
                const instances = this.soundInstances[soundPath];
                if (instances) {
                    instances.forEach(audio => {
                        try {
                            audio.pause();
                            audio.currentTime = 0;
                        } catch (err) {}
                    });
                    this.soundInstances[soundPath] = [];
                }
            },
            
            // 停止所有音效
            stopEverything: function() {
                Object.keys(this.soundInstances).forEach(soundPath => {
                    this.stopAllSounds(soundPath);
                });
            }
        };

        // ========== 僵尸位置跟踪系统 ==========
        window.zombiePositionTracker = {
            // 僵尸到达过的最小列（0-8，数字越小越靠左）
            // 如果 minReachedCol = 8 表示从未到达过从右往左数第1格（最右边）
            // 如果 minReachedCol = 7 表示到达过从右往左数第2格
            // 如果 minReachedCol = 5 表示到达过从右往左数第4格
            minReachedCol: Infinity, // 初始为无限大，表示还没有僵尸到达过任何位置
            
            // 时间限制（秒）：只有关卡经过此时间后才会开始检测
            timeThreshold: 30,
            
            // 更新僵尸到达的最小列
            updateReachedCol: function(currentCol) {
                // 检查关卡时间是否超过时间限制
                if (typeof config !== 'undefined' && config.levelTime < this.timeThreshold) {
                    // 关卡时间还不够，不记录位置
                    return;
                }
                
                // 肉鸽模式关卡数大于3才开始检测
                if (config.currentLevel >= 101 && config.currentLevel <= 199 && (config.currentLevel - 100) <= 3) {
                    // 肉鸽模式关卡数小于等于3，不记录位置
                    return;
                }
                
                // 如果当前列数更小（更靠左），更新
                if (currentCol < this.minReachedCol) {
                    this.minReachedCol = currentCol;
                    console.log(`[位置跟踪] 僵尸到达新位置: 列 ${currentCol}（从右往左数第 ${config.gridCols - currentCol} 格），关卡时间 ${config.levelTime}秒`);
                }
            },
            
            // 检查僵尸是否到达过某一列（从右往左数）
            hasReachedColumnFromRight: function(columnNumber) {
                const targetCol = config.gridCols - columnNumber;
                return this.minReachedCol <= targetCol;
            },
            
            // 重置跟踪系统（开始新关卡时）
            reset: function() {
                this.minReachedCol = Infinity;
                console.log(`[位置跟踪] 系统已重置，检测时间限制: ${this.timeThreshold}秒`);
            },
            
            // 获取当前记录的最小列

            // 计算应该增加的难度点数
            calculateDifficultyBonus: function() {
                let bonus = 0;
                const gridCols = config.gridCols;
                let logMessage = '';
                
                // 双重检查：关卡时间是否超过时间限制
                if (typeof config !== 'undefined' && config.levelTime < this.timeThreshold) {
                    return bonus;
                }
                
                // 肉鸽模式关卡数大于3才开始检测
                if (config.currentLevel >= 101 && config.currentLevel <= 199 && (config.currentLevel - 100) <= 3) {
                    return bonus;
                }
                
                // 列编号：从左到右是 0 到 gridCols-1
                // 从右往左数第2格 = gridCols - 2
                // 从右往左数第4格 = gridCols - 4
                
                // 检查是否没有走到从右往左数第二格（即 minReachedCol > gridCols - 2）
                if (!this.hasReachedColumnFromRight(2)) {
                    bonus += 10;
                }
                
                // 检查是否没有走到从右往左数第四格（即 minReachedCol > gridCols - 4）
                if (!this.hasReachedColumnFromRight(4)) {
                    bonus += 5;
                }
                
                if (bonus > 0) {
                    logMessage = `[难度调节] 关卡时间 ${config.levelTime}秒，僵尸最远到达: ${this.minReachedCol === Infinity ? '未记录' : '列' + this.minReachedCol}，难度+${bonus}`;

        // 僵尸快速刷新机制
        window.fastZombieSpawnSystem = {

                // 条件6：存在生成下一个僵尸的函数

            // 立即刷新下一个僵尸

        // 启动自动检查
        window.fastZombieSpawnSystem.startAutoCheck();

        // 植物系统
        class Plant {
            constructor(plantType, x, y) {
                this.type = plantType;
                this.name = plantType.name;
                // 百分比钳制函数，防止计算结果异常（最低 -99%，最高 999%）
                function clampPercent(percent) {
                return Math.max(-95, Math.min(9999, percent));
                }
                // 获取植物当前的属性增强
                const enhancements = window.rogueCards ? window.rogueCards.plantEnhancementSystem.getPlantEnhancements(plantType.name) : {
                    attackSpeedPercent: 0,
                    attackDamagePercent: 0,
                    healthPercent: 0,
                    costPercent: 0,
                    healthRegen: 0,
                    maxChases: 0,
                    chaseTriggerChance: 0,
                    chaseDamageRatio: 0,
                    lockCount: 0,
                    knockbackForceValue: 0
                };
                
// 计算实际属性（考虑卡片增强效果）
// 钳制各项百分比，防止低于 -99% 导致异常
const clampedAttackSpeed = clampPercent(enhancements.attackSpeedPercent);
const clampedAttackDamage = clampPercent(enhancements.attackDamagePercent);
const clampedHealth = clampPercent(enhancements.healthPercent);
const clampedChaseTriggerChance = clampPercent(enhancements.chaseTriggerChance);
const clampedChaseDamageRatio = clampPercent(enhancements.chaseDamageRatio);
// 注意：价格不钳制，保持原样

// 价格 = 基础价格 × (1 + 价格百分比/100)   // 不修改价格机制
this.cost = Math.max(1, Math.round(plantType.cost * (1 + enhancements.costPercent / 100)));

// 生命值 = 基础生命值 × (1 + 生命值百分比/100)
this.maxHealth = Math.max(1, Math.round((plantType.health || 100) * (1 + clampedHealth / 100)));
this.health = this.maxHealth;

// 攻击力 = 基础攻击力 × (1 + 攻击伤害百分比/100)
this.attack = Math.max(1, Math.round((plantType.attack || 0) * (1 + clampedAttackDamage / 100)));

// 攻击速度属性（基础为1，可以受到卡片加成）
const baseAttackSpeedValue = 1; // 所有植物基础攻击速度为1
this.attackSpeedValue = baseAttackSpeedValue * (1 + clampedAttackSpeed / 100);

// 实际攻击间隔 = 基础攻击间隔 / 攻击速度
this.attackSpeed = Math.max(100, Math.round((plantType.attackSpeed || 1000) / this.attackSpeedValue));

// 实际攻击范围 = 基础范围 + 范围变化数值
const baseXRange = plantType.xRange !== undefined ? plantType.xRange : 1;
const baseYRange = plantType.yRange !== undefined ? plantType.yRange : 1;

this.xRange = Math.max(0, Math.round(baseXRange + (enhancements.xRangeValue || 0)));
this.yRange = Math.max(0, Math.round(baseYRange + (enhancements.yRangeValue || 0)));
                
                // 击退力 = 基础击退力 × (1 + 攻击伤害百分比/100) + 击退力数值
                // 击退力可以为负数（朝相反方向击退）
                this.knockbackForce = Math.round((plantType.knockbackForce || 0) * (1 + clampedAttackDamage / 100) + (enhancements.knockbackForceValue || 0));
                
                // 生命回复 = 基础生命回复 + 卡片增强的生命回复
                this.baseHealthRegen = plantType.healthRegen || 0;
                this.healthRegen = this.baseHealthRegen + (enhancements.healthRegen || 0);
                
                this.icon = plantType.icon;
                this.bulletImage = plantType.bulletImage || null;
                this.bulletAnimationType = plantType.bulletAnimationType || "normal";
                this.bulletOffset = plantType.bulletOffset || { x: 0, y: 0 };
                this.bulletTargetOffset = plantType.bulletTargetOffset || { x: 0, y: 0 };
                this.bulletSize = plantType.bulletSize || 1;
                this.attackIcon = plantType.attackIcon || plantType.icon;
                this.swing = plantType.swing !== undefined ? plantType.swing : true;
                this.animationType = plantType.animationType || "swing"; // 动画类型：swing或float
                this.canOverlap = plantType.canOverlap !== undefined ? plantType.canOverlap : false;
                this.containerSize = plantType.containerSize || 15; // 默认15vmin
                this.attackSound = plantType.attackSound || null; // 攻击音效
                this.blockDeathSpawn = plantType.blockDeathSpawn || false; // 是否阻断死亡产生单位
                this.isAreaDamage = plantType.isAreaDamage || false; // 是否是范围伤害
                this.x = x;
                this.y = y;
                this.col = 0; // 列位置，需要在创建后设置
                this.row = 0; // 行位置，需要在创建后设置
                this.element = null;
                this.healthBar = null;
                this.attackInterval = null;
                this.targetZombie = null; // 当前锁定的僵尸
                this.targetZombies = []; // 当前锁定的僵尸数组
                this.lockCount = Math.max(1, (plantType.lockCount || 1) + (enhancements.lockCount || 0)); // 锁定数量，默认为1，加上卡牌增强
                this.percentHealthPerSecond = 0; // 每秒百分比生命扣除（正数扣血，负数回血）
                this.healthTimer = null; // 生命扣除/回血计时器
                this.moveSpeedPercentReduction = 0; // 移动速度百分比削减（正数削减，负数提升）
                this.attackSpeedPercentReduction = 0; // 攻击速度百分比削减（正数削减，负数提升）
                this.temperature = 0; // 温度函数（范围：-100 到 200）
                // 温度附加（正数增加温度，负数减少温度），同时支持 temperatureAdd 和 temperatureBonus
                const plantTemperatureBonus = (plantType.temperatureBonus || 0) + (plantType.temperatureAdd || 0);
                this.temperatureBonus = plantTemperatureBonus + (enhancements.temperatureBonus || 0);
                this.temperatureElement = null; // 温度显示元素
                this.temperatureRegressionTimer = null; // 温度回归计时器
                this.lastTemperatureState = null; // 上一次的温度状态（用于判断是否需要重新初始化生命计时器）
                
                // 初始化生命计时器
                this.initHealthTimer();
                
                // 盾兵特殊属性
                this.hasShield = false; // 是否有盾牌
                this.shieldTimer = null; // 盾牌生成计时器
                this.shieldPlant = null; // 盾牌植物实例
                
                // 盾墙特殊属性
                this.blueShields = []; // 生成的蓝盾牌列表
                this.deathTimer = null; // 死亡计时器
                this.counter = 0; // 计数器属性，用于实现特殊效果
                
                // 初始化生命计时器
                this.initHealthTimer();
                this.existTime = 0; // 植物在场上存在的时间（秒）
                this.existTimer = null; // 存在时间计时器
                this.healthRegenTimer = null; // 生命回复计时器
                
                // 追击属性配置
                this.chaseConfig = {
                    enabled: true, // 是否启用追击
                    maxChases: (plantType.maxChases || 0) + enhancements.maxChases, // 最大追击次数（优先使用植物类型配置）
                    triggerChance: (plantType.triggerChance || 0) + clampedChaseTriggerChance, // 追击触发概率（初始和后续追击使用相同概率）
                    damageRatio: (plantType.damageRatio || 20) + clampedChaseDamageRatio, // 追击伤害倍率（百分比）
                    bulletSizeRatio: plantType.bulletSizeRatio || null, // 子弹大小倍率（null表示与伤害倍率相同）
                    chaseInterval: plantType.chaseInterval || 60 // 追击子弹发射间隔（毫秒）
                };
                
                // 追击状态跟踪

            // 播放攻击音效
            playAttackSound() {

                    window.soundManager.playSound(this.attackSound, 0.8);
                }
            }

            // 触发追击链（针对特定目标）
            triggerChaseChain(targetZombieParam) {
                if (!this.chaseConfig.enabled) return;
                if (!this.canChase) return;
                
                // 保存原始目标
                const originalTarget = this.targetZombie;
                
                // 设置当前追击目标
                if (targetZombieParam) {
                    this.targetZombie = targetZombieParam;
                }
                
                // 递归触发追击链，传递目标参数
                this.tryNextChase(targetZombieParam, 0);
                
                // 恢复原始目标
                this.targetZombie = originalTarget;
            }

            // 尝试下一次追击（针对特定目标）
            tryNextChase(targetZombieParam, currentCount) {
                // 检查是否达到最大追击次数
                if (currentCount >= this.chaseConfig.maxChases) return;
                
                // 保存原始目标
                const originalTarget = this.targetZombie;
                
                // 设置当前追击目标
                if (targetZombieParam) {
                    this.targetZombie = targetZombieParam;
                }
                
                // 检查目标是否有效
                if (!this.targetZombie || this.targetZombie.health <= 0) {
                    this.targetZombie = originalTarget;
                    return;
                }
                
                // 计算追击概率（初始追击和后续追击使用相同概率）
                const chance = this.chaseConfig.triggerChance;
                
                // 检查追击概率
                const random = Math.random() * 100;
                if (random > chance) {
                    this.targetZombie = originalTarget;
                    return;
                }
                
                // 触发追击攻击
                this.chaseAttack();
                
                // 恢复原始目标
                this.targetZombie = originalTarget;
                
                // 等待追击间隔后尝试下一次追击
                setTimeout(() => {
                    this.tryNextChase(targetZombieParam, currentCount + 1);
                }, this.chaseConfig.chaseInterval);
            }

            // 追击攻击
            chaseAttack() {
                if (!this.targetZombie || this.targetZombie.health <= 0) return;
                
                // 计算追击伤害和子弹大小
                const actualAttack = this.getActualAttack ? this.getActualAttack() : this.attack;
                const chaseDamage = actualAttack * (this.chaseConfig.damageRatio / 100);
                const bulletSize = this.chaseConfig.bulletSizeRatio !== null ? 
                    this.type.bulletSize * (this.chaseConfig.bulletSizeRatio / 100) : 
                    this.type.bulletSize * (this.chaseConfig.damageRatio / 100);
                
                // 保存原始子弹大小
                const originalBulletSize = this.bulletSize;
                
                // 临时修改子弹大小以应用追击倍率
                this.bulletSize = bulletSize;
                
                // 保存原始子弹大小到植物类型
                const originalTypeBulletSize = this.type.bulletSize;
                this.type.bulletSize = bulletSize;
                
                // 根据植物类型创建相应的子弹动画
                if (this.type.bulletAnimationType === "teleport" && this.type.bulletImage) {
                    // 瞬移子弹立即造成伤害
                    this.createTeleportBullet();

                    // 应用温度附加效果
                    if (this.temperatureBonus !== 0) {
                        // 确保温度在 -100 到 200 之间

                    // 保存原始攻击值
                    const originalAttack = this.attack;
                    this.attack = chaseDamage;
                    
                    this.createThrowBullet();
                    
                    // 恢复原始攻击值
                    this.attack = originalAttack;
                } else if (this.type.bulletAnimationType === "pierce" && this.type.bulletImage) {
                    // 贯穿型子弹，对路径上的所有僵尸造成伤害
                    // 保存原始攻击值
                    const originalAttack = this.attack;
                    this.attack = chaseDamage;
                    
                    this.createPierceBullet();
                    
                    // 恢复原始攻击值
                    this.attack = originalAttack;
                } else {
                    // 没有子弹动画的攻击立即造成伤害
                    this.targetZombie.takeDamage(chaseDamage, this);
                    this.knockbackZombie(this.targetZombie, this.knockbackForce);
                    
                    // 应用温度附加效果
                    if (this.temperatureBonus !== 0) {
                        // 确保温度在 -100 到 200 之间
                        this.targetZombie.temperature = Math.max(-100, Math.min(200, this.targetZombie.temperature + this.temperatureBonus));
                        this.targetZombie.applyTemperatureEffect();
                        this.targetZombie.initTemperatureRegression();
                        console.log(`[温度系统] 附加: ${this.temperatureBonus}, 目标温度: ${this.targetZombie.temperature}`);
                    }
                }
                
                // 恢复原始子弹大小
                this.bulletSize = originalBulletSize;
                this.type.bulletSize = originalTypeBulletSize;

            // 创建植物元素
            createElement(lawnEl) {
                const plant = document.createElement("div");

                iconContainer.style.display = "flex";
                iconContainer.style.alignItems = "center";
                iconContainer.style.justifyContent = "center";
                
                plant.appendChild(iconContainer);
                lawnEl.appendChild(plant);
                this.element = plant;
                this.iconContainer = iconContainer;

                // 根据动画类型添加相应的动画类
                if (this.animationType === "float") {
                    plant.classList.add('float');
                } else if (this.type.swing !== false) {
                    plant.classList.add('swing');
                }

                // 刀兵特殊：创建计数器显示
                if (this.name === "刀兵") {
                    this.counter = 0; // 初始化计数器为0
                    this.counterElement = document.createElement("div");
                    this.counterElement.className = "daobing-counter";
                    this.counterElement.style.position = "absolute";

                    this.counterElement.style.right = "0vmin";

                    this.counterElement.style.color = "red";
                    this.counterElement.style.fontWeight = "bold";
                    this.counterElement.style.fontSize = "2.5vmin";
                    this.counterElement.style.padding = "0";
                    this.counterElement.style.borderRadius = "0";
                    this.counterElement.style.zIndex = "100";
                    this.counterElement.style.display = "none"; // 初始隐藏
                    this.counterElement.style.textShadow = "0 0 3px white, 0 0 3px white";
                    this.counterElement.textContent = "0";
                    this.element.appendChild(this.counterElement);
                }

                // 创建血条
                this.createHealthBar();
                return plant;
            }

            // 创建血条
            createHealthBar() {
                if (!this.element) return;

                const healthBar = document.createElement("div");
                healthBar.className = "health-bar";
                healthBar.style.flex = 'none'; // 确保不参与flex布局
                healthBar.style.width = '8vmin'; // 明确宽度
                healthBar.style.height = '0.8vmin'; // 明确高度
                
                const healthBarFill = document.createElement("div");
                healthBarFill.className = "health-bar-fill";
                healthBarFill.style.width = "100%";
                
                // 添加生命值数值显示
                const healthText = document.createElement("div");
                healthText.className = "health-text";
                healthText.textContent = `${Math.round(this.health)}/${this.maxHealth}`;
                
                healthBar.appendChild(healthBarFill);
                healthBar.appendChild(healthText);
                this.element.appendChild(healthBar);
                this.healthBar = healthBar;
                this.healthText = healthText;
            }

            // 更新血条
            updateHealthBar() {
                if (!this.healthBar) return;

                // 血条百分比四舍五入取整数
                const healthPercentage = Math.round((this.health / this.maxHealth) * 100);
                const healthBarFill = this.healthBar.querySelector(".health-bar-fill");
                
                healthBarFill.style.width = healthPercentage + "%";
                
                // 更新生命值数值显示
                if (this.healthText) {
                    this.healthText.textContent = `${Math.round(this.health)}/${this.maxHealth}`;
                }
                
                // 检查是否有自定义血条颜色
                if (this.type.healthBarColor) {
                    // 使用自定义颜色
                    healthBarFill.className = "health-bar-fill";
                    healthBarFill.style.backgroundColor = this.type.healthBarColor;
                } else {
                    // 更新血条颜色
                    healthBarFill.className = "health-bar-fill";
                    if (healthPercentage < 30) {
                        healthBarFill.classList.add("critical");
                    } else if (healthPercentage < 60) {
                        healthBarFill.classList.add("low");
                    }
                }
                
                // 显示或隐藏血条
                if (healthPercentage < 100) {
                    this.healthBar.classList.add("show");
                } else {
                    this.healthBar.classList.remove("show");
                }
            }

            // 显示伤害或治疗
            showDamage(damage, isHeal = false, isTemperatureDamage = false, isIceBreak = false, isQuench = false) {
                if (!this.element) return;

                const damageText = document.createElement("div");
                damageText.className = "damage-text";
                
                // 设置文本内容和样式
                if (isIceBreak) {
                    damageText.classList.add("ice-break");
                    damageText.innerHTML = damage + " <span style='font-size: 50%;'>破冰</span>";
                } else if (isQuench) {
                    damageText.classList.add("quench");
                    damageText.innerHTML = damage + " <span style='font-size: 50%;'>淬火</span>";
                } else if (isHeal) {
                    damageText.textContent = "+" + damage;
                    damageText.style.color = "#4CAF50"; // 绿色
                } else if (isTemperatureDamage) {
                    damageText.textContent = damage;
                    damageText.style.color = "#FFA500"; // 橙色
                } else {
                    damageText.textContent = damage;
                    damageText.style.color = "#FF4444"; // 红色
                }
                
                // 随机位置计算（范围缩小30%）
                const randomX = (Math.random() * 4.2 - 2.1); // -2.1vmin 到 +2.1vmin（缩小30%）
                const randomY = (Math.random() * 2.8 - 7.1); // -7.1vmin 到 -4.3vmin（缩小30%）
                
                damageText.style.left = `calc(50% + ${randomX}vmin)`;
                damageText.style.top = `calc(50% + ${randomY}vmin)`;
                damageText.style.transform = "translate(-50%, -50%)";
                
                this.element.appendChild(damageText);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (damageText.parentNode) {
                        damageText.parentNode.removeChild(damageText);
                    }
                }, 1200);
            }

// 开始攻击
startAttack() {
    if (this.attack > 0 || this.name === "向日葵") {
        let attackInterval = this.attackSpeed;
        //向日葵不再受赚钱升级的速度加成
        this.attackInterval = setInterval(() => {
            this.attackZombies();
        }, attackInterval);
    }
   if (this.name === "向日葵") {
    setTimeout(() => {
        if (this.health > 0 && this.element) {
            this.attackZombies();
        }
    }, 0);
}
                
                // 盾兵特殊逻辑：生成盾牌
                if (this.name === "盾兵") {
                    this.startShieldTimer();
                }
                
                // 盾墙特殊逻辑：生成蓝盾牌并设置死亡计时器
                if (this.name === "盾墙") {
                    this.generateBlueShields();
                    this.startDeathTimer();
                }
                
                // 炸弹植物特殊逻辑：开始存在时间计时
                if (this.name === "炸弹") {
                    this.startExistTimer();
                }
                
                // 启动生命回复计时器
                if (this.healthRegen !== 0) {
                    this.startHealthRegenTimer();
                }
            }
            
            // 开始存在时间计时
            startExistTimer() {
                this.existTimer = setInterval(() => {
                    this.existTime++;
                    // 每存在1秒增加计数器
                    this.counter++;
                }, 1000);
                
                // 炸弹植物特殊逻辑：逐渐增加膨胀动画速度
                if (this.name === "炸弹" && this.element) {
                    this.startExpandAnimation();
                }
            }
            
            // 开始生命回复计时器
            startHealthRegenTimer() {
                // 清除之前的计时器
                if (this.healthRegenTimer) {
                    clearInterval(this.healthRegenTimer);
                }
                
                this.healthRegenTimer = setInterval(() => {
                    if (this.health <= 0 || !this.element) {
                        // 植物死亡，停止计时器
                        this.stopHealthRegenTimer();
                        return;
                    }
                    
                    // 应用生命回复/扣血
                    if (this.healthRegen > 0) {
                        // 回复生命，不超过最大生命值
                        const healAmount = Math.min(this.healthRegen, this.maxHealth - this.health);
                        if (healAmount > 0) {
                            this.health = Math.min(this.health + this.healthRegen, this.maxHealth);
                            this.showDamage(healAmount, true);
                        }
                    } else if (this.healthRegen < 0) {
                        // 扣血
                        const damageAmount = Math.abs(this.healthRegen);
                        this.takeDamage(damageAmount);
                    }
                    
                    // 更新血条
                    this.updateHealthBar();
                }, 1000);
            }
            
            // 停止生命回复计时器
            stopHealthRegenTimer() {
                if (this.healthRegenTimer) {
                    clearInterval(this.healthRegenTimer);
                    this.healthRegenTimer = null;
                }
            }
            
            // 开始膨胀动画并逐渐提高速度和大小
            startExpandAnimation() {
                let animationDuration = 200; // 初始动画持续时间（毫秒）
                const speedIncrease = 1.25; // 每次速度提高25%
                let currentScale = 0.2; // 初始图片大小为原来的20%
                const sizeIncrease = 1.1; // 每次大小增大10%
                let isAnimationRunning = true; // 动画是否在运行的标志
                
                // 更新动画持续时间和图片大小的函数
                const updateAnimation = () => {
                    if (!this.element || !isAnimationRunning) return;
                    
                    // 播放bow音效
                    window.soundManager.playSound('Sound effects/bow.mp3', 0.8);
                    
                    // 减少动画持续时间（提高速度）
                    animationDuration = Math.max(50, animationDuration / speedIncrease);
                    
                    // 增加图片大小
                    currentScale *= sizeIncrease;
                    
                    // 更新动画
                    this.element.style.animation = `plantExpand ${animationDuration}ms ease-in-out infinite`;
                    
                    // 更新图片大小
                    const iconContainer = this.element.querySelector('.plant-icon');
                    if (iconContainer) {
                        const img = iconContainer.querySelector('img');
                        if (img) {
                            img.style.width = `${currentScale * 100}%`;
                            img.style.height = `${currentScale * 100}%`;
                        }
                    }
                    
                    // 继续下一次更新
                    if (isAnimationRunning) {
                        this.expandAnimationTimeout = setTimeout(updateAnimation, animationDuration * 2); // 每次动画完成两次后更新
                    }
                };
                
                // 开始动画更新
                this.expandAnimationTimeout = setTimeout(updateAnimation, animationDuration * 2);
                
                // 保存停止动画的方法
                this.stopExpandAnimation = () => {
                    isAnimationRunning = false;
                    if (this.expandAnimationTimeout) {
                        clearTimeout(this.expandAnimationTimeout);
                    }
                };
            }
            
            // 开始盾牌生成计时
            startShieldTimer() {
                // 清除之前的计时器
                if (this.shieldTimer) {
                    clearTimeout(this.shieldTimer);
                }
                
                // 如果没有盾牌，10秒后生成
                if (!this.hasShield) {
                    this.shieldTimer = setTimeout(() => {
                        this.generateShield();
                    }, 10000);
                }
            }
            
            // 生成盾牌
            generateShield() {
                if (!this.element || this.hasShield || this.health <= 0) return;
                
                const lawnEl = document.getElementById("lawn");
                const lawnGridEl = document.getElementById("lawnGrid");
                
                if (!lawnEl || !lawnGridEl) return;
                
                // 计算盾牌位置（在盾兵前方）
                const lawnGridRect = lawnGridEl.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                const cellWidth = lawnGridRect.width / config.gridCols;
                const cellHeight = lawnGridRect.height / config.gridRows;
                
                // 计算盾兵所在的格子
                const shielderCenterOffset = (this.containerSize / 2) * window.innerHeight / 100;
                const shielderCol = Math.floor((this.x + shielderCenterOffset - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const shielderRow = Math.floor((this.y + shielderCenterOffset - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 盾牌在前方一格
                const shieldCol = shielderCol + 1;
                const shieldRow = shielderRow;
                
                // 检查前方格子是否在地图范围内
                if (shieldCol >= config.gridCols) return;
                
                // 计算盾牌位置
                const shieldX = (lawnGridRect.left - lawnRect.left) + shieldCol * cellWidth + cellWidth / 2 - 7.5 * window.innerHeight / 200;
                const shieldY = (lawnGridRect.top - lawnRect.top) + shieldRow * cellHeight + cellHeight / 2 - 7.5 * window.innerHeight / 200;
                
                // 创建盾牌植物
                const shieldType = plantTypes.shield;
                const shield = new Plant(shieldType, shieldX, shieldY);
                shield.shielder = this; // 记录所属的盾兵
                shield.col = shieldCol;
                shield.row = shieldRow;
                const shieldElement = shield.createElement(lawnEl);
                // 盾牌的z-index设置为更高，确保优先显示
                shieldElement.style.zIndex = shieldRow + 100;
                
                // 添加到植物列表
                config.plantsOnLawn.push(shield);
                
                // 更新盾兵状态
                this.hasShield = true;
                this.shieldPlant = shield;
            }
            
            // 盾牌被摧毁
            onShieldDestroyed() {
                this.hasShield = false;
                this.shieldPlant = null;
                // 重新开始盾牌生成计时
                this.startShieldTimer();
            }
            
            // 盾墙生成蓝盾牌
            generateBlueShields() {
                if (!this.element) return;
                
                const lawnEl = document.getElementById("lawn");
                const lawnGridEl = document.getElementById("lawnGrid");
                
                if (!lawnEl || !lawnGridEl) return;
                
                // 计算盾墙所在的格子
                const lawnGridRect = lawnGridEl.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                const cellWidth = lawnGridRect.width / config.gridCols;
                const cellHeight = lawnGridRect.height / config.gridRows;
                
                const shieldWallCenterOffset = (this.containerSize / 2) * window.innerHeight / 100;
                const shieldWallCol = Math.floor((this.x + shieldWallCenterOffset - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const shieldWallRow = Math.floor((this.y + shieldWallCenterOffset - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 在盾墙所在位置和上下所有格子生成蓝盾牌
                for (let row = 0; row < 5; row++) {
                    // 计算蓝盾牌位置
                    const shieldX = (lawnGridRect.left - lawnRect.left) + shieldWallCol * cellWidth + cellWidth / 2 - 7.5 * window.innerHeight / 200;
                    const shieldY = (lawnGridRect.top - lawnRect.top) + row * cellHeight + cellHeight / 2 - 7.5 * window.innerHeight / 200;
                    
                    // 创建蓝盾牌植物
                    const blueShieldType = plantTypes.blueShield;
                    const blueShield = new Plant(blueShieldType, shieldX, shieldY);
                    blueShield.shieldWall = this; // 记录所属的盾墙
                    blueShield.col = shieldWallCol;
                    blueShield.row = row;
                    const blueShieldElement = blueShield.createElement(lawnEl);
                    blueShieldElement.style.zIndex = row + 100;
                    
                    // 添加到植物列表和蓝盾牌列表
                    config.plantsOnLawn.push(blueShield);
                    this.blueShields.push(blueShield);
                }
            }
            
            // 开始死亡计时器
            startDeathTimer() {
                // 45秒后受到9999999点伤害
                this.deathTimer = setTimeout(() => {
                    this.takeDamage(9999999);
                }, 45000);
            }
            
            // 盾墙死亡时摧毁所有蓝盾牌
            destroyBlueShields() {
                // 先复制一份数组，避免在遍历过程中修改数组
                const shieldsToDestroy = [...this.blueShields];
                // 对所有蓝盾牌造成9999999点伤害
                for (const blueShield of shieldsToDestroy) {
                    if (blueShield && blueShield.health > 0) {
                        blueShield.takeDamage(9999999);
                    }
                }
                this.blueShields = [];
            }
            
            // 蓝盾牌被摧毁时从列表中移除
            onBlueShieldDestroyed(blueShield) {
                const index = this.blueShields.indexOf(blueShield);
                if (index > -1) {
                    this.blueShields.splice(index, 1);
                }
            }
            
            // 攻击僵尸
            attackZombies() {
                // 向日葵特殊逻辑：生成阳光
                if (this.name === "向日葵") {

                    // 播放攻击音效
                    this.playAttackSound();
                    
                    // 触发攻击动画
                    if (this.iconContainer) {
                        // 切换到攻击图片
                        this.iconContainer.innerHTML = this.attackIcon;
                    }
                    
                    // 生成阳光
                    spawnSunFromPlant(this);
                    
                    // 发送植物攻击通知事件（向日葵）

                        for (const plant of window.game.plantsOnLawn) {
                            if (plant !== this && plant.name === "法师") {
                                // 检查法师是否在3x3范围内
                                const distanceX = Math.abs(plant.col - this.col);
                                const distanceY = Math.abs(plant.row - this.row);
                                if (distanceX <= 1 && distanceY <= 1) {
                                    // 法师在范围内，触发法师攻击
                                    plant.triggerAttackOnNearbyPlantAttack();

                            }
                        }
                    }

                    setTimeout(() => {

                            if (this.animationType === "float") {
                                this.element.style.animation = 'plantFloat 3s ease-in-out infinite';
                            } else {
                                this.element.style.animation = 'plantSwing 3s ease-in-out infinite';
                            }
                        }
                    }, 225);
                    return;
                }

                    const gridRect = lawnGridEl.getBoundingClientRect();
                    
                    // 计算格子大小

                    const cellHeight = gridRect.height / config.gridRows;
                    
                    // 计算植物所在的格子（使用元素中心点）
                    const plantCenterOffset = (this.containerSize / 2) * window.innerHeight / 100;
                    const plantCol = Math.floor((this.x + plantCenterOffset - (gridRect.left - lawnRect.left)) / cellWidth);
                    const plantRow = Math.floor((this.y + plantCenterOffset - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 检查是否是治疗角色
                    if (this.type.isHealer) {
                        // 治疗逻辑：治疗范围内的所有植物

                        const targetPlants = [];
                        
                        for (const targetPlant of plants) {
                            // 计算目标植物所在的格子（使用元素中心点）
                            const targetPlantSize = targetPlant.containerSize || 15;
                            const targetPlantCenterOffset = (targetPlantSize / 2) * window.innerHeight / 100;
                            const targetPlantCol = Math.floor((targetPlant.x + targetPlantCenterOffset - (gridRect.left - lawnRect.left)) / cellWidth);
                            const targetPlantRow = Math.floor((targetPlant.y + targetPlantCenterOffset - (gridRect.top - lawnRect.top)) / cellHeight);
                            
                            // 检查目标植物是否在治疗范围内
                            const distanceX = Math.abs(targetPlantCol - plantCol);
                            const distanceY = Math.abs(targetPlantRow - plantRow);
                            
                            // 治疗范围判断：
                            // 1. 如果yRange为0，则必须严格在同一行
                            // 2. X轴距离不超过xRange
                            // 3. Y轴距离不超过yRange
                            // 4. 不是自身
                            let inRange = false;
                            if (this.yRange === 0) {
                                // Y轴范围为0时，必须严格在同一行
                                inRange = (distanceY === 0 && distanceX <= this.xRange);
                            } else {
                                // 正常的治疗范围判断
                                inRange = (distanceX <= this.xRange && distanceY <= this.yRange && distanceX + distanceY <= this.xRange + this.yRange);
                            }
                            
                            if (inRange && targetPlant !== this && targetPlant.health > 0 && targetPlant.health < targetPlant.maxHealth) {
                                targetPlants.push(targetPlant);
                            }
                        }
                        
                        // 如果有需要治疗的植物
                if (targetPlants.length > 0) {

                        // 切换到攻击图片

                        }
                    }
                            
                            // 对所有目标植物进行治疗

                                targetPlant.health = Math.min(targetPlant.health + healAmount, targetPlant.maxHealth);

                                targetPlant.updateHealthBar();
                                
                                // 如果植物有温度附加，给目标植物施加温度
                                if (this.type.temperatureBonus !== undefined && this.type.temperatureBonus !== 0) {
                                    // 确保温度在 -100 到 200 之间
                                    if (targetPlant.temperature + this.type.temperatureBonus >= 0) {
                                        targetPlant.temperature = Math.min(200, targetPlant.temperature + this.type.temperatureBonus);
                                    } else {
                                        targetPlant.temperature = Math.max(-100, targetPlant.temperature + this.type.temperatureBonus);
                                    }
                                    targetPlant.applyTemperatureEffect();
                                }
                            }
                            
                            // 恢复待机图片
                            setTimeout(() => {
                                if (this.element && this.iconContainer) {
                                    this.iconContainer.innerHTML = this.icon;
                                    // 根据动画类型恢复相应的动画
                                    if (this.animationType === "float") {
                                        this.element.style.animation = 'plantFloat 3s ease-in-out infinite';

                                        this.element.style.animation = 'plantSwing 3s ease-in-out infinite';

                                }

                        if (this.name === "炸弹" && this.counter < 2) {
                            return;

                        if (this.type.isAreaDamage) {

                            for (const zombie of zombies) {

                                const zombieRow = Math.floor((zombie.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                                
                                // 检查僵尸是否在攻击范围内
                                // xRange: X轴攻击范围（前后各xRange格）
                                // yRange: Y轴攻击范围（上下各yRange格）
                                const distanceX = Math.abs(zombieCol - plantCol);
                                const distanceY = Math.abs(zombieRow - plantRow);
                                
                                // 攻击范围判断：
                                // 1. X轴距离不超过xRange
                                // 2. Y轴距离不超过yRange
                                // 3. 如果yRange为0，则必须严格在同一行
                                let inRange = false;
                                if (this.yRange === 0) {
                                    // Y轴范围为0时，必须严格在同一行
                                    inRange = (distanceY === 0 && distanceX <= this.xRange);
                                } else {
                                    // 正常的攻击范围判断
                                    inRange = (distanceX <= this.xRange && distanceY <= this.yRange && distanceX + distanceY <= this.xRange + this.yRange);
                                }
                                
                                if (inRange && zombie.health > 0) {
                                    targetZombies.push(zombie);
                                }

            // 创建瞬移子弹动画
            createTeleportBullet() {
                if (!this.element || !this.targetZombie || !this.targetZombie.element) return;
                
                const lawnEl = document.getElementById("lawn");
                const bullet = document.createElement("div");
                
                // 获取子弹大小（默认为1）
                const bulletSize = this.type.bulletSize || 1;
                const baseSize = 10 * bulletSize * (this.type.pierceBulletSizeMultiplier || 1);
                
                // 设置子弹样式
                bullet.className = "bullet";
                bullet.innerHTML = `<img src='${this.type.bulletImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
                bullet.style.width = `${baseSize}vmin`;
                bullet.style.height = `${baseSize}vmin`;
                bullet.style.position = "absolute";
                bullet.style.pointerEvents = "none";
                bullet.style.zIndex = "1000"; // 提高显示层级
                
                // 计算起始位置（植物中心）
                const plantRect = this.element.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                
                // 应用子弹偏移
                const bulletOffset = this.type.bulletOffset || { x: 0, y: 0 };
                const startX = plantRect.left - lawnRect.left + plantRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.x;
                const startY = plantRect.top - lawnRect.top + plantRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.y;
                
                // 计算目标位置（僵尸中心），应用子弹落点偏移
                const zombieRect = this.targetZombie.element.getBoundingClientRect();
                const bulletTargetOffset = this.bulletTargetOffset || { x: 0, y: 0 };
                const endX = zombieRect.left - lawnRect.left + zombieRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.x;
                const endY = zombieRect.top - lawnRect.top + zombieRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.y;
                
                // 设置起始位置
                bullet.style.left = startX + "px";
                bullet.style.top = startY + "px";
                
                // 计算方向并设置旋转角度
                const dx = endX - startX;
                const dy = endY - startY;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                bullet.style.transform = `rotate(${angle + 180}deg)`; // 朝向攻击发起者的反方向
                
                // 添加到草坪
                lawnEl.appendChild(bullet);
                
                // 执行动画
                let startTime = null;
                const duration = 200; // 动画持续时间，提高速度
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    
                    // 计算当前位置（线性插值）
                    const currentX = startX + (endX - startX) * progress;
                    const currentY = startY + (endY - startY) * progress;
                    
                    // 计算当前缩放
                    const scale = 1 + progress * 0.5; // 稍微放大
                    
                    // 计算当前透明度
                    let opacity;
                    if (progress < 0.8) {
                        // 前80%的时间，透明度从0.3增加到1
                        opacity = 0.3 + (progress / 0.8) * 0.7;
                    } else {
                        // 后20%的时间，透明度从1快速降低到0
                        opacity = 1 - ((progress - 0.8) / 0.2) * 1;
                    }
                    
                    // 更新子弹状态
                    bullet.style.left = currentX + "px";
                    bullet.style.top = currentY + "px";
                    bullet.style.transform = `rotate(${angle + 180}deg) scale(${scale})`;
                    bullet.style.opacity = opacity;
                    
                    // 继续动画
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 动画结束，移除子弹
                        if (bullet.parentNode) {
                            bullet.parentNode.removeChild(bullet);
                        }
                    }
                }
                
                // 开始动画
                requestAnimationFrame(animate);

            // 创建抛物线子弹动画（抛射攻击）

            // 核心算法：
            // 1. 线性插值计算水平位置（X轴）
            // 2. 抛物线公式计算垂直高度（Y轴）：y = -4 * h * (t - 0.5)^2 + h
            // 3. 使用二次函数计算缩放效果，营造远近感
            // 可通过植物配置调整的属性：
            // - bulletSize: 子弹大小比例（默认1.0）
            // - bulletOffset: 子弹发射位置偏移 {x: 偏移量, y: 偏移量}
            // - bulletDuration: 动画持续时间（毫秒，默认800）
            // - bulletMaxHeight: 抛物线最高点高度（像素，默认100）
            // - bulletExplosionImage: 子弹爆炸图片（可选）
            // - 内部固定参数（可在代码中修改）：
