        // 根据权重随机选择阳光类型
        function getRandomSunType() {
            const totalWeight = sunConfig.types.reduce((sum, type) => sum + type.weight, 0);
            let random = Math.random() * totalWeight;
            
            for (const type of sunConfig.types) {
                random -= type.weight;
                if (random <= 0) {
                    return type;
                }
            }
            return sunConfig.types[0]; // 默认返回第一个类型
        }
        
// 从植物生成阳光
function spawnSunFromPlant(plant) {
    if (!plant.element) return;
    
    const lawnEl = document.getElementById("lawn");
    if (!lawnEl) return;
    
    // 【修改点】使用权重随机选择阳光类型
    const sunType = getRandomSunType();
    const sunAmount = sunType.value;
    const sunImage = sunType.image;
    
    // 获取植物位置...
    // ... 后面的代码（计算坐标、动画、收集事件等）完全不变
            
            // 获取植物位置
            const plantRect = plant.element.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            
            // 计算起始位置（植物中心）
            const startX = (plantRect.left - lawnRect.left) + plantRect.width / 2 - 4 * window.innerHeight / 200;
            const startY = (plantRect.top - lawnRect.top) + plantRect.height / 2 - 4 * window.innerHeight / 200;
            
            // 计算随机目标位置（在植物周围）
            const randomRadius = Math.random() * plantRect.width * 1.5;
            const randomAngle = Math.random() * Math.PI * 2;
            const endX = startX + Math.cos(randomAngle) * randomRadius;
            const endY = startY + Math.sin(randomAngle) * randomRadius;
            
            // 创建阳光元素
            const sun = document.createElement("div");
            sun.className = "sun";
            sun.dataset.value = sunAmount; // 存储阳光价值
            sun.innerHTML = `<img src='${sunImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
            sun.style.width = "8vmin";
            sun.style.height = "8vmin";
            sun.style.position = "absolute";
            sun.style.pointerEvents = "none";
            sun.style.zIndex = "1000";
            
            // 设置起始位置
            sun.style.left = startX + "px";
            sun.style.top = startY + "px";
            
            // 点击收集阳光
            sun.addEventListener("mouseenter", () => collectSun(sun));
            
            // 添加到草坪
            lawnEl.appendChild(sun);
            
            // 执行抛物线动画
            let startTime = null;
            const duration = 800; // 动画持续时间
            const maxHeight = 60; // 抛物线最高点高度
            
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                
                // 计算当前位置（线性插值）
                const currentX = startX + (endX - startX) * progress;
                
                // 计算抛物线高度
                const parabolaHeight = -4 * maxHeight * Math.pow(progress - 0.5, 2) + maxHeight;
                const currentY = startY + (endY - startY) * progress - parabolaHeight;
                
                // 计算当前缩放（缩小大小变化幅度）
                const scale = -1.2 * progress * progress + 1.2 * progress + 0.9;
                
                // 更新阳光状态
                sun.style.left = currentX + "px";
                sun.style.top = currentY + "px";
                sun.style.transform = `scale(${scale})`;
                
                // 继续动画
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画结束，恢复阳光的交互性
                    sun.style.pointerEvents = "auto";
                    sun.style.transform = "scale(1)";
                }
            }
            
            // 开始动画
            requestAnimationFrame(animate);
            
            // 20秒后自动消失
            setTimeout(() => {
                if (sun.parentNode) {
                    sun.style.animation = "sunCollect 0.3s forwards";
                    setTimeout(() => sun.remove(), 300);
                }
            }, 20000);
        }
        
        // 在指定位置生成阳光（主人公固定生成10块钱阳光）
        function spawnSunAtPosition(sunValue = 10) {
            const lawnEl = document.getElementById("lawn");
            const protagonistEl = document.getElementById("protagonist");
            
            if (!lawnEl || !protagonistEl) return;
            
            // 根据阳光值选择对应的图片
            let sunImage = "tupian/10.png";
            for (const type of sunConfig.types) {
                if (type.value === sunValue) {
                    sunImage = type.image;
                    break;
                }
            }
            
            // 获取主人公位置
            const protRect = protagonistEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            
            // 计算起始位置（主人公中心）
            const startX = (protRect.left - lawnRect.left) + protRect.width / 2 - 4 * window.innerHeight / 200;
            const startY = (protRect.top - lawnRect.top) + protRect.height / 2 - 4 * window.innerHeight / 200;
            
            // 计算随机目标位置（在主人公周围）
            const randomRadius = Math.random() * 30;
            const randomAngle = Math.random() * Math.PI * 2;
            const endX = startX + Math.cos(randomAngle) * randomRadius;
            const endY = startY + Math.sin(randomAngle) * randomRadius;
            
            // 创建阳光元素
            const sun = document.createElement("div");
            sun.className = "sun";
            sun.dataset.value = sunValue; // 存储阳光价值
            sun.innerHTML = `<img src='${sunImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
            sun.style.width = "8vmin";
            sun.style.height = "8vmin";
            sun.style.position = "absolute";
            sun.style.pointerEvents = "none";
            sun.style.zIndex = "1000";
            
            // 设置起始位置
            sun.style.left = startX + "px";
            sun.style.top = startY + "px";
            
            // 点击收集阳光
            sun.addEventListener("mouseenter", () => collectSun(sun));
            
            // 添加到草坪
            lawnEl.appendChild(sun);
            
            // 执行抛物线动画
            let startTime = null;
            const duration = 800; // 动画持续时间
            const maxHeight = 60; // 抛物线最高点高度
            
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                
                // 计算当前位置（线性插值）
                const currentX = startX + (endX - startX) * progress;
                
                // 计算抛物线高度
                const parabolaHeight = -4 * maxHeight * Math.pow(progress - 0.5, 2) + maxHeight;
                const currentY = startY + (endY - startY) * progress - parabolaHeight;
                
                // 计算当前缩放（缩小大小变化幅度）
                const scale = -1.2 * progress * progress + 1.2 * progress + 0.9;
                
                // 更新阳光状态
                sun.style.left = currentX + "px";
                sun.style.top = currentY + "px";
                sun.style.transform = `scale(${scale})`;
                
                // 继续动画
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画结束，恢复阳光的交互性
                    sun.style.pointerEvents = "auto";
                    sun.style.transform = "scale(1)";
                }
            }
            
            // 开始动画
            requestAnimationFrame(animate);
            
            // 20秒后自动消失
            setTimeout(() => {
                if (sun.parentNode) {
                    sun.style.animation = "sunCollect 0.3s forwards";
                    setTimeout(() => sun.remove(), 300);
                }
            }, 20000);
        }
        
        // 创建阳光元素
        function createSunElement(x, y, value, imageName, lawnEl) {
            // 创建阳光元素
            const sun = document.createElement("div");
            sun.className = "sun";
            sun.dataset.value = value; // 存储阳光价值
            
            // 使用指定的图片
            sun.innerHTML = `<img src='${imageName}' style='width: 100%; height: 100%; object-fit: contain;'>`;
            
            sun.style.left = x + "px";
            sun.style.top = y + "px";
            
            // 点击收集阳光
            sun.addEventListener("mouseenter", () => collectSun(sun));
            
            // 添加到草坪
            lawnEl.appendChild(sun);
            
            // 20秒后自动消失
            setTimeout(() => {
                if (sun.parentNode) {
                    sun.style.animation = "sunCollect 0.3s forwards";
                    setTimeout(() => sun.remove(), 300);
                }
            }, 20000);
        }
        
        // 收集阳光
        function collectSun(sun) {
            // 阻止事件冒泡
            if (!sun || !sun.parentNode) return;
            
            if (!sunCountEl || !lawnEl) return;
            
            // 播放钱拾取音效
            window.soundManager.playSound('Sound effects/money.mp3', 0.8);
            
            // 获取阳光价值
            const value = parseInt(sun.dataset.value) || 10;
            
            const countRect = sunCountEl.getBoundingClientRect();
            const lawnRectCalc = lawnEl.getBoundingClientRect();
            
            // 计算目标位置（相对于草坪）
            const targetX = countRect.left - lawnRectCalc.left + countRect.width / 2 - 4 * window.innerHeight / 200;
            const targetY = countRect.top - lawnRectCalc.top + countRect.height / 2 - 4 * window.innerHeight / 200;
            
            // 计算起始位置
            const startX = parseFloat(sun.style.left);
            const startY = parseFloat(sun.style.top);
            
            // 播放飞行动画
            let startTime = null;
            const duration = 400;
            
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                
                // 缓动函数
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // 计算当前位置
                const currentX = startX + (targetX - startX) * easeProgress;
                const currentY = startY + (targetY - startY) * easeProgress;
                
                // 计算当前缩放和透明度
                const scale = 1 - progress * 0.5;
                const opacity = 1 - progress * 0.5;
                
                // 更新阳光状态
                sun.style.left = currentX + "px";
                sun.style.top = currentY + "px";
                sun.style.transform = `scale(${scale})`;
                sun.style.opacity = opacity;
                
                // 继续动画
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画结束，增加钱数
                    config.sun += value;
                    if (sunCountEl) {
                        sunCountEl.textContent = config.sun;
                    }
                    
                    // 播放钱数增加音效
                    window.soundManager.playSound('Sound effects/money2.mp3', 0.8);
                    
                    // 更新植物卡槽的钱不足状态
                    updatePlantCardsSunStatus();
                    
                    // 移除阳光
                    if (sun.parentNode) {
                        sun.remove();
                    }
                }
            }
            
            // 开始动画
            requestAnimationFrame(animate);
        }
        
        // 启动阳光生成
        function startSunGenerator() {
            // 基础间隔
            const baseInterval = 10000;
            
            // 应用赚钱升级的速度加成
            let interval = baseInterval;
            if (typeof moneyUpgradeSystem !== 'undefined') {
                const levelInfo = moneyUpgradeSystem.getCurrentLevelInfo();
                interval = baseInterval / levelInfo.sunProductionSpeed;
            }
            
            // 每指定间隔生成一个阳光
            setInterval(() => {
                spawnSun();
            }, interval);
            
            // 立即生成第一个阳光
            setTimeout(() => {
                spawnSun();
            }, 1000);
        }
        
        // 生成阳光（从主人公）
        function spawnSun() {
            // 获取阳光数量
            let sunAmount = 10;
            if (typeof moneyUpgradeSystem !== 'undefined') {
                const levelInfo = moneyUpgradeSystem.getCurrentLevelInfo();
                sunAmount = levelInfo.sunAmount;
            }
            
            spawnSunAtPosition(sunAmount);
        }

        // 初始化下方植物选择栏
        function initPlantBar() {

                        } else {

                        }
                    } else if (!plantShopSystem.isPlantUnlocked(plant.name)) {
                        console.log("[植物栏] 植物未解锁，不显示:", plant.name, "等级:", plant.level);
                        return; // 植物未解锁，不显示
                    } else {

                    }
                } else {

                    if ((plant.level || 0) > config.currentLevel) return;

                    attackSpeedPercent: 0,
                    attackDamagePercent: 0,
                    healthPercent: 0,
                    costPercent: 0,
                    knockbackForceValue: 0
                };
                
                // 计算实际价格（考虑卡片增强效果）

                // 计算攻击速度加成显示
                const attackSpeedBonus = enhancements.attackSpeedPercent;
                const attackSpeedDisplay = attackSpeedBonus !== 0 ? `<div class="attack-speed-bonus">攻速${attackSpeedBonus > 0 ? '+' : ''}${attackSpeedBonus}%</div>` : '';
                
                const card = document.createElement("div");
                card.className = "plant-card";
                // 使用cardIcon属性显示卡槽图标，如果没有则使用icon属性
                const cardIcon = plant.cardIcon || plant.icon;
                card.innerHTML = `${cardIcon}<div class="price plant-price">${actualCost}</div>${attackSpeedDisplay}`;
                // 查找植物在原始数组中的索引
                const originalIndex = config.plants.findIndex(p => p.name === plant.name);
                card.dataset.index = originalIndex;
                card.dataset.actualCost = actualCost; // 存储实际价格
                card.addEventListener("click", () => selectPlant(card, plant));
                plantBarEl.appendChild(card);
            });
            
            // 添加铲子工具

            shovelTool.title = "铲子工具 - 点击植物移除"
            shovelTool.addEventListener("click", () => selectShovel(shovelTool));
            plantBarEl.appendChild(shovelTool);

        // 更新植物卡槽的钱不足状态
        function updatePlantCardsSunStatus() {
            const plantCards = document.querySelectorAll('.plant-card');
            plantCards.forEach(card => {
                const plantIndex = parseInt(card.dataset.index);
                const plant = config.plants[plantIndex];
                const actualCost = parseInt(card.dataset.actualCost) || plant.cost;
                
                if (plant && config.sun < actualCost) {
                    card.classList.add('not-enough-sun');
                } else {
                    card.classList.remove('not-enough-sun');
                }
            });
        }

        // 选择植物
        function selectPlant(cardEl, plant) {

            if (plant.cooldown && plant.cooldown > 0) {
                return showToast("植物正在冷却中！");

            // 播放选择音效
            window.soundManager.playSound('Sound effects/Choose.mp3', 0.8);

            document.querySelectorAll(".shovel-tool").forEach(s => s.classList.remove("selected"));

            config.selectedPlant = plant;
            config.selectedShovel = false;

        // 重置所有植物的冷却状态
        function resetAllPlantCooldowns() {
            config.plants.forEach(plantType => {
                plantType.cooldown = 0;
                plantType.cooldownStartTime = null;
            });
            
            // 清除所有植物卡片的冷却UI

        // 重置植物选择超时计时器（已废弃）
        function resetPlantSelectionTimer() {
            // 清除之前的计时器
            if (config.plantSelectionTimer) {
                clearTimeout(config.plantSelectionTimer);
                config.plantSelectionTimer = null;
            }
        }

        // 取消植物选择
        function cancelPlantSelection() {
            if (config.plantSelectionTimer) {
                clearTimeout(config.plantSelectionTimer);
                config.plantSelectionTimer = null;
            }
            document.querySelectorAll(".plant-card").forEach(c => c.classList.remove("selected"));
            document.querySelectorAll(".shovel-tool").forEach(s => s.classList.remove("selected"));
            config.selectedPlant = null;
            config.selectedShovel = false;
        }

        // 检查格子中是否有植物（除了可重叠的盾牌类植物）
        function hasPlantInCell(row, col) {
            const lawnGridEl = document.getElementById("lawnGrid");
            const lawnEl = document.getElementById("lawn");
            
            if (!lawnGridEl || !lawnEl) return false;
            
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const cellWidth = lawnGridRect.width / config.gridCols;
            const cellHeight = lawnGridRect.height / config.gridRows;
            
            // 计算格子的中心位置
            const cellCenterX = (lawnGridRect.left - lawnRect.left) + col * cellWidth + cellWidth / 2;
            const cellCenterY = (lawnGridRect.top - lawnRect.top) + row * cellHeight + cellHeight / 2;
            
            // 检查每个植物
            for (const plant of config.plantsOnLawn) {
                // 如果植物可以重叠，跳过检查
                if (plant.canOverlap) continue;
                
                // 计算植物的中心位置
                const plantSize = plant.containerSize || 15;
                const plantCenterX = plant.x + (plantSize / 2) * window.innerHeight / 100;
                const plantCenterY = plant.y + (plantSize / 2) * window.innerHeight / 100;
                
                // 计算植物所在的格子
                const plantCol = Math.floor((plantCenterX - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const plantRow = Math.floor((plantCenterY - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 如果植物在目标格子中
                if (plantRow === row && plantCol === col) {
                    return true;
                }
            }
            
            return false;
        }
        // 获取格子中的所有植物
        function getPlantsInCell(row, col) {
            const plantsInCell = [];
            const lawnGridEl = document.getElementById("lawnGrid");
            const lawnEl = document.getElementById("lawn");
            
            if (!lawnGridEl || !lawnEl) return plantsInCell;
            
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const cellWidth = lawnGridRect.width / config.gridCols;
            const cellHeight = lawnGridRect.height / config.gridRows;
            
            // 计算格子的中心位置
            const cellCenterX = (lawnGridRect.left - lawnRect.left) + col * cellWidth + cellWidth / 2;
            const cellCenterY = (lawnGridRect.top - lawnRect.top) + row * cellHeight + cellHeight / 2;
            
            // 检查每个植物
            for (const plant of config.plantsOnLawn) {
                // 计算植物的中心位置
                const plantSize = plant.containerSize || 15;
                const plantCenterX = plant.x + (plantSize / 2) * window.innerHeight / 100;
                const plantCenterY = plant.y + (plantSize / 2) * window.innerHeight / 100;
                
                // 计算植物所在的格子
                const plantCol = Math.floor((plantCenterX - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const plantRow = Math.floor((plantCenterY - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 如果植物在目标格子中，添加到结果数组
                if (plantRow === row && plantCol === col) {
                    plantsInCell.push(plant);
                }
            }
            
            return plantsInCell;
        }
        // 弹幕提示函数
        function showToast(message) {
            const toastContainer = document.getElementById("toastContainer");
            if (!toastContainer) return;
            
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            // 2秒后移除弹幕
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        // 种植植物或使用铲子移除植物
        function plantOnGrid(cell) {
            // 获取格子的行和列
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            
            // 铲子模式：移除植物
            if (config.selectedShovel) {
                const plantsInCell = getPlantsInCell(row, col);
                if (plantsInCell.length === 0) {
                    return showToast("此格子没有植物！");
                }
                
                // 对格子中的所有植物造成9999999点伤害（立即移除）
                plantsInCell.forEach(plant => {
                    plant.takeDamage(9999999);
                });
                
                // 移除后取消铲子选择
                cancelPlantSelection();
                return;
            }
            
            // 植物种植模式
            if (!config.selectedPlant) return showToast("请先选择下方植物！");
            
            // 获取植物当前的属性增强
            const enhancements = window.rogueCards ? window.rogueCards.plantEnhancementSystem.getPlantEnhancements(config.selectedPlant.name) : {
                attackSpeedPercent: 0,
                attackDamagePercent: 0,
                healthPercent: 0,
                costPercent: 0,
                knockbackForceValue: 0
            };
            
            // 计算实际价格（考虑卡片增强效果）
            const actualCost = Math.max(1, Math.round(config.selectedPlant.cost * (1 + enhancements.costPercent / 100)));
            
            if (config.sun < actualCost) return showToast("阳光不足！");
            
            // 检查冷却时间
            if (config.selectedPlant.cooldown && config.selectedPlant.cooldown > 0) {
                return showToast("植物正在冷却中！");
            }
            
            // 检查是否可以重叠
            if (!config.selectedPlant.canOverlap && hasPlantInCell(row, col)) {
                return showToast("此格子已有植物！");
            }
            // 扣钱（使用实际价格）
            config.sun -= actualCost;
            sunCountEl.textContent = config.sun;
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();
            // 计算植物位置
            const rect = cell.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const plantSize = config.selectedPlant.containerSize || 15; // vmin
            const x = rect.left - lawnRect.left + rect.width/2 - (plantSize * window.innerHeight / 200);
            const y = rect.top - lawnRect.top + rect.height/2 - (plantSize * window.innerHeight / 200);
            // 创建植物实例
            const plant = new Plant(config.selectedPlant, x, y);
            plant.col = col;
            plant.row = row;
            const plantElement = plant.createElement(lawnEl);
            // 设置z-index，下面的行层级更高
            plantElement.style.zIndex = row + 1;
            plant.startAttack();
            
            // 添加到植物列表
            config.plantsOnLawn.push(plant);
            
            // 随机播放种植音效（1-4）
            const plantSoundNum = Math.floor(Math.random() * 4) + 1;
            window.soundManager.playSound(`Sound effects/${plantSoundNum}.mp3`, 0.8);
            
            // 触发植物冷却
            if (config.selectedPlant.plantCooldown) {
                startPlantCooldown(config.selectedPlant);
            }
            // 种植后立刻取消选择
            cancelPlantSelection();
        }
        
        // 开始植物冷却
        function startPlantCooldown(plantType) {
            // 记录冷却开始时间
            plantType.cooldownStartTime = Date.now();
            plantType.cooldown = plantType.plantCooldown * 1000; // 转换为毫秒
            
            // 找到对应的植物卡片
            const plantCards = document.querySelectorAll('.plant-card');
            plantCards.forEach(card => {
                const index = parseInt(card.dataset.index);
                if (config.plants[index] === plantType) {
                    // 添加冷却动画

            // 稀有度名称到CSS类名的映射

                "史诗": "epic",
                "传说": "legendary",
                "逆天": "mythical"
            };
            
            // 稀有度排序权重（数值越大越稀有）
            const rarityOrder = {
                "普通": 1,
                "稀有": 2,
                "史诗": 3,
                "传说": 4,
                "逆天": 5
            };
            
            // 按稀有度降序排序（最稀有排前面）
            const sortedCards = [...availableCards].sort((a, b) => {
                const orderA = rarityOrder[a.rarity.name] || 0;
                const orderB = rarityOrder[b.rarity.name] || 0;
                return orderB - orderA;
            });
            
            // 重新排列：最高在中间，第二在左，第三在右
            let orderedCards = [];
            if (sortedCards.length >= 3) {
                orderedCards = [sortedCards[1], sortedCards[0], sortedCards[2]]; // [第二, 第一, 第三]
            } else if (sortedCards.length === 2) {
                orderedCards = [sortedCards[1], sortedCards[0]]; // [第二, 第一]
            } else {
                orderedCards = sortedCards; // 只有一张或零张
            }
            
            orderedCards.forEach(card => {
                const cardElement = document.createElement("div");

                `;
                
                cardsContainer.appendChild(cardElement);
            });
        }

        // 判断效果是否为正面效果
        function isEffectPositive(effectType, effectValue) {
            // 定义正面效果类型（数值增加为正面）
            const positiveEffectTypes = [
                rogueCards.cardEffectTypes.ATTACK_SPEED_PERCENT,
                rogueCards.cardEffectTypes.ATTACK_DAMAGE_PERCENT,
                rogueCards.cardEffectTypes.HEALTH_PERCENT,
                rogueCards.cardEffectTypes.HEALTH_REGEN,
                rogueCards.cardEffectTypes.KNOCKBACK_FORCE_VALUE
            ];
            
            // 定义负面效果类型（数值增加为负面）
            const negativeEffectTypes = [
                rogueCards.cardEffectTypes.COST_PERCENT
            ];
            
            // 正面效果类型：数值增加为正面，数值减少为负面
            if (positiveEffectTypes.includes(effectType)) {
                return effectValue > 0;
            }
            
            // 负面效果类型：数值增加为负面，数值减少为正面
            if (negativeEffectTypes.includes(effectType)) {
                return effectValue < 0;
            }
            
            // 默认根据数值正负判断
            return effectValue > 0;
        }
        
        // 获取效果颜色类名（支持温度属性的特殊颜色）
        function getEffectColorClass(effectType, effectValue) {
            // 温度附加属性特殊处理
            if (effectType === rogueCards.cardEffectTypes.TEMPERATURE_BONUS) {
                if (effectValue > 0) {
                    return 'effect-temperature-positive'; // 橙色（正温度）
                } else if (effectValue < 0) {
                    return 'effect-temperature-negative'; // 深蓝色（负温度）
                } else {
                    return 'effect-neutral'; // 中性（零温度）
                }
            }
            
            // 其他效果使用原有的正面/负面判断
            const isPositive = isEffectPositive(effectType, effectValue);
            return isPositive ? 'effect-positive' : 'effect-negative';
        }

    // 格式化加成显示的辅助函数（百分比加成在名称后面，具体数值右对齐）
    function formatFullEnhancement(label, value, baseValue = null, isPercent = true, isPositive = true) {
        const sign = value > 0 ? '+' : '';
        const suffix = isPercent ? '%' : '';
        const color = value > 0 ? (isPositive ? '#27ae60' : '#e74c3c') : (value < 0 ? (isPositive ? '#e74c3c' : '#27ae60') : '#757575');
        
        // 如果有基础值，计算实际值
        let actualValue = null;
        if (baseValue !== null) {
            if (isPercent) {
                actualValue = Math.round(baseValue * (1 + value / 100));
            } else {
                actualValue = baseValue + value;

        // 应用卡片到植物（保留供其他地方调用）

        // 显示增强动画
        function showEnhancementAnimation(plantElement, plant, oldEnhancements, newEnhancements, card) {
            // 创建动画遮罩层
            const animationOverlay = document.createElement('div');
            animationOverlay.style.cssText = `
                position: absolute;
                top: 0;

                z-index: 100;
                animation: fadeIn 0.3s ease-out;
            `;
            
            // 计算变化的属性
            const changes = [];
            const propMap = {
                attackSpeedPercent: { label: '攻速', isPercent: true, showActual: true, actualBase: 100 },
                attackDamagePercent: { label: '攻击', isPercent: true, showActual: true, actualBase: plant.attack || 10 },
                healthPercent: { label: '生命', isPercent: true, showActual: true, actualBase: plant.health || 100 },
                healthRegen: { label: '回复', isPercent: false, showActual: true, actualBase: 0 },
                costPercent: { label: '价格', isPercent: true, showActual: true, actualBase: plant.cost, isPositive: false },
                xRangeValue: { label: 'X射程', isPercent: false, showActual: true, actualBase: plant.xRange !== undefined ? plant.xRange : 1 },
                yRangeValue: { label: 'Y射程', isPercent: false, showActual: true, actualBase: plant.yRange !== undefined ? plant.yRange : 1 },
                maxChases: { label: '追击', isPercent: false, showActual: true, actualBase: 0 },
                chaseTriggerChance: { label: '追概', isPercent: true, showActual: true, actualBase: 0 },

                lockCount: { label: '锁定', isPercent: false, showActual: true, actualBase: 0 },
                temperatureBonus: { label: '温度', isPercent: false, showActual: true, actualBase: 0 },
                knockbackForceValue: { label: '击退', isPercent: false, showActual: true, actualBase: 0 }
            };
            
            for (const [prop, config] of Object.entries(propMap)) {
                const oldVal = oldEnhancements[prop] || 0;
                const newVal = newEnhancements[prop] || 0;
                if (oldVal !== newVal) {
                    const diff = newVal - oldVal;
                    const sign = diff > 0 ? '+' : '';
                    const suffix = config.isPercent ? '%' : '';
                    
                    // 格式化增幅值显示
                    const oldEnhVal = `${oldVal}${suffix}`;
                    const newEnhVal = `${newVal}${suffix}`;
                    const diffEnhVal = `${sign}${diff}${suffix}`;
                    
                    // 计算实际值变化（如果需要显示）
                    let oldActual = null;
                    let newActual = null;
                    if (config.showActual && config.actualBase !== undefined) {
                        if (prop === 'chaseDamageRatio' || prop === 'chaseTriggerChance') {
                            // 追击伤害和追击概率是直接叠加的百分比
                            oldActual = config.actualBase + oldVal;
                            newActual = config.actualBase + newVal;
                        } else if (config.isPercent) {
                            oldActual = Math.round(config.actualBase * (1 + oldVal / 100));
                            newActual = Math.round(config.actualBase * (1 + newVal / 100));
                        } else {
                            oldActual = config.actualBase + oldVal;
                            newActual = config.actualBase + newVal;
                        }
                    }
                    
                    changes.push({
                        label: config.label,
                        oldEnhVal,
                        newEnhVal,
                        diffEnhVal,
                        oldActual,
                        newActual,
                        showActual: config.showActual,
                        isPositive: config.isPositive === false ? (diff < 0) : (diff > 0),
                        isPercentActual: prop === 'chaseDamageRatio' || prop === 'chaseTriggerChance'
                    });
                }
            }
            
            // 构建动画内容
            let changesHTML = '';
            if (changes.length > 0) {
                changesHTML = changes.map((change, index) => {
                    let actualDisplay = '';
                    if (change.showActual && change.oldActual !== null) {
                        const actualSuffix = change.isPercentActual ? '%' : '';
                        actualDisplay = `
                            <span style="display: flex; align-items: center; gap: 0.4vmin; margin-left: 0.6vmin;">
                                <span style="color: #95a5a6; font-size: 0.85vmin;">${change.oldActual}${actualSuffix}</span>
                                <span style="color: #7f8c8d; font-size: 0.85vmin;">→</span>
                                <span style="color: #1976d2; font-weight: bold; font-size: 0.9vmin;">${change.newActual}${actualSuffix}</span>
                            </span>

                    }
                    
                    return `

                            margin-bottom: 0.4vmin;
                            box-shadow: 0 0.15vmin 0.4vmin rgba(0,0,0,0.12);
                        ">
                            <span style="font-weight: bold; color: #2c3e50; font-size: 0.95vmin; white-space: nowrap;">${change.label}:</span>
                            <div style="display: flex; align-items: center; gap: 0.5vmin; white-space: nowrap;">
                                <span style="color: #95a5a6; font-size: 0.9vmin;">${change.oldEnhVal}</span>
                                <span style="color: #7f8c8d; font-size: 0.9vmin;">→</span>
                                <span style="color: #1976d2; font-weight: bold; font-size: 0.95vmin;">${change.newEnhVal}</span>
                                <span style="color: ${change.isPositive ? '#27ae60' : '#e74c3c'}; font-weight: bold; font-size: 0.9vmin;">(${change.diffEnhVal})</span>
                                ${actualDisplay}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            animationOverlay.innerHTML = `
                <div style="text-align: center; width: 94%;">
                    <div style="
                        font-size: 1.3vmin;
                        color: white;
                        font-weight: bold;
                        text-shadow: 0 0.15vmin 0.4vmin rgba(0,0,0,0.3);

                    ">✨ ${card.name} 已应用!</div>
                    <div style="

                        font-weight: bold;
                        margin-bottom: 0.8vmin;
                        text-shadow: 0 0.15vmin 0.4vmin rgba(0,0,0,0.3);
                    ">${plant.name}</div>
                    ${changes.length > 0 ? `

                            padding: 0.2vmin;
                        ">
                            ${changesHTML}
                        </div>
                    ` : `
                        <div style="
                            color: white;
                            font-size: 1.1vmin;
                            opacity: 0.9;
                        ">属性已更新!</div>
                    `}
                </div>
            `;
            
            plantElement.style.position = 'relative';
            plantElement.appendChild(animationOverlay);
            
            // 添加CSS动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {

            document.head.appendChild(style);

        // 更新植物属性
        function updatePlantProperties(plantName) {

            const plantType = config.plants.find(p => p.name === plantName);
            
            if (plantType) {

        // ==================== 卡组图鉴功能 ====================
        
        // 当前选中的分类
        let currentCatalogCategory = 'all';
        
        // 卡牌分类配置
        const cardCategories = {
            all: { name: '全部', icon: '📚' },
            attackSpeed: { name: '攻速类', icon: '⚡' },

        };
        
        // 判断卡牌的主要分类
        function getCardCategory(card) {
            if (!card.effects || card.effects.length === 0) {
                return 'other';
            }
            
            // 检查主要效果类型
            const primaryEffect = card.effects[0];
            
            if (primaryEffect.type === cardEffectTypes.ATTACK_SPEED_PERCENT) {
                return 'attackSpeed';
            }
            if (primaryEffect.type === cardEffectTypes.ATTACK_DAMAGE_PERCENT) {
                return 'attackDamage';
            }
            if (primaryEffect.type === cardEffectTypes.HEALTH_PERCENT || 
                primaryEffect.type === cardEffectTypes.HEALTH_REGEN) {
                return 'health';
            }
            if (primaryEffect.type === cardEffectTypes.KNOCKBACK_FORCE_VALUE) {
                return 'knockback';
            }
            if (primaryEffect.type === cardEffectTypes.MAX_CHASES || 
                primaryEffect.type === cardEffectTypes.CHASE_TRIGGER_CHANCE || 
                primaryEffect.type === cardEffectTypes.CHASE_DAMAGE_RATIO) {
                return 'chase';
            }
            if (primaryEffect.type === cardEffectTypes.TEMPERATURE_BONUS) {
                return 'temperature';
            }
            if (primaryEffect.type === cardEffectTypes.COST_PERCENT) {
                return 'economy';
            }
            if (primaryEffect.type === cardEffectTypes.X_RANGE_VALUE || 
                primaryEffect.type === cardEffectTypes.Y_RANGE_VALUE) {
                return 'range';
            }
            
            return 'other';
        }
        
        // 获取稀有度显示样式
        function getRarityStyle(rarity) {
            if (rarity.name === '普通') {
                return { bg: '#f5f5f5', border: '#9e9e9e', color: '#616161' };
            }
            if (rarity.name === '稀有') {
                return { bg: '#e3f2fd', border: '#2196f3', color: '#1976d2' };
            }
            if (rarity.name === '史诗') {
                return { bg: '#f3e5f5', border: '#9c27b0', color: '#7b1fa2' };
            }
            if (rarity.name === '传说') {
                return { bg: '#fff8e1', border: '#ff9800', color: '#f57c00' };
            }
            if (rarity.name === '逆天') {
                return { bg: '#ffebee', border: '#f44336', color: '#c62828' };
            }
            return { bg: '#f5f5f5', border: '#9e9e9e', color: '#616161' };
        }
        
        // 渲染分类标签
        function renderCatalogTabs() {
            const tabsContainer = document.getElementById('catalogTabs');
            tabsContainer.innerHTML = '';
            
            Object.entries(cardCategories).forEach(([key, category]) => {
                const tab = document.createElement('button');
                tab.className = 'catalog-tab' + (currentCatalogCategory === key ? ' active' : '');
                tab.innerHTML = `${category.icon} ${category.name}`;
                tab.onclick = () => switchCatalogCategory(key);
                tabsContainer.appendChild(tab);

        // 切换分类
        function switchCatalogCategory(category) {
            currentCatalogCategory = category;

        // 渲染卡牌列表
        function renderCatalogCards() {
            const container = document.getElementById('catalogCardsContainer');
            container.innerHTML = '';
            
            let filteredCards = rogueCards.cardPool;
            
            // 筛选卡牌
            if (currentCatalogCategory !== 'all') {
                filteredCards = rogueCards.cardPool.filter(card => 
                    getCardCategory(card) === currentCatalogCategory
                );
            }
            
            // 按类别分组
            const cardsByCategory = {};
            filteredCards.forEach(card => {
                const category = getCardCategory(card);
                if (!cardsByCategory[category]) {
                    cardsByCategory[category] = [];
                }
                cardsByCategory[category].push(card);
            });
            
            // 对每个类别进行处理
            Object.keys(cardsByCategory).forEach(categoryKey => {
                const categoryCards = cardsByCategory[categoryKey];
                const category = cardCategories[categoryKey];
                
                // 创建类别分组
                const categoryGroup = document.createElement('div');
                categoryGroup.className = 'catalog-category-group';
                
                // 添加类别标题（如果不是"全部"分类）

                    categoryGroup.appendChild(categoryTitle);

                    cardsByRarity[rarity] = categoryCards.filter(card => card.rarity.name === rarity);

                    rarityTitle.style.color = rarityStyle.color;
                    rarityTitle.innerHTML = `◆ ${rarityName}`;
                    rarityGroup.appendChild(rarityTitle);
                    
                    // 按每行8张卡牌分组
                    const cardsPerRow = 8;
                    for (let i = 0; i < rarityCards.length; i += cardsPerRow) {
                        const rowCards = rarityCards.slice(i, i + cardsPerRow);
                        
                        const row = document.createElement('div');
                        row.className = 'catalog-cards-row';
                        
                        // 渲染这一行的卡牌
                        rowCards.forEach(card => {
                            const cardEl = createCatalogCardElement(card);
                            row.appendChild(cardEl);
                        });
                        
                        rarityGroup.appendChild(row);
                    }
                    
                    categoryGroup.appendChild(rarityGroup);
                });
                
                container.appendChild(categoryGroup);
            });
        }
        
        // 渲染成长信息
        function renderGrowthInfo() {
            const growthInfo = document.getElementById('growthInfo');
            const growth = rogueCards.playerGrowthSystem;
            
            growthInfo.innerHTML = `
                <div class="growth-info-row">
                    <span>🎯 已通关: <strong>${growth.maxCompletedLevel}</strong> 关</span>
                    <span>⭐ 掌控点数: <strong>${growth.controlPoints}</strong></span>
                    <span>🚫 禁用卡牌: <strong>${growth.disabledCards.length}</strong> / <strong>${growth.controlPoints}</strong></span>
                </div>
            `;
        }

        // 切换卡牌禁用状态
        function toggleCardDisabled(cardId) {
            const growth = rogueCards.playerGrowthSystem;
            
            if (growth.isCardDisabled(cardId)) {
                growth.enableCard(cardId);
                showToast("已启用卡牌！");
            } else {
                if (growth.disableCard(cardId)) {
                    showToast("已禁用卡牌！");
                } else {
                    showToast("没有足够的掌控点数！");
                }
            }
            
            renderGrowthInfo();
            renderCatalogCards();
        }

        // 创建单个卡牌元素
        function createCatalogCardElement(card) {
            const cardEl = document.createElement('div');
            cardEl.className = 'catalog-card';
            
            const rarityStyle = getRarityStyle(card.rarity);
            const isDisabled = rogueCards.playerGrowthSystem.isCardDisabled(card.id);
            
            cardEl.style.borderColor = rarityStyle.border;
            cardEl.style.borderWidth = '0.5vmin';
            
            const buttonColor = isDisabled 
                ? 'background: linear-gradient(135deg, #4ecdc4, #44a08d);' 
                : 'background: linear-gradient(135deg, #ff6b6b, #ee5a5a);';
            
            cardEl.innerHTML = `
                ${isDisabled ? '<div class="card-disabled-overlay"></div>' : ''}
                <div class="catalog-card-header">
                    <span class="catalog-card-icon">${card.icon}</span>
                    <span class="catalog-card-rarity" style="background: ${rarityStyle.bg}; color: ${rarityStyle.color}; border: 0.1vmin solid ${rarityStyle.border};">${card.rarity.name}</span>
                </div>
                <div class="catalog-card-title-row">
                    <span class="catalog-card-name">${card.name}</span>
                    <span class="catalog-card-cost">${card.cost}</span>
                </div>
                <div class="catalog-card-description">${card.description}</div>
                <button class="disable-card-button" style="${buttonColor}" onclick="toggleCardDisabled(${card.id}); event.stopPropagation();">
                    ${isDisabled ? '✅ 启用' : '🚫 禁用'}
                </button>
            `;
            
            return cardEl;
        }
        
        // 打开卡组编辑器
        function openCardCatalog() {
            document.getElementById('cardCatalogModal').style.display = 'flex';
            currentCatalogCategory = 'all';
            renderGrowthInfo();
            renderCatalogTabs();
            renderCatalogCards();
        }
        
        // 关闭卡组图鉴
        function closeCardCatalog() {
            document.getElementById('cardCatalogModal').style.display = 'none';
        }
        
        // 刷新卡片
        function refreshCards() {
            if (currentDreamPoints < 10) {
                showToast("刷新需要10梦境点数！");
                return;
            }
            
            currentDreamPoints -= 10;
            rogueCards.cardShopSystem.currentDreamPoints = currentDreamPoints;
            rogueCards.cardShopSystem.refreshCards();
            
            document.getElementById("dreamPointsCount").textContent = currentDreamPoints;
            renderCards();
            
            // 播放 bruh 音效
            window.soundManager.playSound('Sound effects/bruh.mp3', 0.8);
            
            showToast("已刷新卡片，消耗10梦境点数");
        }
        
        // 进入下一关
        function skipCardShop() {
            document.getElementById("cardShopModal").style.display = "none";
            
            // 清除场上所有植物和僵尸
            clearField();
            
            // 清除所有阳光
            const suns = document.querySelectorAll('.sun');
            suns.forEach(sun => sun.remove());
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重置游戏配置
            config.sun = 20;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 更新阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();
            
            // 继续下一关
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式
                const nextLevel = config.currentLevel + 1;
                // 检查 rogueLevels 中是否存在该关卡
                if (typeof rogueLevels !== 'undefined') {
                    const hasNextLevel = rogueLevels.some(l => l.id === nextLevel);
                    if (hasNextLevel) {
                        startLevel(nextLevel);
                    } else {
                        showToast("肉鸽模式所有关卡已完成！");
                    }
                } else {
                    //  fallback 方案：到120关为止
                    if (nextLevel <= 120) {
                        startLevel(nextLevel);
                    } else {
                        showToast("肉鸽模式所有关卡已完成！");
                    }
                }
            }
        }
        

        
        // 修改nextLevel函数，在肉鸽模式下正确处理
        function nextLevel() {
            // 隐藏关卡完成弹窗
            const modal = document.getElementById("levelCompleteModal");
            if (modal) {
                modal.style.display = "none";
            }
            
            // 清除场上所有植物和僵尸
            clearField();
            
            // 清除所有阳光
            const suns = document.querySelectorAll('.sun');
            suns.forEach(sun => sun.remove());
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重置游戏配置
            config.sun = 20;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 更新阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }
            
            // 更新植物卡槽的钱不足状态
            updatePlantCardsSunStatus();
            
            // 进入下一关
            const nextLevelId = config.currentLevel + 1;
            
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式
                if (nextLevelId <= 199) {
                    startLevel(nextLevelId);
                } else {
                    console.log("肉鸽模式所有关卡已完成！");
                    showToast("恭喜完成所有肉鸽关卡！");
                }
            } else {
                // 普通模式
                const hasNextLevel = levels.some(l => l.id === nextLevelId);
                if (hasNextLevel) {
                    startLevel(nextLevelId);
                } else {
                    console.log("所有关卡已完成！进入肉鸽模式！");
                    startRogueMode();
                }
            }
        }
        
        // 快捷召唤僵尸配置
        // 后续添加新的快捷召唤，只需在这里添加新的配置项
        const quickSpawnZombies = {
            'F1': { type: 'thug', name: '暴徒' },
            'F2': { type: 'dog', name: '狗' },
            'F3': { type: 'assassin', name: '刺客' },
            'F4': { type: 'police', name: '警察' },
            'F5': { type: 'lizard', name: '蜥蜴' }
        };
        
        // 通用快捷召唤僵尸函数
        function quickSpawnZombie(zombieType) {
            // 检查游戏是否正在进行中
            if (!window.game || config.levelComplete) {
                return;
            }
            
            // 获取僵尸配置
            const zombieConfig = zombieTypes[zombieType];
            if (!zombieConfig) {
                return;
            }
            
            // 随机选择一行生成僵尸
            const row = Math.floor(Math.random() * config.gridRows);
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const rowHeight = lawnGridRect.height / config.gridRows;
            
            const zombieSize = 15; // vmin
            // 让僵尸从地图最右边刷新出来，稍微超出地图边界
            const x = lawnGridRect.right - lawnRect.left + (zombieSize * window.innerHeight / 200);
            const y = lawnGridRect.top - lawnRect.top + row * rowHeight + rowHeight/2 - (zombieSize * window.innerHeight / 200);
            
            // 获取当前关卡的属性变化指数
            const { levelHealthPercent, levelAttackPercent, levelSpeedPercent } = getCurrentLevelZombieModifiers();
            // 创建僵尸实例
            const zombie = new Zombie(zombieConfig, x, y, levelHealthPercent, levelAttackPercent, levelSpeedPercent);
            const zombieElement = zombie.createElement(lawnEl);
            // 设置z-index，下面的行层级更高
            zombieElement.style.zIndex = row + 1;
            zombie.startMoving();
            
            // 添加到僵尸列表
            config.zombies.push(zombie);
            config.zombiesRemaining++;
            
            // 更新全局僵尸数量统计
            if (window.zombieCountSystem) {
                window.zombieCountSystem.addZombie();
            }
        }
        // 初始化键盘快捷键
        function initKeyboardShortcuts() {
            // 添加键盘事件监听器
            document.addEventListener('keydown', function(event) {
                // 检查是否在快捷召唤配置中
                const key = event.key;
                if (quickSpawnZombies[key]) {
                    event.preventDefault(); // 阻止浏览器默认行为
                    quickSpawnZombie(quickSpawnZombies[key].type);
                }
            });
        }
        // 游戏启动
        window.onload = function() {
            // 不自动初始化游戏，先显示模式选择界面
            console.log("[游戏] 等待玩家选择游戏模式...");
        };
    </script>
</body>
</html>
