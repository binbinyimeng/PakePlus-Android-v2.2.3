                    explosion.style.position = "absolute";
                    explosion.style.left = x + "px";
                    explosion.style.top = y + "px";
                    explosion.style.pointerEvents = "none";
                    explosion.style.zIndex = "1001";
                    explosion.style.opacity = 1;
                    explosion.style.transformOrigin = "center";
                    
                    // 添加到草坪
                    lawnEl.appendChild(explosion);
                    
                    // 爆炸动画持续时间
                    const explosionDuration = 300;
                    let explosionStartTime = null;
                    
                    function animateExplosion(timestamp) {
                        if (!explosionStartTime) explosionStartTime = timestamp;
                        const progress = Math.min((timestamp - explosionStartTime) / explosionDuration, 1);
                        
                        // 从小变大（从0.5倍到2倍）
                        const scale = 0.5 + progress * 1.5;
                        
                        // 从不透明到透明
                        const opacity = 1 - progress;
                        
                        // 更新爆炸状态
                        explosion.style.transform = `scale(${scale})`;
                        explosion.style.opacity = opacity;
                        
                        // 继续动画
                        if (progress < 1) {
                            requestAnimationFrame(animateExplosion);
                        } else {
                            // 动画结束，移除爆炸
                            if (explosion.parentNode) {
                                explosion.parentNode.removeChild(explosion);
                            }
                        }
                    }
                    
                    // 开始爆炸动画
                    requestAnimationFrame(animateExplosion);
                }
                
                // 执行抛物线动画
                let startTime = null;
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1); // 动画进度 0~1
                    
                    // 计算当前位置（线性插值）- X轴匀速移动
                    const currentX = startX + (endX - startX) * progress;
                    
                    // 计算抛物线高度 - Y轴使用抛物线公式
                    // 使用抛物线公式: y = -4 * h * (t - 0.5)^2 + h
                    // 其中 h 是最高点高度，t 是进度（0到1）
                    // 当 t=0 或 t=1 时，高度为 0；当 t=0.5 时，高度为最大值 maxHeight
                    const parabolaHeight = -4 * maxHeight * Math.pow(progress - 0.5, 2) + maxHeight;
                    const currentY = startY + (endY - startY) * progress - parabolaHeight;
                    
                    // 计算当前缩放 - 使用二次函数营造远近感
                    // 投出时偏小(0.6)，中间最大(1.3)，落到僵尸时最小(0.3)
                    // 二次函数: scale = a*t² + b*t + c
                    const scale = -2.6 * progress * progress + 2.6 * progress + 0.6;
                    
                    // 更新子弹状态（不改变透明度）
                    bullet.style.left = currentX + "px";
                    bullet.style.top = currentY + "px";
                    bullet.style.transform = `scale(${scale})`;
                    bullet.style.opacity = 1;
                    
                    // 继续动画
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 动画结束，对僵尸造成伤害
                        if (targetZombie && targetZombie.health > 0) {
                            targetZombie.takeDamage(attackDamage, attackingPlant);
                            
                            // 应用温度附加效果
                            if (temperatureBonus !== 0) {
                                // 确保温度在 -100 到 100 之间
                                targetZombie.temperature = Math.max(-100, Math.min(100, targetZombie.temperature + temperatureBonus));
                                targetZombie.applyTemperatureEffect();
                                targetZombie.initTemperatureRegression();
                            }
                        }
                        
                        // 如果有爆炸图片，播放爆炸动画
                        if (bulletExplosionImage) {
                            createExplosionAnimation(bulletExplosionImage, endX, endY, baseSize, lawnEl);
                        }
                        
                        // 移除子弹
                        if (bullet.parentNode) {
                            bullet.parentNode.removeChild(bullet);
                        }
                    }
                }
                
                // 开始动画
                requestAnimationFrame(animate);
            }
            
            // 击退僵尸
            knockbackZombie(zombie) {
                if (!zombie || !zombie.element || this.knockbackForce <= 0) return;
                
                // 向右击退僵尸
                zombie.x += this.knockbackForce;
                zombie.element.style.left = zombie.x + "px";
            }
            
            // 法师特殊方法：当附近植物攻击时触发攻击
            triggerAttackOnNearbyPlantAttack() {
                if (this.name !== "法师" || this.health <= 0) return;
                
                // 检查是否有僵尸在攻击范围内
                const zombies = window.game.zombies;
                const lawnEl = document.getElementById("lawn");
                const lawnGridEl = document.getElementById("lawnGrid");
                
                if (!lawnEl || !lawnGridEl) return;
                
                const lawnRect = lawnEl.getBoundingClientRect();
                const gridRect = lawnGridEl.getBoundingClientRect();
                const cellWidth = gridRect.width / config.gridCols;
                const cellHeight = gridRect.height / config.gridRows;
                
                const plantCol = this.col;
                const plantRow = this.row;
                
                // 查找范围内的僵尸
                let hasTarget = false;
                for (const zombie of zombies) {
                    const zombieCol = Math.floor((zombie.x + 7.5 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const zombieRow = Math.floor((zombie.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    const distanceX = Math.abs(zombieCol - plantCol);
                    const distanceY = Math.abs(zombieRow - plantRow);
                    
                    let inRange = false;
                    if (this.yRange === 0) {
                        inRange = (distanceY === 0 && distanceX <= this.xRange);
                    } else {
                        inRange = (distanceX <= this.xRange && distanceY <= this.yRange && distanceX + distanceY <= this.xRange + this.yRange);
                    }
                    
                    if (inRange && zombie.health > 0) {
                        hasTarget = true;
                        this.targetZombie = zombie;
                        break;
                    }
                }
                
                // 如果有目标，立即攻击
                if (hasTarget && this.targetZombie) {
                    this.attackZombies();
                }
            }

            // 受到伤害
            takeDamage(damage, source = null) {
                let finalDamage = damage;
                let isIceBreak = false;
                let isQuench = false;
                
                // 判断是否触发破冰伤害：攻击者有正温度附加，被攻击者有负温度
                if (source && source.temperatureBonus > 0 && this.temperature < 0) {
                    finalDamage *= 3;
                    isIceBreak = true;
                }
                // 判断是否触发淬火伤害：攻击者有负温度附加，被攻击者有正温度
                else if (source && source.temperatureBonus < 0 && this.temperature > 0) {
                    finalDamage *= 2;
                    isQuench = true;
                }
                
                // 伤害四舍五入取整数
                const roundedDamage = Math.round(finalDamage);
                this.health -= roundedDamage;
                this.showDamage(roundedDamage, false, false, isIceBreak, isQuench);
                this.updateHealthBar();
                
                // 通知同一行的刀兵，有植物受到了伤害
                if (window.game && window.game.plantsOnLawn) {
                    for (const plant of window.game.plantsOnLawn) {
                        if (plant.name === "刀兵" && plant.row === this.row && plant.health > 0) {
                            plant.increaseCounter();
                        }
                    }
                }
                
                if (this.health <= 0) {
                    this.die();
                }
            }

            // 死亡
            die() {
                if (this.attackInterval) {
                    clearInterval(this.attackInterval);
                }
                if (this.shieldTimer) {
                    clearTimeout(this.shieldTimer);
                }
                if (this.deathTimer) {
                    clearTimeout(this.deathTimer);
                }
                if (this.existTimer) {
                    clearInterval(this.existTimer);
                }
                if (this.healthRegenTimer) {
                    clearInterval(this.healthRegenTimer);
                }
                if (this.element) {
                    this.element.remove();
                }
                // 从植物列表中移除
                const index = window.game.plantsOnLawn.indexOf(this);
                if (index > -1) {
                    window.game.plantsOnLawn.splice(index, 1);
                }
                // 如果是盾牌，通知盾兵
                if (this.name === "盾牌" && this.shielder) {
                    this.shielder.onShieldDestroyed();
                }
                // 如果是盾墙，摧毁所有蓝盾牌
                if (this.name === "盾墙") {
                    this.destroyBlueShields();
                }
                // 如果是蓝盾牌，通知盾墙
                if (this.name === "蓝盾牌" && this.shieldWall) {
                    this.shieldWall.onBlueShieldDestroyed(this);
                }
            }
            
            // 刀兵特殊方法：增加计数器
            increaseCounter() {
                if (this.name !== "刀兵") return;
                this.counter++;
                this.updateCounterDisplay();
            }
            
            // 刀兵特殊方法：更新计数器显示
            updateCounterDisplay() {
                if (this.name !== "刀兵" || !this.counterElement) return;
                if (this.counter > 0) {
                    this.counterElement.style.display = "block";
                    this.counterElement.textContent = this.counter.toString();
                } else {
                    this.counterElement.style.display = "none";
                }
            }
            
            // 刀兵特殊方法：计算实际攻击力
            getActualAttack() {
                if (this.name !== "刀兵") return this.attack;
                
                // 计算基础攻击力 × (1 + 卡片攻击力%/100)
                const baseWithCard = this.attack;
                
                // 再乘以 (1 + 计数器层数 × 100%)
                const counterMultiplier = 1 + this.counter;
                
                return Math.round(baseWithCard * counterMultiplier);
            }
            
            // 转换植物
            transformPlant() {
                if (!this.element) return;
                
                const lawnEl = document.getElementById("lawn");
                if (!lawnEl) return;
                
                // 确定要转换的目标植物类型
                let targetPlantType;
                if (this.name === "剑客") {
                    targetPlantType = plantTypes.swordsman2;
                } else if (this.name === "剑客2") {
                    targetPlantType = plantTypes.swordsman;
                } else {
                    return; // 只有剑客和剑客2可以转换
                }
                
                // 保存当前位置和健康值
                const currentX = this.x;
                const currentY = this.y;
                const currentHealth = this.health;
                
                // 从植物列表中移除当前植物
                const index = window.game.plantsOnLawn.indexOf(this);
                if (index > -1) {
                    window.game.plantsOnLawn.splice(index, 1);
                }
                
                // 清除当前植物的元素和计时器
                if (this.attackInterval) {
                    clearInterval(this.attackInterval);
                }
                if (this.shieldTimer) {
                    clearTimeout(this.shieldTimer);
                }
                if (this.deathTimer) {
                    clearTimeout(this.deathTimer);
                }
                if (this.element) {
                    this.element.remove();
                }
                
                // 创建新植物
                const newPlant = new Plant(targetPlantType, currentX, currentY);
                newPlant.health = currentHealth; // 保持健康值
                newPlant.col = this.col;
                newPlant.row = this.row;
                const newPlantElement = newPlant.createElement(lawnEl);
                
                // 设置z-index
                const lawnGridEl = document.getElementById("lawnGrid");
                if (lawnGridEl) {
                    const lawnRect = lawnEl.getBoundingClientRect();
                    const gridRect = lawnGridEl.getBoundingClientRect();
                    const cellHeight = gridRect.height / 5;
                    const plantCenterOffset = (newPlant.containerSize / 2) * window.innerHeight / 100;
                    const plantRow = Math.floor((currentY + plantCenterOffset - (gridRect.top - lawnRect.top)) / cellHeight);
                    newPlantElement.style.zIndex = plantRow + 1;
                }
                
                // 添加到植物列表并开始攻击
                window.game.plantsOnLawn.push(newPlant);
                newPlant.startAttack();
            }
            
            // 创建贯穿型子弹动画
            createPierceBullet() {
                if (!this.element || !this.targetZombie || !this.targetZombie.element) return;
                
                const lawnEl = document.getElementById("lawn");
                const bullet = document.createElement("div");
                
                // 获取子弹大小（默认为1）
                const bulletSize = this.type.bulletSize || 1;
                const baseSize = 10 * bulletSize;
                
                // 设置子弹样式
                bullet.className = "bullet";
                bullet.innerHTML = `<img src='${this.type.bulletImage}' style='width: 100%; height: 100%; object-fit: contain;'>`;
                bullet.style.width = `${baseSize}vmin`;
                bullet.style.height = `${baseSize}vmin`;
                bullet.style.position = "absolute";
                bullet.style.pointerEvents = "none";
                bullet.style.zIndex = "1000"; // 提高显示层级
                
                // 计算起始位置（植物中心）
                const plantRect = this.element.getBoundingClientRect();
                const lawnRect = lawnEl.getBoundingClientRect();
                
                // 应用子弹偏移
                const bulletOffset = this.type.bulletOffset || { x: 0, y: 0 };
                const startX = plantRect.left - lawnRect.left + plantRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.x;
                const startY = plantRect.top - lawnRect.top + plantRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletOffset.y;
                
                // 计算目标位置（僵尸中心），应用子弹落点偏移
                const zombieRect = this.targetZombie.element.getBoundingClientRect();
                const bulletTargetOffset = this.bulletTargetOffset || { x: 0, y: 0 };
                const endX = zombieRect.left - lawnRect.left + zombieRect.width / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.x;
                const endY = zombieRect.top - lawnRect.top + zombieRect.height / 2 - (baseSize / 2) * window.innerHeight / 100 + bulletTargetOffset.y;
                
                // 计算子弹飞行方向和距离
                const dx = endX - startX;
                const dy = endY - startY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const directionX = dx / distance;
                const directionY = dy / distance;
                
                // 计算子弹飞行的最大距离（基于攻击范围）
                const lawnGridEl = document.getElementById("lawnGrid");
                const gridRect = lawnGridEl.getBoundingClientRect();
                const cellWidth = gridRect.width / config.gridCols;
                const maxDistance = (this.xRange + 1) * cellWidth; // 攻击范围外一格
                
                // 计算最终目标位置
                const finalX = startX + directionX * maxDistance;
                const finalY = startY + directionY * maxDistance;
                
                // 设置起始位置
                bullet.style.left = startX + "px";
                bullet.style.top = startY + "px";
                
                // 计算方向并设置旋转角度
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                bullet.style.transform = `rotate(${angle + 180}deg)`; // 朝向攻击发起者的反方向
                
                // 添加到草坪
                lawnEl.appendChild(bullet);
                
                // 记录已击中的僵尸
                const hitZombies = new Set();
                
                // 保存this引用和实际攻击力
                const plantInstance = this;
                const actualAttack = this.getActualAttack ? this.getActualAttack() : this.attack;
                
                // 执行动画
                let startTime = null;
                const duration = 500 * (this.type.pierceBulletSpeedMultiplier || 1); // 动画持续时间，受飞行速度影响
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    
                    // 计算当前位置（线性插值）
                    const currentX = startX + (finalX - startX) * progress;
                    const currentY = startY + (finalY - startY) * progress;
                    
                    // 计算当前缩放
                    const scale = 1 + progress * 0.5; // 稍微放大
                    
                    // 计算当前透明度
                    let opacity;
                    if (progress < 0.8) {
                        // 前80%的时间，透明度从0.3增加到1
                        opacity = 0.3 + (progress / 0.8) * 0.7;
                    } else {
                        // 后20%的时间，透明度从1快速降低到0
                        opacity = 1 - ((progress - 0.8) / 0.2) * 1;
                    }
                    
                    // 更新子弹状态
                    bullet.style.left = currentX + "px";
                    bullet.style.top = currentY + "px";
                    bullet.style.transform = `rotate(${angle + 180}deg) scale(${scale})`;
                    bullet.style.opacity = opacity;
                    
                    // 检测子弹是否击中僵尸
                    if (window.game && window.game.zombies) {
                        for (const zombie of window.game.zombies) {
                            if (zombie.health > 0 && !hitZombies.has(zombie)) {
                                const zombieRect = zombie.element.getBoundingClientRect();
                                const zombieCenterX = zombieRect.left - lawnRect.left + zombieRect.width / 2;
                                const zombieCenterY = zombieRect.top - lawnRect.top + zombieRect.height / 2;
                                
                                // 计算子弹与僵尸的距离
                                const distanceToZombie = Math.sqrt(
                                    Math.pow(currentX + (baseSize / 2) * window.innerHeight / 100 - zombieCenterX, 2) +
                                    Math.pow(currentY + (baseSize / 2) * window.innerHeight / 100 - zombieCenterY, 2)
                                );
                                
                                // 如果距离小于僵尸半径，判定为击中
                                if (distanceToZombie < zombieRect.width / 2) {
                                    zombie.takeDamage(actualAttack, plantInstance);
                                    hitZombies.add(zombie);
                                    
                                    // 应用温度附加效果
                                    if (plantInstance.temperatureBonus !== 0) {
                                        // 确保温度在 -100 到 100 之间
                                        zombie.temperature = Math.max(-100, Math.min(100, zombie.temperature + plantInstance.temperatureBonus));
                                        zombie.applyTemperatureEffect();
                                        zombie.initTemperatureRegression();
                                    }
                                    
                                    // 检查僵尸是否阻挡弹幕
                                    if (zombie.type.blockProjectile) {
                                        // 立即移除子弹
                                        if (bullet.parentNode) {
                                            bullet.parentNode.removeChild(bullet);
                                        }
                                        return; // 停止动画
                                    }
                                }
                            }
                        }
                    }
                    
                    // 继续动画
                    if (progress < 1) {
                        requestAnimationFrame(animate.bind(plantInstance));
                    } else {
                        // 动画结束，移除子弹
                        if (bullet.parentNode) {
                            bullet.parentNode.removeChild(bullet);
                        }
                    }
                }
                
                // 开始动画
                requestAnimationFrame(animate.bind(plantInstance));
            }
            
            // 初始化生命计时器
            initHealthTimer() {
                // 如果已经有计时器，先清除
                if (this.healthTimer) {
                    clearInterval(this.healthTimer);
                    this.healthTimer = null;
                }
                
                // 如果每秒百分比生命扣除为0，不启动计时器
                if (this.percentHealthPerSecond === 0) {
                    return;
                }
                
                // 每秒执行一次生命扣除/回血
                this.healthTimer = setInterval(() => {
                    // 如果植物已经死亡，清除计时器
                    if (this.health <= 0) {
                        clearInterval(this.healthTimer);
                        this.healthTimer = null;
                        return;
                    }
                    
                    // 计算生命变化量（当前生命值的百分比）
                    let healthChange = (this.health * this.percentHealthPerSecond) / 100;
                    
                    // 温度为正数时，最低伤害为1点
                    if (healthChange > 0 && healthChange < 1) {
                        healthChange = 1;
                    }
                    
                    // 应用生命变化
                    this.health -= healthChange;
                    
                    // 显示伤害或治疗数字
                    if (healthChange > 0) {
                        this.showDamage(Math.round(healthChange), false, true);
                    } else if (healthChange < 0) {
                        this.showDamage(Math.round(-healthChange), true);
                    }
                    
                    // 确保生命值不低于0
                    this.health = Math.max(0, this.health);
                    
                    // 更新生命值显示
                    if (this.healthBar) {
                        // 血条百分比四舍五入取整数
                        const healthPercent = Math.round((this.health / this.type.health) * 100);
                        this.healthBar.style.width = `${healthPercent}%`;
                    }
                    
                    // 如果生命值变为0，触发死亡
                    if (this.health <= 0) {
                        this.die();
                    }
                }, 1000); // 每秒执行一次
            }
            
            // 计算实际移动速度
            getActualMoveSpeed() {
                // 计算移动速度系数：1 - 削减百分比/100
                const moveSpeedFactor = 1 - (this.moveSpeedPercentReduction / 100);
                // 实际移动速度 = 基础移动速度 × 系数
                return this.type.speed * moveSpeedFactor;
            }
            
            // 计算实际攻击间隔
            getActualAttackInterval() {
                // 计算攻击速度系数：1 - 削减百分比/100
                const attackSpeedFactor = 1 - (this.attackSpeedPercentReduction / 100);
                // 实际攻击间隔 = 基础攻击间隔 / 系数
                return this.type.attackInterval / attackSpeedFactor;
            }
            
            // 应用温度效果
            applyTemperatureEffect() {
                // 温度范围限制：-100 到 100
                this.temperature = Math.max(-100, Math.min(100, this.temperature));
                
                // 获取当前温度状态
                let currentState;
                if (this.temperature > 0) {
                    currentState = 'positive';
                } else if (this.temperature < 0) {
                    currentState = 'negative';
                } else {
                    currentState = 'zero';
                }
                
                // 判断是否需要重新初始化生命计时器
                const needReinitHealthTimer = (this.lastTemperatureState !== currentState);
                
                // 更新上一次的温度状态
                this.lastTemperatureState = currentState;
                
                // 温度为正数时，作为 percentHealthPerSecond
                if (this.temperature > 0) {
                    this.percentHealthPerSecond = this.temperature;
                    // 只有状态改变时才重新初始化生命计时器
                    if (needReinitHealthTimer) {
                        this.initHealthTimer();
                    }
                }
                // 温度为负数时，其相反数作为 moveSpeedPercentReduction 和 attackSpeedPercentReduction
                else if (this.temperature < 0) {
                    const absTemperature = Math.abs(this.temperature);
                    this.moveSpeedPercentReduction = absTemperature;
                    this.attackSpeedPercentReduction = absTemperature;
                }
                // 温度为0时，清除所有效果
                else {
                    this.percentHealthPerSecond = 0;
                    this.moveSpeedPercentReduction = 0;
                    this.attackSpeedPercentReduction = 0;
                    // 只有状态改变时才重新初始化生命计时器
                    if (needReinitHealthTimer) {
                        this.initHealthTimer();
                    }
                }
                
                // 更新温度显示
                this.updateTemperatureDisplay();
            }
            
            // 更新温度显示
            updateTemperatureDisplay() {
                // 如果温度为0，隐藏温度显示
                if (this.temperature === 0) {
                    if (this.temperatureElement) {
                        this.temperatureElement.style.display = 'none';
                    }
                    return;
                }
                
                // 创建温度显示元素（如果不存在）
                if (!this.temperatureElement && this.element) {
                    this.temperatureElement = document.createElement('div');
                    this.temperatureElement.className = 'temperature-display';
                    this.temperatureElement.style.position = 'absolute';
                    this.temperatureElement.style.top = '120px'; // 再下移一部分
                    this.temperatureElement.style.left = '50%';
                    this.temperatureElement.style.transform = 'translateX(-50%)';

                    this.temperatureElement.style.zIndex = '1000';
                    this.element.appendChild(this.temperatureElement);
                }
                
                // 更新温度显示内容和样式
                if (this.temperatureElement) {
                    this.temperatureElement.style.display = 'block';
                    this.temperatureElement.textContent = this.temperature > 0 ? `+${this.temperature}` : this.temperature;
                    this.temperatureElement.style.color = this.temperature > 0 ? 'orange' : 'deepskyblue';
                    this.temperatureElement.style.backgroundColor = 'transparent';
                }

            // 初始化温度回归计时器
            initTemperatureRegression() {
                // 如果已经有计时器，先清除
                if (this.temperatureRegressionTimer) {
                    clearTimeout(this.temperatureRegressionTimer);
                    this.temperatureRegressionTimer = null;
                }
                
                // 如果温度已经是0，不启动计时器
                if (this.temperature === 0) {
                    return;
                }
                
                // 计算当前温度绝对值所在的区间
                const absTemperature = Math.abs(Math.round(this.temperature));
                let interval;
                
                if (absTemperature < 10) {
                    interval = 1000; // 1秒
                } else {
                    const k = Math.floor(absTemperature / 10);
                    interval = 1000 / (k + 1);
                }
                
                // 使用 setTimeout 而不是 setInterval，因为每次温度变化后间隔可能改变
                this.temperatureRegressionTimer = setTimeout(() => {
                    // 温度向 0 回归一格
                    if (this.temperature > 0) {
                        this.temperature = Math.round(this.temperature) - 1;
                    } else if (this.temperature < 0) {
                        this.temperature = Math.round(this.temperature) + 1;
                    }
                    
                    // 确保温度在 -100 到 100 之间
                    this.temperature = Math.max(-100, Math.min(100, this.temperature));
                    
                    // 应用温度效果
                    this.applyTemperatureEffect();
                    
                    // 递归调用，继续下一格回归
                    this.initTemperatureRegression();
                }, interval);
            }
        }

        // 僵尸系统
        class Zombie {
            constructor(zombieType, x, y, levelHealthPercent = 0, levelAttackPercent = 0, levelSpeedPercent = 0) {
                this.type = zombieType;
                this.name = zombieType.name;
                
                let baseHealth = zombieType.health || 100;

                }
                
                // 应用随机速度范围变动（如果有配置）
                if (zombieType.speedRange && zombieType.speedRange.min && zombieType.speedRange.max) {
                    const randomFactor = Math.random() * (zombieType.speedRange.max - zombieType.speedRange.min) + zombieType.speedRange.min;
                    baseSpeed *= randomFactor;
                }
                
                this.maxHealth = baseHealth;
                this.health = this.maxHealth;
                this.attack = baseAttack;
                this.speed = baseSpeed;

                this.attackIcon = zombieType.attackIcon;
                this.percentHealthPerSecond = 0; // 每秒百分比生命扣除（正数扣血，负数回血）
                this.healthTimer = null; // 生命扣除/回血计时器
                this.moveSpeedPercentReduction = 0; // 移动速度百分比削减（正数削减，负数提升）
                this.attackSpeedPercentReduction = 0; // 攻击速度百分比削减（正数削减，负数提升）
                this.temperature = 0; // 温度函数（范围：-100 到 100）
                this.temperatureBonus = 0; // 温度附加（正数增加温度，负数减少温度）
                this.temperatureElement = null; // 温度显示元素
                this.temperatureRegressionTimer = null; // 温度回归计时器
                this.lastTemperatureState = null; // 上一次的温度状态（用于判断是否需要重新初始化生命计时器）
                
                // 初始化生命计时器
                this.initHealthTimer();
                
                // 初始化温度回归
                this.initTemperatureRegression();
            }
            
            // 初始化生命计时器
            initHealthTimer() {
                // 如果已经有计时器，先清除
                if (this.healthTimer) {
                    clearInterval(this.healthTimer);
                    this.healthTimer = null;
                }
                
                // 如果每秒百分比生命扣除为0，不启动计时器
                if (this.percentHealthPerSecond === 0) {
                    return;
                }
                
                // 每秒执行一次生命扣除/回血
                this.healthTimer = setInterval(() => {
                    // 如果僵尸已经死亡，清除计时器
                    if (this.health <= 0) {
                        clearInterval(this.healthTimer);
                        this.healthTimer = null;
                        return;
                    }
                    
                    // 计算生命变化量（当前生命值的百分比）
                    let healthChange = (this.health * this.percentHealthPerSecond) / 100;
                    
                    // 温度为正数时，最低伤害为1点
                    if (healthChange > 0 && healthChange < 1) {
                        healthChange = 1;
                    }
                    
                    // 应用生命变化
                    this.health -= healthChange;
                    
                    // 显示伤害或治疗数字
                    if (healthChange > 0) {
                        this.showDamage(Math.round(healthChange), false, true);
                    } else if (healthChange < 0) {
                        this.showDamage(Math.round(-healthChange), true);
                    }
                    
                    // 确保生命值不低于0
                    this.health = Math.max(0, this.health);
                    
                    // 更新生命值显示
                    if (this.healthBar) {
                        // 血条百分比四舍五入取整数
                        const healthPercent = Math.round((this.health / this.maxHealth) * 100);
                        this.healthBar.querySelector('.health-bar-fill').style.width = `${healthPercent}%`;
                        this.healthText.textContent = `${Math.round(this.health)}/${this.maxHealth}`;
                    }
                    
                    // 如果生命值变为0，触发死亡
                    if (this.health <= 0) {
                        this.die();
                    }
                }, 1000); // 每秒执行一次
            }
            
            // 计算实际移动速度
            getActualMoveSpeed() {
                // 计算移动速度系数：1 - 削减百分比/100
                const moveSpeedFactor = 1 - (this.moveSpeedPercentReduction / 100);
                // 实际移动速度 = 基础移动速度 × 系数
                return this.speed * moveSpeedFactor;
            }
            
            // 计算实际攻击间隔
            getActualAttackInterval() {
                // 计算攻击速度系数：1 - 削减百分比/100
                const attackSpeedFactor = 1 - (this.attackSpeedPercentReduction / 100);
                // 实际攻击间隔 = 基础攻击间隔 / 系数
                return this.attackSpeed / attackSpeedFactor;
            }
            
            // 应用温度效果
            applyTemperatureEffect() {
                // 温度范围限制：-100 到 100
                this.temperature = Math.max(-100, Math.min(100, this.temperature));
                
                // 获取当前温度状态
                let currentState;
                if (this.temperature > 0) {
                    currentState = 'positive';
                } else if (this.temperature < 0) {
                    currentState = 'negative';
                } else {
                    currentState = 'zero';
                }
                
                // 判断是否需要重新初始化生命计时器
                const needReinitHealthTimer = (this.lastTemperatureState !== currentState);
                
                // 更新上一次的温度状态
                this.lastTemperatureState = currentState;
                
                // 温度为正数时，作为 percentHealthPerSecond
                if (this.temperature > 0) {
                    this.percentHealthPerSecond = this.temperature;
                    // 只有状态改变时才重新初始化生命计时器
                    if (needReinitHealthTimer) {
                        this.initHealthTimer();
                    }
                }
                // 温度为负数时，其相反数作为 moveSpeedPercentReduction 和 attackSpeedPercentReduction
                else if (this.temperature < 0) {
                    const absTemperature = Math.abs(this.temperature);
                    this.moveSpeedPercentReduction = absTemperature;
                    this.attackSpeedPercentReduction = absTemperature;
                }
                // 温度为0时，清除所有效果
                else {
                    this.percentHealthPerSecond = 0;
                    this.moveSpeedPercentReduction = 0;
                    this.attackSpeedPercentReduction = 0;
                    // 只有状态改变时才重新初始化生命计时器
                    if (needReinitHealthTimer) {
                        this.initHealthTimer();
                    }
                }
                
                // 更新温度显示
                this.updateTemperatureDisplay();
                
                // 更新温度颜色效果
                this.updateTemperatureColor();
            }

                    this.temperatureElement.style.fontWeight = 'bold';

                // 更新温度显示内容和样式
                if (this.temperatureElement) {

                    this.temperatureElement.style.color = this.temperature > 0 ? 'orange' : 'deepskyblue';
                    this.temperatureElement.style.backgroundColor = 'transparent';
                }
            }
            
            // 更新温度颜色效果
            updateTemperatureColor() {
                if (!this.iconContainer) return;
                
                if (this.temperature === 0) {
                    this.iconContainer.style.filter = 'none';
                    return;
                }
                
                const intensity = Math.abs(this.temperature) / 100;
                
                if (this.temperature > 0) {

                    const saturate = 1 + intensity * 0.3;

                    this.iconContainer.style.filter = `sepia(${sepia}) hue-rotate(${hueRotate}deg) saturate(${saturate}) brightness(${brightness})`;
                } else {
                    const sepia = intensity * 0.3;
                    const hueRotate = 160 * intensity;
                    const saturate = 1 + intensity * 0.3;
                    const brightness = 1 + intensity * 0.1;
                    
                    this.iconContainer.style.filter = `sepia(${sepia}) hue-rotate(${hueRotate}deg) saturate(${saturate}) brightness(${brightness})`;
                }
            }

                this.temperatureRegressionTimer = setTimeout(() => {

                    // 应用温度效果

                    // 递归调用，继续下一格回归

            // 创建僵尸元素

            // 显示伤害或治疗
            showDamage(damage, isHeal = false, isTemperatureDamage = false, isIceBreak = false, isQuench = false) {
                if (!this.element) return;

                const damageText = document.createElement("div");
                damageText.className = "damage-text";
                
                // 设置文本内容和样式
                if (isIceBreak) {
                    damageText.classList.add("ice-break");

                } else if (isQuench) {
                    damageText.classList.add("quench");
                    damageText.innerHTML = damage + " <span style='font-size: 50%;'>淬火</span>";
                } else if (isHeal) {
                    damageText.textContent = "+" + damage;
                    damageText.style.color = "#4CAF50"; // 绿色
                } else if (isTemperatureDamage) {
                    damageText.textContent = damage;
                    damageText.style.color = "#FFA500"; // 橙色
                } else {
                    damageText.textContent = damage;
                    damageText.style.color = "#FF4444"; // 红色
                }
                
                // 随机位置计算（范围缩小30%）
                const randomX = (Math.random() * 4.2 - 2.1); // -2.1vmin 到 +2.1vmin（缩小30%）
                const randomY = (Math.random() * 2.8 - 7.1); // -7.1vmin 到 -4.3vmin（缩小30%）
                
                damageText.style.left = `calc(50% + ${randomX}vmin)`;
                damageText.style.top = `calc(50% + ${randomY}vmin)`;
                damageText.style.transform = "translate(-50%, -50%)";
                
                this.element.appendChild(damageText);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (damageText.parentNode) {
                        damageText.parentNode.removeChild(damageText);
                    }
                }, 1200);
            }

            // 开始移动
            startMoving() {
                this.moveInterval = setInterval(() => {
                    this.move();
                }, 50);
            }

            // 移动
            move() {
                // 检查僵尸是否到达左侧边界（靠近主人公）
                const leftBoundary = 10 * window.innerHeight / 200; // 左侧边界，距离屏幕左侧一定距离（调整为适应10列地图）
                if (this.x <= leftBoundary) {
                    // 僵尸到达左侧边界，攻击主人公
                    this.attackProtagonist();
                    return;
                }
                
                // 检查是否有植物可以攻击
                const plants = window.game ? window.game.plantsOnLawn : [];
                
                // 如果是独立移动的僵尸，直接朝向最近的植物移动
                if (this.type.independentMovement) {
                    this.moveTowardsNearestPlant(plants);
                    return;
                }
                
                // 普通僵尸的格子限制移动逻辑
                const lawnGridEl = document.getElementById("lawnGrid");
                const lawnRect = document.getElementById("lawn").getBoundingClientRect();
                const gridRect = lawnGridEl.getBoundingClientRect();
                
                // 计算格子大小
                const cellWidth = gridRect.width / config.gridCols;
                const cellHeight = gridRect.height / config.gridRows;
                
                // 计算僵尸所在的格子（使用元素中心点）
                const zombieCol = Math.floor((this.x + 7.5 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                const zombieRow = Math.floor((this.y + 7.5 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                
                // 检查当前格子是否有植物
                let hasPlant = false;
                for (const plant of plants) {
                    // 计算植物所在的格子（使用元素中心点）
                    const plantSize = plant.containerSize || 15;
                    const plantCol = Math.floor((plant.x + (plantSize / 2) * window.innerHeight / 100 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const plantRow = Math.floor((plant.y + (plantSize / 2) * window.innerHeight / 100 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 如果植物和僵尸在同一个格子，并且植物还活着
                    if (plantCol === zombieCol && plantRow === zombieRow && plant.health > 0) {
                        // 检查攻击间隔（使用实际攻击间隔）
                        const currentTime = Date.now();
                        const actualAttackInterval = this.getActualAttackInterval();
                        if (currentTime - this.lastAttackTime >= actualAttackInterval) {
                            this.attackPlant(plant);
                            this.lastAttackTime = currentTime;
                        }
                        hasPlant = true;
                        break;
                    }
                }
                
                // 如果没有植物，继续移动（使用实际移动速度）
                if (!hasPlant) {
                    const actualMoveSpeed = this.getActualMoveSpeed();
                    this.x -= actualMoveSpeed;
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                    }
                }
            }
            
            // 独立移动：朝向最近的植物移动
            moveTowardsNearestPlant(plants) {
                const actualMoveSpeed = this.getActualMoveSpeed();
                
                // 找到最近的植物
                let nearestPlant = null;
                let minDistance = Infinity;
                
                for (const plant of plants) {
                    if (plant.health > 0) {
                        // 计算距离（使用欧几里得距离）
                        const dx = plant.x - this.x;
                        const dy = plant.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < minDistance) {
                            minDistance = distance;
                            nearestPlant = plant;
                        }
                    }
                }
                
                if (nearestPlant && minDistance > 0) {
                    // 计算移动方向向量
                    const dx = nearestPlant.x - this.x;
                    const dy = nearestPlant.y - this.y;
                    
                    // 归一化向量
                    const length = Math.sqrt(dx * dx + dy * dy);
                    const dirX = dx / length;
                    const dirY = dy / length;
                    
                    // 移动僵尸
                    this.x += dirX * actualMoveSpeed;
                    this.y += dirY * actualMoveSpeed;
                    
                    // 更新元素位置
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                        this.element.style.top = this.y + "px";
                    }
                    
                    // 检查是否到达植物位置（攻击距离）
                    // 重新计算移动后的距离
                    const newDx = nearestPlant.x - this.x;
                    const newDy = nearestPlant.y - this.y;
                    const newDistance = Math.sqrt(newDx * newDx + newDy * newDy);
                    
                    // 使用攻击范围属性或默认值
                    const attackRange = this.type.attackRange || actualMoveSpeed * 2;
                    
                    if (newDistance <= attackRange) {
                        const currentTime = Date.now();
                        const actualAttackInterval = this.getActualAttackInterval();
                        if (currentTime - this.lastAttackTime >= actualAttackInterval) {
                            this.attackPlant(nearestPlant);
                            this.lastAttackTime = currentTime;
                        }
                    }
                } else {
                    // 如果没有找到植物，继续向左移动
                    this.x -= actualMoveSpeed;
                    if (this.element) {
                        this.element.style.left = this.x + "px";
                    }
                }
            }
            
            // 攻击主人公
            attackProtagonist() {
                // 触发攻击动画
                if (this.element) {
                    this.element.classList.add('attacking');
                    setTimeout(() => {
                        this.element.classList.remove('attacking');
                    }, 300);
                }
                
                // 游戏失败
                gameOver();
            }

            // 攻击植物
            attackPlant(plant) {
                plant.takeDamage(this.attack, this);
                
                // 触发攻击动画
                if (this.element) {
                    this.element.classList.add('attacking');
                    setTimeout(() => {
                        this.element.classList.remove('attacking');
                    }, 300);
                }
            }
            
            // 开始存在时间计时
            startExistTimer() {
                this.existTimer = setInterval(() => {
                    this.counter++;
                    
                    // 弓箭僵尸特殊逻辑
                    // 检查是否是弓箭僵尸类型（包括强壮弓箭僵尸）
                    if (this.type.name === "弓箭僵尸" || this.type.name === "强壮弓箭僵尸") {
                        this.checkArcherLogic();
                    }
                }, 1000);
            }
            
            // 检查弓箭僵尸逻辑
            checkArcherLogic() {
                // 获取计数器阈值，支持自定义
                const threshold1 = this.type.counterThreshold1 || 5;
                const threshold2 = this.type.counterThreshold2 || 8;
                const defaultSpeed = this.type.speed || 1;
                
                // 当计数器大于等于阈值1时，改变图片为攻击状态，移动速度变为0
                if (this.counter >= threshold1 && this.speed > 0) {
                    this.speed = 0;
                    if (this.attackIcon && this.iconContainer) {
                        this.iconContainer.innerHTML = this.attackIcon;
                    }
                }
                
                // 当计数器大于阈值2时，发射弓箭并重置状态
                if (this.counter > threshold2) {
                    this.fireArrow();
                    // 重置状态
                    this.counter = 0;
                    this.speed = defaultSpeed;
                    if (this.iconContainer) {
                        this.iconContainer.innerHTML = this.icon;
                    }
                }
            }
            
            // 发射弓箭
            fireArrow() {
                if (!this.element) return;
                
                // 创建弓箭子弹
                const arrow = document.createElement("div");
                arrow.className = "arrow";
                arrow.style.position = "absolute";
                arrow.style.width = "7.5vmin";
                arrow.style.height = "7.5vmin";
                arrow.style.display = "flex";
                arrow.style.alignItems = "center";
                arrow.style.justifyContent = "center";
                arrow.innerHTML = "<img src='tupian/arrow_bullet.png' style='width: 100%; height: 100%; object-fit: contain;'>";
                arrow.style.left = this.x + "px";
                arrow.style.top = this.y + 2.5 * window.innerHeight / 200 + "px";
                arrow.style.zIndex = "100";
                
                const lawn = document.getElementById("lawn");
                lawn.appendChild(arrow);
                
                // 弓箭飞行动画
                const arrowSpeed = 10;
                const arrowInterval = setInterval(() => {
                    const arrowLeft = parseInt(arrow.style.left) || 0;
                    if (arrowLeft <= 0) {
                        clearInterval(arrowInterval);
                        if (arrow.parentNode) {
                            arrow.parentNode.removeChild(arrow);
                        }
                        return;
                    }
                    
                    // 移动弓箭
                    arrow.style.left = (arrowLeft - arrowSpeed) + "px";
                    
                    // 检查是否击中植物
                    const plants = window.game ? window.game.plantsOnLawn : [];
                    const lawnGridEl = document.getElementById("lawnGrid");
                    const lawnRect = document.getElementById("lawn").getBoundingClientRect();
                    const gridRect = lawnGridEl.getBoundingClientRect();
                    
                    // 计算格子大小
                    const cellWidth = gridRect.width / 9;
                    const cellHeight = gridRect.height / 5;
                    
                    // 计算弓箭所在的格子
                    const arrowCol = Math.floor((arrowLeft + 3.75 * window.innerHeight / 200 - (gridRect.left - lawnRect.left)) / cellWidth);
                    const arrowRow = Math.floor((parseInt(arrow.style.top) + 3.75 * window.innerHeight / 200 - (gridRect.top - lawnRect.top)) / cellHeight);
                    
                    // 检查是否击中植物
                    for (const plant of plants) {
                        // 计算植物所在的格子
                        const plantSize = plant.containerSize || 15;
                        const plantCol = Math.floor((plant.x + (plantSize / 2) * window.innerHeight / 100 - (gridRect.left - lawnRect.left)) / cellWidth);
                        const plantRow = Math.floor((plant.y + (plantSize / 2) * window.innerHeight / 100 - (gridRect.top - lawnRect.top)) / cellHeight);
                        
                        // 如果弓箭和植物在同一个格子，并且植物还活着
                        if (plantCol === arrowCol && plantRow === arrowRow && plant.health > 0) {
                            // 对植物造成伤害
                            plant.takeDamage(this.attack, this);
                            // 清除弓箭
                            clearInterval(arrowInterval);
                            if (arrow.parentNode) {
                                arrow.parentNode.removeChild(arrow);
                            }
                            return;
                        }
                    }
                }, 20);
            }

            // 受到伤害
            takeDamage(damage, source = null) {
                let finalDamage = damage;
                let isIceBreak = false;
                let isQuench = false;
                
                // 判断是否触发破冰伤害：攻击者有正温度附加，被攻击者有负温度
                if (source && source.temperatureBonus > 0 && this.temperature < 0) {
                    finalDamage *= 3;
                    isIceBreak = true;
                }
                // 判断是否触发淬火伤害：攻击者有负温度附加，被攻击者有正温度
                else if (source && source.temperatureBonus < 0 && this.temperature > 0) {
                    finalDamage *= 2;
                    isQuench = true;
                }
                
                // 伤害四舍五入取整数
                const roundedDamage = Math.round(finalDamage);
                this.health -= roundedDamage;
                this.showDamage(roundedDamage, false, false, isIceBreak, isQuench);
                this.updateHealthBar();
                
                // 触发受攻击动画
                if (this.element) {
                    this.element.classList.add('hurt');
                    setTimeout(() => {
                        this.element.classList.remove('hurt');
                    }, 300);
                }
                
                if (this.health <= 0) {
                    this.die(source);
                }
            }

            // 死亡
            die(source = null) {
                if (this.moveInterval) {
                    clearInterval(this.moveInterval);
                }
                if (this.existTimer) {
                    clearInterval(this.existTimer);
                }
                
                // 检查是否需要在死亡时生成其他僵尸
                // 检查伤害来源是否阻断死亡产生单位
                const shouldSpawn = !source || !source.blockDeathSpawn;
                
                if (shouldSpawn && this.type.spawnOnDeath && window.game) {
                    const { type: spawnType, count } = this.type.spawnOnDeath;
                    const spawnZombieType = window.game.zombieTypes[spawnType];
                    if (spawnZombieType) {
                        // 计算当前僵尸所在的行
                        const lawnGridEl = document.getElementById("lawnGrid");
                        const lawnEl = document.getElementById("lawn");
                        if (lawnGridEl && lawnEl) {
                            const lawnGridRect = lawnGridEl.getBoundingClientRect();
                            const lawnRect = lawnEl.getBoundingClientRect();
                            const rowHeight = lawnGridRect.height / window.game.gridRows;
                            const zombieRow = Math.floor((this.y + 7.5 * window.innerHeight / 200 - (lawnGridRect.top - lawnRect.top)) / rowHeight);
                            
                            // 生成指定数量的僵尸
                            for (let i = 0; i < count; i++) {
                                // 计算生成位置，添加左右偏移
                                const spawnOffset = this.type.spawnOffset || 30; // 死亡单位产生偏移值，默认30
                                const offsetX = (Math.random() - 0.5) * spawnOffset; // 左右偏移
                                const offsetY = (Math.random() - 0.5) * (spawnOffset / 3); // 上下偏移
                                const spawnX = this.x + offsetX;
                                const spawnY = this.y + offsetY;
                                
                                // 获取当前关卡的属性变化指数
                                const { levelHealthPercent, levelAttackPercent, levelSpeedPercent } = getCurrentLevelZombieModifiers();
                                
                                // 创建新僵尸
                                const newZombie = new Zombie(spawnZombieType, spawnX, spawnY, levelHealthPercent, levelAttackPercent, levelSpeedPercent);
                                const zombieElement = newZombie.createElement(lawnEl);
                                // 设置z-index，下面的行层级更高
                                zombieElement.style.zIndex = zombieRow + 1;
                                newZombie.startMoving();
                                
                                // 添加到僵尸列表
                                window.game.zombies.push(newZombie);
                                window.game.zombiesRemaining++;
                                // 更新全局僵尸数量统计
                                if (window.zombieCountSystem) {
                                    window.zombieCountSystem.addZombie();
                                }
                            }
                        }
                    }
                }
                
                if (this.element) {
                    this.element.remove();
                }
                // 从僵尸列表中移除
                const index = window.game.zombies.indexOf(this);
                if (index > -1) {
                    window.game.zombies.splice(index, 1);
                    // 更新剩余僵尸数量
                    if (window.game.zombiesRemaining > 0) {
                        window.game.zombiesRemaining--;
                    }
                    // 更新全局僵尸数量统计
                    if (window.zombieCountSystem) {
                        window.zombieCountSystem.removeZombie();
                    }
                }
            }

        // 启动关卡时长计时器
        function startLevelTimeTimer() {
            if (config.levelTimeTimer) {
                clearInterval(config.levelTimeTimer);
            }
            config.levelTimeTimer = setInterval(() => {
                if (!config.levelComplete) {
                    config.levelTime++;
                }
            }, 1000);
        }
        
        // 停止关卡时长计时器
        function stopLevelTimeTimer() {
            if (config.levelTimeTimer) {
                clearInterval(config.levelTimeTimer);
                config.levelTimeTimer = null;
            }
        }
        
        // 重置关卡时长
        function resetLevelTime() {
            stopLevelTimeTimer();
            config.levelTime = 0;
        }
        
        // 开始关卡
        function startLevel(levelId) {
            // 检查是否是肉鸽模式关卡
            let level;
            if (levelId >= 101 && levelId <= 120) {
                // 肉鸽模式关卡
                level = rogueLevels.find(l => l.id === levelId);
            } else {
                // 普通关卡
                level = levels.find(l => l.id === levelId);
            }
            
            if (!level) return;
            
            config.currentLevel = levelId;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 重置关卡时长并启动计时器
            resetLevelTime();
            startLevelTimeTimer();
            
            console.log(`开始第 ${levelId} 关: ${level.name}`);
            
            // 更新关卡显示
            const levelDisplayEl = document.getElementById("levelDisplay");
            if (levelDisplayEl) {
                levelDisplayEl.textContent = level.name;
            }
            
            // 更新僵尸属性增幅/削减显示（仅肉鸽模式）
            const zombieEffectsDisplay = document.getElementById("zombieEffectsDisplay");
            if (zombieEffectsDisplay) {
                if (levelId >= 101 && levelId <= 120 && typeof nightmareGlobalData !== 'undefined') {
                    let levelHealthPercent = 0;
                    let levelAttackPercent = 0;
                    let levelSpeedPercent = 0;
                    
                    if (typeof rogueLevels !== 'undefined') {
                        const currentLevel = rogueLevels.find(l => l.id === levelId);
                        if (currentLevel) {
                            levelHealthPercent = currentLevel.zombieHealthPercent || 0;
                            levelAttackPercent = currentLevel.zombieAttackPercent || 0;
                            levelSpeedPercent = currentLevel.zombieSpeedPercent || 0;
                        }
                    }
                    
                    const effectsText = nightmareGlobalData.getZombieEffectsDisplay(levelHealthPercent, levelAttackPercent, levelSpeedPercent);
                    zombieEffectsDisplay.textContent = effectsText;
                    zombieEffectsDisplay.style.display = effectsText ? "block" : "none";
                } else {
                    zombieEffectsDisplay.style.display = "none";
                }
            }
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重新初始化植物栏，根据当前关卡解锁相应等级的植物
            initPlantBar();
            
            // 开始第一波
            startNextWave();
        }
        
        // 开始下一波
        function startNextWave() {
            // 标记退出波次间隔
            if (window.waveIntervalSystem) {
                // 下一波的波次编号是当前波次+1
                const nextWaveNumber = config.currentWave ? config.currentWave + 1 : 1;
                window.waveIntervalSystem.exitWaveInterval(nextWaveNumber);
            }
            
            // 检查是否是肉鸽模式关卡
            let level;
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                // 肉鸽模式关卡
                level = rogueLevels.find(l => l.id === config.currentLevel);
            } else {
                // 普通关卡
                level = levels.find(l => l.id === config.currentLevel);
            }
            
            if (!level) return;
            
            if (config.currentWave >= level.waves.length) {
                // 所有波次都已完成
                return;
            }
            
            const wave = level.waves[config.currentWave];
            config.currentWave++;
            config.wavesSpawned++;
            
            // 如果是肉鸽模式，每次都重新生成僵尸配置（确保噩梦因子效果正确应用）
            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                wave.zombies = generateZombiesFromThreat(wave, config.currentLevel, config.levelTime);
            }
            
            console.log(`开始第 ${wave.waveNumber} 波`);
            console.log(`威胁值: ${wave.calculatedThreat}, 最终威胁值: ${wave.finalThreat}`);
            
            // 计算本波僵尸总数
            let totalZombies = 0;
            for (const zombieInfo of wave.zombies) {
                totalZombies += zombieInfo.count;
            }
            config.zombiesRemaining = totalZombies;
            
            // 开始生成僵尸
            spawnWaveZombies(wave);
        }
        
        // 生成波次僵尸
        function spawnWaveZombies(wave) {
            let zombiesToSpawn = [];
            
            // 收集所有要生成的僵尸
            for (const zombieInfo of wave.zombies) {
                for (let i = 0; i < zombieInfo.count; i++) {
                    zombiesToSpawn.push(zombieInfo.type);
                }
            }
            
            // 随机打乱僵尸顺序
            zombiesToSpawn = zombiesToSpawn.sort(() => Math.random() - 0.5);
            
            // 逐个生成僵尸
            let spawnIndex = 0;
            const spawnInterval = setInterval(() => {
                if (spawnIndex >= zombiesToSpawn.length) {
                    clearInterval(spawnInterval);
                    
                    // 检查是否是最后一波
                    let currentLevel;
                    if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                        // 肉鸽模式关卡
                        currentLevel = rogueLevels.find(l => l.id === config.currentLevel);
                    } else {
                        // 普通关卡
                        currentLevel = levels.find(l => l.id === config.currentLevel);
                    }
                    
                    if (currentLevel && wave.isLast) {
                        // 最后一波，开始检查关卡完成
                        checkLevelComplete();
                    } else {
                        // 不是最后一波，设置下一波的间隔
                        if (config.waveTimer) {
                            clearTimeout(config.waveTimer);
                        }
                        // 使用波次间隔属性，如果没有则使用spawnInterval作为默认值
                        const interval = wave.waveInterval || wave.spawnInterval;
                        config.waveTimer = setTimeout(startNextWave, interval);
                        // 标记进入波次间隔
                        if (window.waveIntervalSystem) {
                            window.waveIntervalSystem.enterWaveInterval(wave.waveNumber);
                        }
                    }
                    return;
                }
                
                const zombieType = zombiesToSpawn[spawnIndex];
                spawnZombieByType(zombieType);
                spawnIndex++;
                config.zombiesSpawned++;
            }, wave.spawnInterval);
            
            // 保存生成计时器和索引，用于快速刷新机制
            config.zombieSpawnTimer = spawnInterval;
            config.zombieSpawnIndex = spawnIndex;
            config.zombiesToSpawn = zombiesToSpawn;
            config.currentWaveSpawnInterval = wave.spawnInterval;
            
            // 定义快速刷新下一个僵尸的函数
            config.spawnNextZombie = function() {
                if (config.zombieSpawnIndex >= config.zombiesToSpawn.length) {
                    return;
                }
                
                const zombieType = config.zombiesToSpawn[config.zombieSpawnIndex];
                spawnZombieByType(zombieType);
                config.zombieSpawnIndex++;
                config.zombiesSpawned++;
                
                // 重新设置计时器，继续生成剩余僵尸
            if (config.zombieSpawnIndex < config.zombiesToSpawn.length) {
                // 先清除可能存在的旧计时器
                if (config.zombieSpawnTimer) {
                    clearInterval(config.zombieSpawnTimer);
                    config.zombieSpawnTimer = null;
                }
                // 创建新的计时器
                config.zombieSpawnTimer = setInterval(() => {
                        if (config.zombieSpawnIndex >= config.zombiesToSpawn.length) {
                            clearInterval(config.zombieSpawnTimer);
                            config.zombieSpawnTimer = null;
                            // 波次完成逻辑
                            let currentLevel;
                            if (config.currentLevel >= 101 && config.currentLevel <= 199) {
                                currentLevel = rogueLevels.find(l => l.id === config.currentLevel);
                            } else {
                                currentLevel = levels.find(l => l.id === config.currentLevel);
                            }
                            
                            if (currentLevel && wave.isLast) {
                                checkLevelComplete();
                            } else {
                                if (config.waveTimer) {
                                    clearTimeout(config.waveTimer);
                                }
                                const interval = wave.waveInterval || wave.spawnInterval;
                                config.waveTimer = setTimeout(startNextWave, interval);
                                if (window.waveIntervalSystem) {
                                    window.waveIntervalSystem.enterWaveInterval(wave.waveNumber);
                                }
                            }
                            return;
                        }
                        
                        const zombieType = config.zombiesToSpawn[config.zombieSpawnIndex];
                        spawnZombieByType(zombieType);
                        config.zombieSpawnIndex++;
                        config.zombiesSpawned++;
                    }, config.currentWaveSpawnInterval);
                }
            };
        }
        
        // 检查关卡是否完成
        function checkLevelComplete() {
            if (config.levelComplete) return;
            
            const checkInterval = setInterval(() => {
                // 检查是否还有僵尸
                if (config.zombies.length === 0 && config.zombiesRemaining === 0) {
                    clearInterval(checkInterval);
                    completeLevel();
                }
            }, 1000);
        }
        
        // 完成关卡
        function completeLevel() {
            config.levelComplete = true;
            // 停止关卡时长计时器
            stopLevelTimeTimer();
            console.log(`第 ${config.currentLevel} 关完成！用时：${config.levelTime}秒`);
            
            // 启动过关庆祝动画
            startVictoryCelebration();
            
            // 两秒延迟后显示过关界面或梦境商店
            setTimeout(() => {
                // 如果是肉鸽模式，直接显示整合后的关卡完成界面

                setTimeout(() => {
                    clearField();

            }, 2000); // 两秒延迟
        }
        
        // 启动过关庆祝动画
        function startVictoryCelebration() {
            // 获取场上所有植物
            const plants = [...config.plantsOnLawn];
            
            // 为每个植物添加庆祝动画
            plants.forEach(plant => {
                if (plant.element && plant.health > 0) {
                    // 为每个植物生成随机旋转速度（0.4秒到0.6秒之间）
                    const randomSpeed = 0.4 + Math.random() * 0.2;
                    plant.element.style.setProperty('--victory-spin-duration', `${randomSpeed}s`);
                    plant.element.classList.add('victory-celebration');
                }
            });
            
            // 两秒后移除庆祝动画
            setTimeout(() => {
                plants.forEach(plant => {
                    if (plant.element) {
                        plant.element.classList.remove('victory-celebration');
                        plant.element.style.removeProperty('--victory-spin-duration');
                    }
                });
            }, 2000);
        }

        function nextLevel() {

            suns.forEach(sun => sun.remove());
            
            // 重置所有植物冷却
            resetAllPlantCooldowns();
            
            // 重置游戏配置
            config.sun = 20;
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;
            config.zombiesRemaining = 0;
            config.levelComplete = false;
            
            // 更新阳光显示
            if (sunCountEl) {
                sunCountEl.textContent = config.sun;
            }
            
            // 进入下一关
            const nextLevel = config.currentLevel + 1;
            const hasNextLevel = levels.some(l => l.id === nextLevel);
            
            if (hasNextLevel) {
                startLevel(nextLevel);
            } else {
                console.log("所有关卡已完成！进入肉鸽模式！");
                // 进入肉鸽模式
                startRogueMode();
            }
        }
        
        // 清除场上所有植物和僵尸
        function clearField() {
            // 创建数组副本，避免在循环中修改数组导致的问题
            const plantsCopy = [...config.plantsOnLawn];
            const zombiesCopy = [...config.zombies];
            
            // 对所有植物造成9999999点伤害
            for (const plant of plantsCopy) {
                plant.takeDamage(9999999);
            }
            
            // 对所有僵尸造成9999999点伤害（程序性伤害，阻断死亡产生单位）
            for (const zombie of zombiesCopy) {
                zombie.takeDamage(9999999, { blockDeathSpawn: true });
            }
        }

        function startRogueMode() {
            console.log("startRogueMode 被调用");
            
            // 重置游戏状态
            config.currentLevel = 101; // 肉鸽模式起始关卡
            config.currentWave = 0;
            config.wavesSpawned = 0;
            config.zombiesSpawned = 0;

            }

        function restartGame() {
            // 隐藏游戏失败弹窗
            const modal = document.getElementById("gameOverModal");

                modal.style.display = "none";

            suns.forEach(sun => sun.remove());
            
            // 检查是否是肉鸽模式（101-120关）
            const isRogueMode = config.currentLevel >= 101 && config.currentLevel <= 120;

                const currentY = startY + (endY - startY) * progress - parabolaHeight;

        // 收集阳光
        function collectSun(sun) {
            // 阻止事件冒泡
            if (!sun || !sun.parentNode) return;
            
            if (!sunCountEl || !lawnEl) return;
            
            // 获取阳光价值
            const value = parseInt(sun.dataset.value) || 10;
            
            const countRect = sunCountEl.getBoundingClientRect();
            const lawnRectCalc = lawnEl.getBoundingClientRect();
            
            // 计算目标位置（相对于草坪）
            const targetX = countRect.left - lawnRectCalc.left + countRect.width / 2 - 4 * window.innerHeight / 200;
            const targetY = countRect.top - lawnRectCalc.top + countRect.height / 2 - 4 * window.innerHeight / 200;
            
            // 计算起始位置
            const startX = parseFloat(sun.style.left);
            const startY = parseFloat(sun.style.top);
            
            // 播放飞行动画
            let startTime = null;
            const duration = 400;
            
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                
                // 缓动函数
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // 计算当前位置
                const currentX = startX + (targetX - startX) * easeProgress;
                const currentY = startY + (targetY - startY) * easeProgress;
                
                // 计算当前缩放和透明度
                const scale = 1 - progress * 0.5;
                const opacity = 1 - progress * 0.5;
                
                // 更新阳光状态
                sun.style.left = currentX + "px";
                sun.style.top = currentY + "px";
                sun.style.transform = `scale(${scale})`;
                sun.style.opacity = opacity;
                
                // 继续动画
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画结束，增加钱数
                    config.sun += value;
                    if (sunCountEl) {
                        sunCountEl.textContent = config.sun;
                    }
                    
                    // 更新植物卡槽的钱不足状态
                    updatePlantCardsSunStatus();
                    
                    // 移除阳光
                    if (sun.parentNode) {
                        sun.remove();
                    }
                }
            }
            
            // 开始动画
            requestAnimationFrame(animate);
        }

            config.selectedShovel = false;
        }

        // 检查格子中是否有植物（除了可重叠的盾牌类植物）
        function hasPlantInCell(row, col) {
            const lawnGridEl = document.getElementById("lawnGrid");
            const lawnEl = document.getElementById("lawn");
            
            if (!lawnGridEl || !lawnEl) return false;
            
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const cellWidth = lawnGridRect.width / config.gridCols;
            const cellHeight = lawnGridRect.height / config.gridRows;
            
            // 计算格子的中心位置
            const cellCenterX = (lawnGridRect.left - lawnRect.left) + col * cellWidth + cellWidth / 2;
            const cellCenterY = (lawnGridRect.top - lawnRect.top) + row * cellHeight + cellHeight / 2;
            
            // 检查每个植物
            for (const plant of config.plantsOnLawn) {
                // 如果植物可以重叠，跳过检查
                if (plant.canOverlap) continue;
                
                // 计算植物的中心位置
                const plantSize = plant.containerSize || 15;
                const plantCenterX = plant.x + (plantSize / 2) * window.innerHeight / 100;
                const plantCenterY = plant.y + (plantSize / 2) * window.innerHeight / 100;
                
                // 计算植物所在的格子
                const plantCol = Math.floor((plantCenterX - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const plantRow = Math.floor((plantCenterY - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 如果植物在目标格子中
                if (plantRow === row && plantCol === col) {
                    return true;
                }
            }
            
            return false;
        }

        // 获取格子中的所有植物
        function getPlantsInCell(row, col) {
            const plantsInCell = [];
            const lawnGridEl = document.getElementById("lawnGrid");
            const lawnEl = document.getElementById("lawn");
            
            if (!lawnGridEl || !lawnEl) return plantsInCell;
            
            const lawnGridRect = lawnGridEl.getBoundingClientRect();
            const lawnRect = lawnEl.getBoundingClientRect();
            const cellWidth = lawnGridRect.width / config.gridCols;
            const cellHeight = lawnGridRect.height / config.gridRows;
            
            // 计算格子的中心位置
            const cellCenterX = (lawnGridRect.left - lawnRect.left) + col * cellWidth + cellWidth / 2;
            const cellCenterY = (lawnGridRect.top - lawnRect.top) + row * cellHeight + cellHeight / 2;
            
            // 检查每个植物
            for (const plant of config.plantsOnLawn) {
                // 计算植物的中心位置
                const plantSize = plant.containerSize || 15;
                const plantCenterX = plant.x + (plantSize / 2) * window.innerHeight / 100;
                const plantCenterY = plant.y + (plantSize / 2) * window.innerHeight / 100;
                
                // 计算植物所在的格子
                const plantCol = Math.floor((plantCenterX - (lawnGridRect.left - lawnRect.left)) / cellWidth);
                const plantRow = Math.floor((plantCenterY - (lawnGridRect.top - lawnRect.top)) / cellHeight);
                
                // 如果植物在目标格子中，添加到结果数组
                if (plantRow === row && plantCol === col) {
                    plantsInCell.push(plant);
                }
            }
            
            return plantsInCell;

        // 弹幕提示函数
        function showToast(message) {
            const toastContainer = document.getElementById("toastContainer");
            if (!toastContainer) return;
            
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            // 2秒后移除弹幕
            setTimeout(() => {
